tasks:
  mode: iter
  content:
  - question: 我是一名高二学生，最近班会大家对“大学生自愿加班”这个社会热点讨论挺激烈，有的人觉得加班能实现自我，有的人则关心健康和权益。你作为德育专家，能全面分析一下这个现象的伦理问题吗？希望你能结合我们高二阶段的成长特点，说说怎么在班级里开展辩论或情景模拟，帮助我们更好地理解自己的价值观和社会责任。
  - question: 我是高一学生，最近看到有明星因为公益捐款被网络舆论攻击，班里同学看法挺多，我有点搞不清楚。你作为德育老师，能解释一下这个事件的伦理问题吗？最好说说我们高一同学怎么通过小组讨论或者创意表达来主动思考和交流自己的观点。
  - question: 你是我们班的班主任，最近大家都在关注“校园霸凌曝光”这个社会热点，有人觉得媒体曝光好，有人担心会伤害被曝光的人。能说说主要的伦理问题是什么吗？顺便推荐一两种适合我们班讨论或者体验式学习的方法。
  - question: 我是GarciaDennis，12th Grade的学生，兴趣是航模和武术，性格比较自信、情绪稳定，喜欢做目标导向的事情，社交主要围绕我的兴趣。最近班里讨论人工智能对我们未来择业的影响，有同学觉得AI带来机会，有些则担心失业和伦理风险。你作为德育专家，能结合我的性格和兴趣详细说说这个社会热点的伦理问题吗？最好能建议下航模或武术项目里能怎么做角色扮演或跨学科活动，让我能更深入思考。
  - question: 我是王龙德，29岁男老师，平时喜欢电音制作和影视剪辑，在老师圈子里技术不错但社交比较保守，和同事都是专业交流为主，在电音圈会线上合作。最近德育课上遇到“网络暴力与言论自由”这个社会热点，学生们讨论很激烈，对权利和责任、表达自由和伤害边界争议很大。你作为德育老师，能彻底说清楚这个问题吗？希望能结合我的性格和社交情况，详细讲讲德育教学怎么应对，还可以有哪些多元互动和创新项目化活动。
  - question: 我是一名高三学生，最近高考志愿填报大家讨论很热，有人坚持个人兴趣，也有人觉得应该听父母的意见。你作为德育顾问，能讲讲看这个社会热点的伦理问题吗？最好结合我们高三的特点，推荐一些互动性强的讨论或角色扮演教学方法，让我们能更好地反思自己的选择和家庭关系。
  - question: 你是德育专家，最近学校德育讲座上家长和学生就“网络直播打赏”吵得挺厉害，有家长觉得打赏是浪费钱，有学生觉得是支持创作者、表达自我。能讲得详细点吗？希望你结合我们高中生自我意识和消费观念的变化，帮我们分析一下这个社会热点的伦理问题，并推荐一些家长和学生能一起参与的沟通项目或体验活动，让大家更好交流彼此的价值观。
  - question: 我是高一学生，最近班会大家讨论“明星隐私被曝光”，有的说名人应该被监督，有的觉得他们也有隐私权。你作为德育老师，大概讲讲这个事件的主要伦理问题吧，顺便推荐一种有趣的创新表达方式让我们参与讨论。
  - question: 我是刘怡，高三女生，喜欢穿搭、编程和美妆，平时在社交媒体分享心得，和同学关系一般，但在美妆兴趣小组很活跃，常和朋友聊时尚。最近班级德育活动讨论“网络虚假信息与个人表达自由”，大家意见不一，有人主张自由，有人担心虚假信息会有害。你作为德育专家，能彻底说清楚这个问题吗？希望你结合我的兴趣和性格，推荐一些我能参与的多元活动，比如时尚话题创意写作、编程项目或线上辩论，让我能更好地反思和成长。
  - question: 你是一名有经验的高中德育老师，最近校园“食品安全事件”曝光后，大家讨论很激烈，有人主张曝光，有人担心引发恐慌。能讲清楚点这个社会热点的伦理问题吗？顺便说说我们可以用哪些案例分析或体验式活动来帮助大家多角度思考。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-高中-社会热点事件的伦理评析（德育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评价内容是否基于学生年级、兴趣、认知发展等画像进行分层设计，能针对不同层次学生的实际需求制定差异化目标、内容和活动，体现对学生成长规律的精准把握，避免仅表层适配。
  - field: 指令遵循完整性_理由
    type: str
    description: 解释指令遵循完整性评分的详细理由，引用具体例子。
  - field: 指令遵循完整性
    type: float
    description: 内容应完整覆盖教师/任务要求的全部结构流程（如分析、案例、讨论、互动等），且各环节内容充实、逻辑递进、自然衔接，避免机械堆砌、内容空洞或环节缺失。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 采用多样化、系统性的德育教学方法（如启发、讨论、情境模拟、项目化等），能根据学生反馈动态调整，促进深度参与和批判思维，避免单一、僵化教学。
  - field: 案例分析深度_理由
    type: str
    description: 解释案例分析深度评分的详细理由，引用具体例子。
  - field: 案例分析深度
    type: float
    description: 案例分析能多维度（个人、社会、法律、文化等）深入探讨社会热点事件，揭示伦理冲突、利益博弈与复杂影响，避免表面化、单一视角或简单评论。
  - field: 互动性与启发性_理由
    type: str
    description: 解释互动性与启发性评分的详细理由，引用具体例子。
  - field: 互动性与启发性
    type: float
    description: 设计多样化互动（如分组辩论、情景假设、开放提问等），能激发学生深度参与、独立思考和创新表达，鼓励观点碰撞与批判性交流，避免单向灌输或浅层互动。
  - field: 创新表达鼓励度_理由
    type: str
    description: 解释创新表达鼓励度评分的详细理由，引用具体例子。
  - field: 创新表达鼓励度
    type: float
    description: 鼓励学生采用多样化、创新性表达方式（如辩论、角色扮演、短视频、创意写作等），设置明确评价标准，重视原创性和个性化表达，避免单一书面输出。
  - field: 价值观融入自然度_理由
    type: str
    description: 解释价值观融入自然度评分的详细理由，引用具体例子。
  - field: 价值观融入自然度
    type: float
    description: 在教学内容中自然融入社会主义核心价值观和中华优秀传统文化，通过案例、讨论、互动等方式潜移默化引导学生形成正确价值观，避免生硬灌输或口号化表达。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 提问应贴近高中生实际，模拟真实学生在社会热点伦理评析中的困惑、兴趣与思考，具备时代性、生活性与挑战性，能激发深度探究。
  format_mode: prompt
