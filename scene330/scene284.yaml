tasks:
  mode: iter
  content:
  - question: 我是王鹏涛，今年58岁，是初中美术老师，教学时喜欢把自己的登山和无人机航拍融入美育课程，但有时候太投入，没太顾及学生的实际感受。你能给我一份完整的分析吗？主要想知道怎么把户外登山和航拍巧妙结合到中国传统色彩与纹样之美的课堂里，帮助学生更好地感知自然、体验传统美学、激发创新表达。包括课程目标、知识讲解、课堂活动案例、分层激励、成果展示和评价、情感关怀以及中国传统美育的价值观怎么自然渗透进去。给我一份完整的分析。
  - question: 我是初中美术老师，最近发现班里学生对中国传统色彩和纹样都不太感兴趣，课堂气氛有点冷淡。你作为美育专家，能具体说说吗？帮我分析下可能原因，还想听听针对不同兴趣和基础层次学生该怎么激励和设计教学，让课堂氛围能热起来，学生能主动参与。能具体说说吗？
  - question: 你是我的美育学习助手，我准备讲初中中国传统色彩与纹样之美，但学生对传统美学理解不深，表达兴趣也不高。深入说说看，怎么设计一套分层分步的教学方案，包括知识讲解、案例欣赏、动手实践、成果展示等环节，特别想知道怎么激发学生探索和创造力，同时又能让中华美学和价值观自然渗透，鼓励学生自主体验和思考。深入说说看。
  - question: 我是寿沛杨，12岁，六年级学生，喜欢钢琴、露营生存和机器人搭建，性格有点选择性迎合。最近美术课上老师讲中国传统色彩和纹样，我有点难理解这些内容和自己的兴趣到底有什么联系。你能帮我理解一下吗？最好能结合我的兴趣，说说怎么用我的特长去体验和表达这些美育内容。帮我理解一下。
  - question: 我是初三学生家长，孩子性格比较内向，对美术课兴趣一般。最近老师给他们布置了关于中国传统色彩和纹样的作业。能不能讲讲看，在家里怎么激发孩子对这些传统美育内容的兴趣，有没有什么简单的互动活动可以让他主动参与体验？讲讲看。
  - question: 我是初中美术老师，班里有几个学生对中国传统色彩和纹样特别感兴趣，但他们基础不太扎实，创作时容易受挫。你有什么建议吗？帮我理解一下怎么给他们设计分层实践任务，既能提升技能又能保护和激发他们的美育热情，还能让他们在创作中体会中华美学的乐趣和内涵。帮我理解一下。
  - question: 你作为美育专家，最近发现不少初中生对中国传统色彩和纹样的审美有变化，有些更喜欢现代风格，这让传统美育内容很难深入。 我想深入了解一下，怎么在课堂上把传统和现代美育内容融合起来？还想知道不同风格偏好学生的心理和成长特点，以及创新型课程设计建议，帮助学生在审美表达、文化理解和自信心上均衡发展。我想深入了解。
  - question: 我是付若琳，54岁，女老师，喜欢舞蹈、社区活动和方言研究，教学风格不太注重形式，有时候过度投入会模糊师生界限，对工作压力也比较敏感。你能系统地讲解一下初中中国传统色彩与纹样之美的课程设计和实践路径吗？包括课程目标、知识讲解、课堂活动、分层教学、创新实践、成果展示和情感关怀这些方面，特别想知道怎么在课堂上自然融入中华美育价值观，同时还要注意师生互动和老师自己调节压力的方法。系统地讲解一下。
  - question: 我是古强生，46岁，中学物理老师，喜欢航模设计和区块链技术。最近学校要求我们参加美育跨学科活动，要把中国传统色彩和纹样融合进物理课。你有什么建议吗？简单说说就行，最好能举个具体活动的例子。
  - question: 我是一名初中美术老师，最近准备中国传统色彩与纹样之美主题课，学生基础不太一致，有些还挺排斥传统美育内容。简短回答下，怎么让学生更容易接受和喜欢这些内容？最好能给个课堂活动建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-初中-中国传统色彩与纹样之美（美育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 评估教师是否系统收集并分析学生的兴趣、能力、学习风格等信息，针对不同层次学生制定差异化目标与任务，并在教学、反馈、评价过程中持续调整策略。要求有具体分层方案和动态调整行为，能显著促进个体成长。
  - field: 指令遵循与格式规范_理由
    type: str
    description: 解释指令遵循与格式规范评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范
    type: float
    description: 评估教学设计或答复是否严格依照任务要求、流程和结构展开，环节完整且顺序合理。内容分工明确、衔接自然，无遗漏、无随意增删，所有环节均有具体落实。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 评估教学方法是否基于美育与教育学理论，结合观察、探究、合作、反思等策略，具体体现理论指导与实践结合。要求方法与目标、学生实际高度匹配，并有过程性证据支持学生主动、批判与创造性发展。
  - field: 学习目标与过程清晰度_理由
    type: str
    description: 解释学习目标与过程清晰度评分的详细理由，引用具体例子。
  - field: 学习目标与过程清晰度
    type: float
    description: 评估是否设定具体、可衡量的学习目标，并将教学过程拆解为逻辑严密、易操作和追踪的步骤。每步均有明确目标和评价标准，帮助学生聚焦重点、形成知识结构和能力提升路径。
  - field: 创新思维激发_理由
    type: str
    description: 解释创新思维激发评分的详细理由，引用具体例子。
  - field: 创新思维激发
    type: float
    description: 评估是否通过开放性问题、跨学科整合与创意任务，有效激发学生创新意识和自主探索能力。要求设计具有创新空间和深度的任务，并指导学生表达独特观点或创意，鼓励多样化成果展示和自我阐释。
  - field: 问题模拟真实性与分层深度_理由
    type: str
    description: 解释问题模拟真实性与分层深度评分的详细理由，引用具体例子。
  - field: 问题模拟真实性与分层深度
    type: float
    description: 评估教学问题或情境是否贴近真实课堂与学生实际，兼顾文化深度与生活相关性，并根据学生能力分层设置问题。要求问题能引发学生深入思考、探讨，促进多层次认知发展。
  - field: 中国价值观自然融入_理由
    type: str
    description: 解释中国价值观自然融入评分的详细理由，引用具体例子。
  - field: 中国价值观自然融入
    type: float
    description: 评估是否在教学内容、案例与活动中有机融合社会主义核心价值观和中华优秀传统文化，鼓励学生主动思考个人行为、社会责任与文化自信。要求价值观融入具体情境，能引发学生真实的认知与情感反应。
  - field: 语言表达规范性与亲和力_理由
    type: str
    description: 解释语言表达规范性与亲和力评分的详细理由，引用具体例子。
  - field: 语言表达规范性与亲和力
    type: float
    description: 评估教学语言是否准确、简明、生动，富有亲和力，能激发学生兴趣和参与。要求表达逻辑清晰、用词恰当，善于启发和鼓励，能有效促进课堂互动和积极氛围。
  format_mode: prompt
