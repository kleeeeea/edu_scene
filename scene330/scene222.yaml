tasks:
  mode: iter
  content:
  - question: 我是初中生，最近在地理课上学到板块运动与地貌塑造，但还是有点模糊。能解释一下板块运动的基本原理以及它怎么影响地貌形成吗？最好能举几个生活中能感受到的例子，让我更容易理解。
  - question: 你是地理老师助手，我叫周翰征，14岁，初二，男生，喜欢3D建模和电子竞技，也喜欢游泳，平时记忆不太连贯，容易焦虑但做事很有行动力，和同龄人关系挺理性，在社团里有归属感。能深入讲解一下板块运动和地貌塑造的原理吗？最好能结合我的兴趣，比如3D建模或者电子竞技，分析下我学习上的困难，再推荐点适合我的互动学习方法和创新表达活动，让我能主动探索、理解得更透彻。
  - question: 我是吕碧岚，36岁女老师，喜欢方言研究和学习新技能，管理风格比较民主，压力会转化为动力，善于策略性妥协和批判性思维，现实和理想能保持平衡。学术圈和专业圈的社交挺广泛，通过多文化研究和持续学习跟不同背景的人保持联系，同事关系也挺融洽，处理职场矛盾比较有分寸。能详细分析下各个方面，比如初中地理板块运动和地貌塑造的知识体系、教学重难点、学科融合思路，还有怎么用多元文化和团队协作活动提升学生的科学精神、探究能力？希望能结合我的教学风格和职业背景，讲讲创新教学方案和互动建议，也请自然融入一些社会主义核心价值观和中华优秀传统文化。
  - question: 你是地理知识专家，我叫ScottLillian，12岁，六年级女生，喜欢吉他和乒乓球，比较创新，喜欢团队合作但有点回避，有时候需要老师监督。能简短回答下板块运动怎么影响地貌形成吗？顺便推荐一两种适合我的有创意或者团队合作的地理学习活动，让我能发挥自己的创新和合作优势。
  - question: 我是初中地理老师，最近班里的学生对板块运动和地貌塑造很感兴趣，不过他们喜欢用故事和模型来学习。你能详细展开说说板块运动的基本原理和地貌的形成过程吗？最好能结合生动的故事和模型制作方式，推荐点适合初中生的互动教学活动，能激发他们主动探究的兴趣，也要自然融入人与自然和谐共生这些价值观。
  - question: 你作为地理学习助手，我复习板块运动和地貌塑造时总记不住具体过程。能不能讲讲看板块运动有哪些类型，主要作用是什么，还有它们怎么塑造不同地貌？举些常见地貌的例子，方便我理解。
  - question: 我是初中地理老师，麻烦你简要说明下板块运动和地貌塑造之间有什么关系？突出几个关键点，学生容易记住就行。顺便能给个简单的互动建议，帮助学生加深印象吗？
  - question: 你是地理学科教研员，最近学校准备开展板块运动和地貌塑造主题的综合性项目学习。能不能从各个角度详细说说板块运动和地貌塑造的理论、典型地貌案例、跨学科融合方法、团队协作和创新表达活动设计？还希望听听怎么通过项目制培养学生科学精神、探究能力和团队合作意识。请自然融入中华优秀传统文化理念和社会主义核心价值观。
  - question: 我是初中生，最近地理作业让我们详细说说板块运动对地貌变化的影响。我对这部分知识不太熟悉。能详细说说板块运动怎么影响地貌吗？举几个典型例子帮我理解，最好再推荐一个简单的动手活动让我加深记忆。
  - question: 我是郑妍，55岁老师，长期做心理辅导和太极拳指导，条理性强，比较循规蹈矩，也很有教育理想。在学校是资深教师，经常为学生心理咨询，在教师群体里很有威望，也在养生社群做太极拳指导和食疗讲座。能帮我理解一下板块运动和地貌塑造的原理吗？最好能结合心理辅导和养生理念，推荐一些适合老年社群和学生的互动活动，让大家在学习地理时能体会到科学探索和身心健康的结合。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-初中-板块运动与地貌塑造进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像响应准确性_理由
    type: str
    description: 解释个性化画像响应准确性评分的详细理由，引用具体例子。
  - field: 个性化画像响应准确性
    type: float
    description: 教学内容和活动能根据学生的学习能力、兴趣、认知水平等差异进行针对性分层和动态调整。需在教学设计中明确体现分层方案，并根据学生反馈灵活优化教学流程，支持持续性个性化改进。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 教学设计严格按照要求的内容与结构分段，每个环节内容完整、条理清晰，流程顺序合理，格式一致，便于理解和执行。需避免环节遗漏和内容混杂。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 采用与初中地理学科特点高度契合的科学教学方法（如探究式、模型实验、情境模拟、启发式等），方法设计需促进学生主动探究、批判性思考，并能结合地理实际问题进行应用。高分要求教学方法能引发高阶思维、跨学科联系或真实生活情境迁移。
  - field: 知识结构与逻辑清晰度_理由
    type: str
    description: 解释知识结构与逻辑清晰度评分的详细理由，引用具体例子。
  - field: 知识结构与逻辑清晰度
    type: float
    description: 教学内容结构完整，层次分明，逻辑递进清晰。必须系统地呈现板块运动与地貌塑造的因果关系，并主动联系相关章节（如地震、火山、地貌类型）或跨学科知识，体现综合性与系统性思维。
  - field: 创新思维激发能力_理由
    type: str
    description: 解释创新思维激发能力评分的详细理由，引用具体例子。
  - field: 创新思维激发能力
    type: float
    description: 通过多层次开放性问题、探究任务等激发学生创新思考，鼓励独立见解和多角度分析。需设计至少两种创新任务或讨论形式，并引导学生对地理现象提出新观点或假设，避免仅表面创新。
  - field: 创造性表达与多样化呈现_理由
    type: str
    description: 解释创造性表达与多样化呈现评分的详细理由，引用具体例子。
  - field: 创造性表达与多样化呈现
    type: float
    description: 鼓励学生用多种方式（绘画、模型、故事、视频、演示等）表达对板块运动与地貌塑造的理解，表达作品需体现地理核心知识的应用或转化，评价标准不只限于形式多样，更重视内容深度和创新性。
  - field: 社会主义核心价值观及中华优秀传统文化融入_理由
    type: str
    description: 解释社会主义核心价值观及中华优秀传统文化融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观及中华优秀传统文化融入
    type: float
    description: 教学内容需自然融合社会主义核心价值观（如责任、合作、科学精神）与中华优秀传统文化，通过地理现象引发价值观和文化思考，避免机械灌输或形式化标语。高分要求价值观与学科内容深度结合并引发学生讨论。
  - field: 真实提问模拟与互动性_理由
    type: str
    description: 解释真实提问模拟与互动性评分的详细理由，引用具体例子。
  - field: 真实提问模拟与互动性
    type: float
    description: 教学设计主动模拟真实课堂的多层次提问和互动，涵盖师生问答、分组讨论、同伴互评等多种形式。需针对学生提问和反馈进行个性化回应，高分要求互动内容与地理核心问题紧密结合，并能激发学生深入探讨和交流。
  format_mode: prompt
