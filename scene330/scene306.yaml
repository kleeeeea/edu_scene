tasks:
  mode: iter
  content:
  - question: 我是小学体育老师，最近想在班里推广‘跟着音乐跳绳’活动，但我们学校学生体能差异大，家长也对新活动有些疑虑。你作为体育教育专家，能彻底说清楚怎么系统地设计和实施这项活动吗？包括课程目标、创新玩法、个性化适配、教学流程、兴趣激发和品格培养等多个方面，最好还能举些实际例子，具体说说收集反馈和调整课程的方法。
  - question: 我是邵广的家长，他今年6岁，上小学一年级，喜欢篮球、国际象棋和足球，学习和生活习惯都很自觉，家里三代同堂，平时由父母和祖父母一起照顾。你作为体育教育专家，能深入说说看：针对邵广的这些特点，‘跟着音乐跳绳’活动怎么设计更适合他？比如怎么结合他的兴趣、性格和家庭资源激发热情，活动里如何融入团队协作、自信心和传统文化，还有反思机制怎么安排，帮他持续成长？
  - question: 我是小学生家长，我家孩子性格有点内向，对体育不算特别感兴趣，但学习能力挺强。你作为体育学习助手，‘跟着音乐跳绳’活动怎么能激发他参与和团队合作？说说你的看法，最好能举些例子，顺便讲讲怎么把体育精神和传统文化融进去。
  - question: 我是一名小学体育老师，有些孩子在‘跟着音乐跳绳’时动作跟不上节奏，容易泄气。你会怎么帮助他们克服这些难题？能解释一下你的具体做法吗？最好说说怎么激发兴趣、自信心，以及师生怎么互动、收集反馈，让活动更有效，也能培养团队协作和体育精神。
  - question: 我在设计小学‘跟着音乐跳绳’活动，想让孩子们在运动中自然感受到社会主义核心价值观和中国传统文化。你作为体育课程顾问，帮我理解一下怎么把这些价值观和文化内容巧妙地融进活动，比如在音乐选择、团队合作、品格培养等方面。
  - question: 我是初二女生徐汀兰，平时喜欢穿搭和编程，对自己要求挺高，做事情喜欢有计划。你觉得‘跟着音乐跳绳’活动怎么才能让我更想参与？老师可以怎么做既能激发我的兴趣，又考虑我的个性，还能让我在团队合作和自我提升方面有收获？简单说说就行。
  - question: 我是WilliamsAaron，一名56岁的男老师，平时喜欢观鸟和下围棋，和学生及同事沟通都比较轻松直接。我想深入了解‘跟着音乐跳绳’在小学体育课里的创新设计和深层价值，尤其想知道怎么通过这个活动激发孩子们的创造力、团队协作和身心成长，还想听听如何把中国传统音乐和品格培养结合进去。你作为体育教学顾问，能详细说说这些方面的经验和做法吗？我想深入了解。
  - question: 我是初三女生汪蕾艳，爱好小提琴、瑜伽和羽毛球，平时在学校各种文艺活动很活跃，羽毛球也帮我认识了不少不同年级的同学。你是体育教育专家，能系统地讲解一下，像我这样的学生怎么通过‘跟着音乐跳绳’活动，把体育和艺术、团队合作、自我表达都结合起来？希望内容全面一点，比如课程目标、创新设计、个性激励、反馈机制和价值观、传统文化的融入等，想听听你的专业建议。
  - question: 我是老师，最近在研究小学‘跟着音乐跳绳’这类创新体育活动。你能概括一下它有哪些创新点，以及对学生综合素养（比如团队合作、创造力、体育精神、传统文化）的促进作用吗？
  - question: 我是WhiteKenneth，高一男生，平时喜欢羽毛球和跆拳道，学习喜欢自己摸索，思路清晰但有时注意力不太集中，也挺重视自己空间。‘跟着音乐跳绳’活动能怎么适配我这样的性格和兴趣？老师在活动中可以设计哪些环节让我发挥优势、克服注意力波动，同时还能自我突破和学会团队协作？详细说说。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 体育-小学-跟着音乐跳绳进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化学生画像适配度_理由
    type: str
    description: 解释个性化学生画像适配度评分的详细理由，引用具体例子。
  - field: 个性化学生画像适配度
    type: float
    description: 教学设计需充分结合学生年龄、性别、体能、兴趣、学习风格等多元特征，针对不同群体进行差异化分层教学，并在活动过程中根据学生反馈动态调整方案，确保每位学生都能获得个性化发展机会。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 教学方案需严格按照任务要求结构编写，涵盖准备活动、音乐选择、跳绳方法、创新活动、总结反馈等所有核心环节，并在每一环节中明确目标、操作流程及评价标准，结构清晰，便于实施与评估。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 教学方法需符合小学体育教育规律，注重安全防护、分层分步指导、循序渐进与趣味性，并通过科学的活动设计促进学生跳绳技能、身体素质和自信心的全面发展。
  - field: 教学内容专业深度_理由
    type: str
    description: 解释教学内容专业深度评分的详细理由，引用具体例子。
  - field: 教学内容专业深度
    type: float
    description: 教学内容需结合体育学、音乐学和小学生生理心理发展理论，深入阐释音乐与跳绳结合的科学原理，并通过专业知识制定具体、可操作的实践建议，体现理论联系实际的深度。
  - field: 创新性活动引导_理由
    type: str
    description: 解释创新性活动引导评分的详细理由，引用具体例子。
  - field: 创新性活动引导
    type: float
    description: 教学设计需鼓励学生自主探索和创新，设置多样化的创新活动，如自创跳绳动作、音乐选择、团队创意展示等，并引导学生主动表达、合作、分享创新成果，促进创造力和团队协作能力提升。
  - field: 创造力激发语言表现_理由
    type: str
    description: 解释创造力激发语言表现评分的详细理由，引用具体例子。
  - field: 创造力激发语言表现
    type: float
    description: 教学语言需具备启发性和针对性，具体鼓励学生结合个人兴趣、特长进行创新实践，并能引导学生提出改进建议、反思创新过程，激发主动思考和创造行动。
  - field: 社会主义核心价值观自然融入_理由
    type: str
    description: 解释社会主义核心价值观自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观自然融入
    type: float
    description: 教学内容与活动需在具体环节和行为中自然融入团结协作、互助友爱、积极进取等社会主义核心价值观，通过实际任务、合作挑战等方式促进学生品格发展，避免口号化或形式主义。
  - field: 中华优秀传统文化润物细无声传承_理由
    type: str
    description: 解释中华优秀传统文化润物细无声传承评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化润物细无声传承
    type: float
    description: 教学环节需自然融合中华优秀传统文化元素，如传统体育精神、民间音乐、礼仪规范等，通过具体活动与细节设计使学生在跳绳过程中潜移默化感受和传承中华文化，避免生硬灌输或形式化。
  - field: 教学反思与反馈机制_理由
    type: str
    description: 解释教学反思与反馈机制评分的详细理由，引用具体例子。
  - field: 教学反思与反馈机制
    type: float
    description: 教学方案需明确包含师生互动与反馈收集措施，关注学生真实体验与需求，及时反思教学过程并据此调整方案，形成持续优化机制以提升教学质量。
  format_mode: prompt
