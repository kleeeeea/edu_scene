    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为德育美育-初中-中外经典建筑欣赏与比较（美育）教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 你作为美育专家，我最近在初中美育课上学到中国的故宫和法国的巴黎圣母院，但我还不太清楚该怎么从美育角度欣赏和对比它们。能解释一下这两座建筑的美学特点、历史价值和各自的文化精神吗？详细讲讲，举些例子让我容易理解。
  - question: 你是教学顾问，我带的班有几个对建筑很感兴趣但表达能力一般的学生。最近讲到埃及金字塔和北京天坛，他们总抓不住重点，你能简短回答下这两种建筑在结构和审美上的主要差别吗？说清楚主要点，让学生好理解。
  - question: 你是美育课程设计专家，我是初中美育教研员，最近要推动‘中外经典建筑欣赏与比较’校本课程。希望让不同类型学生都能深入理解建筑艺术，还要结合德育、历史、地理等学科。能不能系统地讲解一下，怎么分层设计赏析课程、针对不同学生类型给出活动建议、如何自然融合核心价值观和传统文化，还有哪些创新教学方法或项目值得尝试？彻底说清楚，内容要全面具体。
  - question: 我是一名初二学生，喜欢画画和世界建筑。老师让我们比较中国的长城和意大利的比萨斜塔，也要思考它们的美学和历史价值。你能讲讲看这两座建筑在造型、功能和文化意义上的不同吗？说具体点，举点例子让我容易理解。
  - question: 我是一名初中生家长，孩子喜欢用乐高搭建筑，但对历史文化不太懂。最近美育课学到英国大本钟和中国天坛，他问我有什么不一样，我也说不清。你作为美育专家能解释一下这两座建筑的风格、象征意义和社会价值吗？详细说说，帮我们理解。
  - question: 你是美育教学助手，我是初中美术老师，班里有些同学觉得‘中外经典建筑’没意思，就是死记硬背。你能简单说说，为什么要学习和比较这些建筑？对学生美育和德育有什么实际意义？说说主要点就行。
  - question: 我是沈秀，45岁男老师，性格温和、同理心强，平时话不多但和学生关系很好，教学风格比较放任。最近发现学生对‘中外经典建筑欣赏与比较’兴趣不高，只看外观，忽略历史文化。我希望用创新项目化方法提升他们的思辨和参与度。你作为美育专家，能彻底说清楚怎么结合我的风格设计分层活动吗？针对视觉型、动手型和逻辑型学生分别给些建议，再讲讲怎么润物细无声地融入核心价值观和传统文化，还推荐几个适合登山、围棋兴趣的美育融合活动。要求内容创新具体，结构分明。
  - question: 我是袁爱，17岁高二女生，动漫设计和舞蹈都很喜欢，在社团常带队比赛，平时竞争意识强也很注重和同学的关系，但专注力有点起伏。美育课要做‘中外经典建筑欣赏与比较’活动，我想结合动漫和建筑，但又担心和同学竞争时没新意。你作为美育专家，能讲清楚点吗？比如怎么把动漫和建筑欣赏结合，团队里怎么兼顾创新和协作，舞蹈怎么表现建筑美感，还有提升专注力的小建议。最好举些具体案例和做法。
  - question: 我是邓梓萌，五年级女生，喜欢中国风爵士舞和唱歌，是学校舞蹈社的领舞，经常自己制定练习时间表。老师最近让我们做‘中外经典建筑欣赏与比较’项目，要用舞蹈表现建筑美感。我有点不确定怎么设计舞蹈动作，也不太懂怎么表达中外建筑特点。你作为美育学习助手，能深入说说看吗？比如怎么选建筑和舞蹈主题、动作和队形怎么表现结构美和文化内涵，还能给我些团队合作和自我规划的小技巧吗？举些例子说明就更好了。
  - question: 我是秦雨嫣，33岁老师，喜欢戏剧表演和茶艺，管理风格注重框架但细节随性，在教师群体里挺有威信。最近要带初中生做‘中外经典建筑欣赏与比较’美育项目，希望把戏剧、茶艺兴趣融入课堂，还要提升学生审美和批判性思维。你作为美育教学专家，能详细展开说说吗？比如怎么融合戏剧、茶艺和建筑欣赏，如何引导不同层次学生表达和创新，怎么自然结合核心价值观和多元文化，再给点团队管理和激励的建议。结构清楚些，内容具体点。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-初中-中外经典建筑欣赏与比较（美育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评估教学内容与方法能否针对学生兴趣、认知风格、能力层次等多维画像，至少在三个环节主动调整学习任务、评价标准或反馈方案，持续关注个体成长，并记录调整依据。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 评估教学设计是否严格遵循指定格式、步骤和结构，所有教学材料、活动方案均分段、标明标题，内容要素齐全，流程规范且易于复用。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学方法是否系统整合美育、德育教育学原理，包含观察、互动、探究、创造等多环节，且根据学生反馈至少调整一次流程，促进审美、道德及综合能力发展。
  - field: 专业性与学科融合度_理由
    type: str
    description: 解释专业性与学科融合度评分的详细理由，引用具体例子。
  - field: 专业性与学科融合度
    type: float
    description: 评估教学内容是否深入准确体现美育学科知识，系统融合德育、历史、地理等多学科，至少设计一个跨学科探究活动，并能阐释融合点的实际意义。
  - field: 创新思维激发与创造性任务设计_理由
    type: str
    description: 解释创新思维激发与创造性任务设计评分的详细理由，引用具体例子。
  - field: 创新思维激发与创造性任务设计
    type: float
    description: 评估教学是否持续引导学生提出新观点，设计开放性任务激发主动探索、独立思考和创造性实践，允许多样化成果表达，并持续跟踪与评价创新表现。
  - field: 社会主义核心价值观融入度_理由
    type: str
    description: 解释社会主义核心价值观融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入度
    type: float
    description: 评估教学内容是否自然、深入地融入社会主义核心价值观及中华优秀传统文化，通过建筑比较、美育活动实现价值引导，并在课堂活动中检验学生价值观理解与行为转化。
  - field: 模拟真实提问互动深度_理由
    type: str
    description: 解释模拟真实提问互动深度评分的详细理由，引用具体例子。
  - field: 模拟真实提问互动深度
    type: float
    description: 评估教学回应是否能根据真实课堂场景下学生提出的多样化问题，结合学生认知水平、兴趣和需求进行系统、深入、个性化解答，并在至少两个环节鼓励持续提问和深入探究，体现互动深度与广度。
  format_mode: prompt
