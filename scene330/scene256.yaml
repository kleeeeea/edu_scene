tasks:
  mode: iter
  content:
  - question: 我是一名初中政治老师，班里既有很活跃喜欢讨论的同学，也有喜欢安静思考的学生。你能全面分析一下‘法官’和‘警察’在司法机关里的分工、职责、权力边界和工作流程吗？另外，能结合不同性格的学生，帮我设计一个既能让外向同学积极参与、又能让内向同学安心体验的角色扮演教学活动，让大家都能体会法治和社会责任吗？
  - question: 我是初中政治课备课老师，发现学生总把‘法官’和‘警察’的分工搞混，你能大概讲讲他们在司法机关里的主要分工和职责吗？最好用一个简单的小组角色扮演例子帮我说明下，让孩子们容易理解。
  - question: 我是初中政治教研员，学校现在鼓励跨学科项目式教学。你能全方位地讲解一下‘法官’和‘警察’在司法机关中的分工、职责、权力边界和工作流程吗？另外，能融合历史、社会学、心理学等知识，帮我设计一个跨学科的角色扮演和探究活动，让不同兴趣和能力的学生都能积极参与并体验法治和社会责任吗？请详细说说教学目标、活动流程、分组和评价机制。
  - question: 我在教学中发现学生经常误解‘法官’和‘警察’的工作。你能深入讲解一下他们在司法机关里的分工、职责、权力边界和工作流程吗？另外，能结合合作学习和同伴互评，帮我设计一个能让学生深入体验司法角色的活动方案，并在活动中自然融入法治和社会责任吗？
  - question: 我是卢冰琳，14岁，初二女生，喜欢科学实验、烘焙和园艺，和同学关系很好，也常和家人分享烘焙作品。你能详细说说‘法官’和‘警察’在司法机关里的分工、职责和权力边界吗？另外，能结合我的兴趣和性格，帮我设计一个和科学实验或园艺有关的角色扮演活动，让我能和同学一起体验法治精神和社会责任，并和家人分享学习收获吗？
  - question: 我是刚参加工作的小学政治老师，想给学生普及一下‘法官’和‘警察’在司法机关里的分工和职责，你能概括一下吗？最好能举个简单的课堂活动例子，让学生容易理解。
  - question: 我是初中政治课老师，班里有喜欢小组合作、善于表达的同学，也有几个安静内向的学生。你能详细说说‘法官’和‘警察’在司法机关里的分工、职责和权力边界吗？另外，能帮我设计一个让表达型和内向型学生都能参与的角色扮演活动，注重法治体验和同伴互助吗？
  - question: 我是初中政治老师，最近想让学生真正理解‘法官’和‘警察’在司法机关里的区别和联系。你能帮我理解一下他们各自的分工、职责和权力边界吗？另外，能推荐一个能激发学生自主探究和团队协作的教学活动，让法治和社会责任自然融入学习吗？
  - question: 我是范岚裳，25岁小学老师，喜欢园艺、健美操和数字游戏，性格有些选择性倾听和边界模糊，但教学热情很高也很包容，常和同事、社区伙伴一起活动。你能详细分析下‘法官’和‘警察’在司法机关里的分工、职责、权力边界和工作流程吗？另外，能结合我的兴趣和性格，帮我设计一个融合园艺、健美操和数字游戏元素的多元角色扮演教学活动吗？希望教学目标、流程、分组和评价机制都能体现法治精神、社会责任和包容开放的理念。
  - question: 我是初中政治老师，班里既有喜欢团队合作的同学，也有喜欢独立思考的学生。你能讲讲看‘法官’和‘警察’在司法机关里的分工、职责和权力边界吗？另外，能帮我设计一个既鼓励合作又能支持个人表达的角色扮演活动，让大家都能体验法治精神并体现自己的特点吗？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 政治-初中-“法官”与“警察”：司法机关的角色扮演进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 教学设计需基于学生性格、兴趣、能力等多维度差异，进行有针对性的角色分配、任务调整和反馈，确保每位学生都获得适合自身成长路径的学习体验，并有机会突破自我局限。
  - field: 活动参与度与包容性_理由
    type: str
    description: 解释活动参与度与包容性评分的详细理由，引用具体例子。
  - field: 活动参与度与包容性
    type: float
    description: 教学活动需为所有学生提供均等、积极的参与机会，关注不同性格、能力学生的表达和展示空间，设置多样化参与方式，主动预防和干预‘边缘化’或‘沉默’现象。
  - field: 创新性思维激发_理由
    type: str
    description: 解释创新性思维激发评分的详细理由，引用具体例子。
  - field: 创新性思维激发
    type: float
    description: 教学活动需设置开放性、挑战性任务，鼓励学生提出新观点、跨学科整合、质疑权威并尝试多元解决方案，评价不仅关注答案，更重视思考过程和创新表现。
  - field: 格式与结构规范性_理由
    type: str
    description: 解释格式与结构规范性评分的详细理由，引用具体例子。
  - field: 格式与结构规范性
    type: float
    description: 教学设计需严格遵循既定教学流程结构，内容安排条理清晰、层次分明，各环节间逻辑衔接自然，便于教师实施和学生理解。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 教学活动需综合运用多种科学教育方法（合作、探究、反思、评价等），并能根据学生实际灵活调整，促进学生认知、合作与自我提升，避免方法单一或形式化。
  - field: 真实情境与提问模拟度_理由
    type: str
    description: 解释真实情境与提问模拟度评分的详细理由，引用具体例子。
  - field: 真实情境与提问模拟度
    type: float
    description: 情境与问题设计需高度贴近学生实际生活或社会热点，语言自然，问题具有挑战性和开放性，能激发学生的真实兴趣和参与欲望，提升司法模拟的真实性。
  - field: 价值观融入的自然性与渗透度_理由
    type: str
    description: 解释价值观融入的自然性与渗透度评分的详细理由，引用具体例子。
  - field: 价值观融入的自然性与渗透度
    type: float
    description: 社会主义核心价值观与中华优秀传统文化应在具体案例和角色体验中自然融入，通过情境引导学生自主体会公平正义、责任担当等价值观，避免生硬灌输和形式主义。
  - field: 专业知识深度与应用性_理由
    type: str
    description: 解释专业知识深度与应用性评分的详细理由，引用具体例子。
  - field: 专业知识深度与应用性
    type: float
    description: 教学内容需准确、深入区分法官与警察等司法角色职责，结合具体案例进行分析，引用相关法律条文，展示推理、判断和法律适用能力，避免知识表面化或混淆。
  format_mode: prompt
