tasks:
  mode: iter
  content:
  - question: 我是小学三年级的英语老师，班上有个叫小轩的男孩，性格很内向，喜欢画画但不敢主动和同学交流。最近学校组织了‘购物英语情景对话’活动，他很害羞，不敢开口。你作为小学英语教育专家，能具体说说吗，帮我设计一个适合小轩参与的购物英语日常对话模拟方案，同时给出鼓励和引导的教学互动建议，并注意融入友善互助、尊重他人的中华传统文化价值观。
  - question: 我是五年级学生的妈妈，我家孩子叫乐乐，活泼好动，喜欢小动物，英语口语基础一般，但很乐于和同学一起玩。最近英语老师布置了‘在公园遇到新朋友’的情景对话作业。你作为小学英语学习助手，详细说说怎么指导乐乐用英语和新朋友在公园里展开友好、有趣的对话，并在内容里自然融入中华传统的友善、礼貌和分享等价值观。
  - question: 你作为小学英语教学顾问，郑雅爱是一位46岁的男模特，中文母语，性格依赖他人整合，热爱健身塑形和时尚搭配，交际圈以时尚界为主，经常与造型师和健身教练沟通。他想为小学英语课堂设计一个‘在健身房打招呼并交流兴趣爱好’的日常英语情景对话。简要说明下，提出包含社交礼仪与互助精神的具体对话建议。
  - question: 我是刚入职的小学英语老师，班上有一组喜欢阅读但英语口语表达较弱的同学，最近学校开展‘图书馆借书英语对话’情景活动。我希望让学生们在真实交流中提升表达能力。你作为小学英语教学专家，详细讲讲怎么设计一套完整的图书馆日常英语对话模拟方案，最好包含师生互动、分组协作、开放式提问和中华传统尊重知识、乐于助人的价值观渗透。
  - question: 你作为小学英语教师，赵炳是一位初三男生，喜欢乒乓球和编程（Python/Scratch），性格混合记忆型、随机应变，常在编程课堂上表现活跃，也会和同学一起打乒乓球。讲清楚点，帮我设计一个‘在体育馆邀请同学一起打乒乓球’的英语情景对话，并结合他的兴趣和性格特点，给出鼓励自信表达和合作精神的引导建议，同时融入中华优秀品德如团结协作和诚实守信。
  - question: 我是小学英语课程负责人，发现学生们在‘家庭日常交流’英语对话练习时，容易机械背诵而缺乏真实互动。你作为英语教学专家，彻底说清楚怎么设计一套‘在家里和家人交流一天生活’的英语日常情景对话活动，包括师生角色扮演、互动反馈、开放式提问、文化融合等环节，并自然融入中华家庭亲情、尊长爱幼、互助关怀等核心价值观。
  - question: 我是一名小学英语教研员，最近观察到部分低年级学生在‘问路’情景对话中表达不够自信，容易紧张。你作为英语教学专家，讲讲看怎么设计一个‘在校园里用英语问路’的日常情景对话模拟方案，侧重鼓励学生勇敢表达、互相帮助，并通过对话过程自然渗透中华传统友善礼让、互助合作的品德。
  - question: 我是小学英语老师，班上有几位刚转学来的学生，英语基础较弱但很渴望融入新环境。你作为英语教学专家，全面分析一下怎么设计一个‘在教室里和新同学自我介绍并表达兴趣爱好’的英语情景对话教学方案，重点包括师生互动、同伴鼓励和中华传统包容、尊重多样性的价值观。
  - question: 我是新来的小学英语老师，你作为教学顾问，能帮我系统地讲解一下‘在餐厅点餐’这一主题的英语情景对话教学设计吗？从各个角度详细说说，包括师生互动、角色轮换、文化礼仪、鼓励学生自信表达，以及中华传统的礼貌待人、尊重服务人员的品德渗透。
  - question: 我是小学四年级学生，想在英语课上和同学练习‘在超市购物’的情景对话。你作为英语学习助手，简要说明下怎么设计一个简单有趣的英语对话，并在过程中融入互助友爱的中华传统美德。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-小学-日常情景对话模拟进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评估内容是否根据学生年龄、兴趣、学习基础等个体特征进行差异化设计，体现对学生多维特征的精准响应。高分需针对具体学生画像进行内容调整，低分为模板化或无针对性设计。
  - field: 格式与指令遵循度_理由
    type: str
    description: 解释格式与指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与指令遵循度
    type: float
    description: 内容需严格遵循系统指定的输出格式与流程，包括角色标注、对话轮次、结构规范、语言准确等。高分需全程规范无遗漏，低分为角色错乱、轮次混乱或格式严重缺失。
  - field: 教学目标契合性_理由
    type: str
    description: 解释教学目标契合性评分的详细理由，引用具体例子。
  - field: 教学目标契合性
    type: float
    description: 内容需紧扣小学英语教学目标，如基础词汇、常用句型、生活交流等，难度适中。高分需覆盖教材重点并适合学生实际水平，低分为超纲或与教材要求偏离。
  - field: 互动引导有效性_理由
    type: str
    description: 解释互动引导有效性评分的详细理由，引用具体例子。
  - field: 互动引导有效性
    type: float
    description: 教师通过开放性问题、鼓励性反馈、追问等方式激发学生表达与思考。高分需多轮互动、引导深入、鼓励学生表达个性观点，低分为机械问答或无有效互动。
  - field: 创造力激发度_理由
    type: str
    description: 解释创造力激发度评分的详细理由，引用具体例子。
  - field: 创造力激发度
    type: float
    description: 对话需为学生提供创新表达空间，鼓励发挥想象力、表达独特观点或自由描述。高分为有创意任务或开放表达环节，低分为仅机械背诵或固定问答，无创新机会。
  - field: 情景真实性与贴近生活_理由
    type: str
    description: 解释情景真实性与贴近生活评分的详细理由，引用具体例子。
  - field: 情景真实性与贴近生活
    type: float
    description: 对话场景需贴合中国小学生真实生活，如校园、家庭、社区等，细节自然可信。高分需细节丰富、场景真实，低分为虚假场景或细节缺失。
  - field: 中华优秀传统文化与价值观融入_理由
    type: str
    description: 解释中华优秀传统文化与价值观融入评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化与价值观融入
    type: float
    description: 内容需自然融入中华优秀传统文化或社会主义核心价值观，如传统节日、家乡习俗、友善互助等，表达细腻生动。高分为文化元素融合自然、表达有深度，低分为无文化元素或生硬插入口号。
  format_mode: prompt
