agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为化学-小学-家庭安全趣味实验指导教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高一女生孙茜，喜欢3D建模、美妆和跑步，逻辑性强但总需要外部监督。家里经常和妈妈聊创作，也在同学圈靠美妆和分析能力挺受欢迎。最近想在家做些安全又有趣的小学化学实验，最好能结合我的兴趣，也不希望家里弄得太乱。你作为家庭安全顾问，能简单说说有哪些适合我的家庭安全趣味化学实验吗？简单说说就行。
  - question: 我是小学三年级班主任，最近班里孩子都特别喜欢在家做化学小实验，但有家长很担心安全，比如怕孩子模仿动画片里的危险动作，或者用错家里的清洁用品。你作为科学实验导师，能不能深入聊聊家庭安全趣味化学实验的设计原则、常见误区、安全管控、家长引导方式，以及怎么通过实验让孩子自然学到安全意识和传统美德？我想深入了解。
  - question: 我是五年级学生的爸爸，最近发现孩子在家做趣味化学实验时注意力总不太集中，玩一会就停下来，还会把材料弄得到处都是。你作为家庭安全教育专家，能不能给我讲清楚点，怎么引导孩子在家既安全又有趣地做化学实验，还能养成专注和整洁的习惯？最好能举些具体例子。
  - question: 我是小学科学教研员，最近家长反映有些孩子在家做化学实验时，喜欢自己创新实验步骤和材料，还会用厨房里的调味品甚至家电。你作为教育专家，能不能深入说说看，怎么评价和引导孩子的实验创新行为，既能保障安全又鼓励探索？另外，家庭实验活动怎么培养孩子的科学精神、责任感和亲情？最好有具体案例和分层建议。
  - question: 我是初三男生韩腾岳，喜欢轮滑和乒乓球，抗干扰能力强又很自律，是轮滑社团的活跃分子，平时妈妈照顾我，爸爸只有周末才有时间陪伴。你作为家庭安全化学实验指导专家，能不能详细分析下，像我这种初中生该怎么设计既安全又有趣的家庭化学实验方案？希望能从运动兴趣、时间安排、亲子互动、安全风险把控，以及怎么在实验里自然融入节约资源、团队合作等价值观各个方面都说说。详细分析下各个方面吧。
  - question: 我是小学四年级女生的妈妈，孩子最近爱看自然科学视频，还常常约小区小伙伴一起做实验。你作为科学实验导师，能具体说说吗，哪些家庭化学实验适合几个孩子一起做，怎么确保安全、培养团队协作，同时让孩子们在实验里体会到互助和友爱的意义？
  - question: 我是小学科学老师寇钢运，喜欢机械键盘改装和3D建模，平时工作和生活都比较独立但很重视仪式感。最近想让学生做家庭安全化学实验，但又怕有些孩子因为疏忽或者家长没管好出现安全问题。你作为小学科学教师，能说说主要的家庭安全风险点，以及老师和家长应该特别注意哪些细节吗？说说主要的就行。
  - question: 我是59岁的女老师赵瑾萱，喜欢自然观察和太极拳，教学很有热情，但和家长沟通时总是习惯迎合，做决策也挺被动。最近学校鼓励老师带学生做家庭趣味化学实验，我有点犹豫，不太确定怎么平衡实验创新、学生安全和家长诉求。你作为家庭安全教育顾问，能说说你的看法吗？希望能结合我的性格和实际情况给出具体建议，并举例说明。
  - question: 我是初二女生周瑜沛，喜欢书法和阅读，创新能力很强，学习表现也一直很优秀，经常代表学校参加书法比赛，父母每天晚上都会指导我作业。你作为家庭安全趣味实验指导专家，能不能从各个角度详细说说，像我这样有创新和多元兴趣的初中女生怎么设计家庭化学实验，既能保证安全又能激发创造力？尤其希望能结合书法和阅读，促进科学素养、亲子互动和传统美德。请从各个角度详细说说吧。
  - question: 我是小学一年级学生的家长，最近孩子在家用食醋和小苏打做气球膨胀实验时，总喜欢把过程拍下来，还加上自己的解说词和小画。你作为家庭安全顾问，能不能讲清楚点，这种实验要注意哪些安全问题？怎么引导孩子在拍摄和创作时保护自己，同时又能激发他们表达和动手能力？希望能有具体建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 化学-小学-家庭安全趣味实验指导进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与回应_理由
    type: str
    description: 解释个性化画像识别与回应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与回应
    type: float
    description: 根据学生年龄、兴趣、认知水平等多维特征，动态调整实验内容、表达方式和互动策略。要求能主动收集并分析学生信息，针对不同学生展示差异化指导和反馈，体现持续的个性关注和适应性，而不仅仅是简单分层。
  - field: 严格遵循格式与指令_理由
    type: str
    description: 解释严格遵循格式与指令评分的详细理由，引用具体例子。
  - field: 严格遵循格式与指令
    type: float
    description: 内容结构必须完全符合指定环节和顺序，所有标题、编号清晰，环节内容完整无缺漏。语言规范简明，每一环节相互独立且逻辑递进，无重复或混乱。评分时关注细节落实和排版准确性。
  - field: 科学性与专业性_理由
    type: str
    description: 解释科学性与专业性评分的详细理由，引用具体例子。
  - field: 科学性与专业性
    type: float
    description: 实验内容和原理解释必须符合小学科学教育标准，表述准确、深入，能够辨析和纠正常见误区。实验方法科学、安全，材料选择适宜，无隐患。能主动延伸说明相关科学知识，促进迁移应用。
  - field: 教学方法多样性与适宜性_理由
    type: str
    description: 解释教学方法多样性与适宜性评分的详细理由，引用具体例子。
  - field: 教学方法多样性与适宜性
    type: float
    description: 根据学生特点灵活采用多种教学方法，融合故事、游戏、角色扮演、问答、竞赛等，注重趣味性和互动性。能评价并调整方法效果，促进理解和能力提升。要求不仅‘有用’，还‘用得好’。
  - field: 安全教育与风险提示_理由
    type: str
    description: 解释安全教育与风险提示评分的详细理由，引用具体例子。
  - field: 安全教育与风险提示
    type: float
    description: 对实验各环节潜在风险进行细致分析，每一步均提供具体可操作的安全提示。安全方案需针对不同年龄段差异化，明确家长职责，并包含详细应急处理措施。评分时关注安全细节和实用性。
  - field: 创新思维激发_理由
    type: str
    description: 解释创新思维激发评分的详细理由，引用具体例子。
  - field: 创新思维激发
    type: float
    description: 设置开放性探究问题、变式实验、自主设计任务等，鼓励学生主动思考、假设和创新表达。要求引导学生记录、分享不同结果，并能跨学科联想和持续探究，避免仅给标准答案。
  - field: 模拟真实问题回应能力_理由
    type: str
    description: 解释模拟真实问题回应能力评分的详细理由，引用具体例子。
  - field: 模拟真实问题回应能力
    type: float
    description: 能预判并主动回应学生或家长在实验操作中常见疑问、困惑或误区，提供具体可行的解决方案。要求解答细致、专业、贴心，覆盖操作细节和原理层面，体现对真实场景的深度把控。
  - field: 社会主义核心价值观与中华文化润物无声融入_理由
    type: str
    description: 解释社会主义核心价值观与中华文化润物无声融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华文化润物无声融入
    type: float
    description: 在内容中自然融入尊重科学、合作创新、劳动创造等核心价值观，体现中华优秀传统文化（如勤劳智慧、家校协作、节俭环保），表达流畅无生硬堆砌。重视情感体验和价值认同，避免仅形式化植入。
  format_mode: prompt
