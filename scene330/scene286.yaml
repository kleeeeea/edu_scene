    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为德育美育-初中-校园美化方案设计（美育）教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 你作为美育专家，我是一名39岁的女教师JonesBella，最近因为教学压力大，工作风格也比较放任，但我喜欢水彩画、技能学习和园艺，把这些当做缓解疲劳的方式。现在我要参与初中校园美化方案设计，但团队合作不够顺畅，加上我习惯自我节奏和创造表达，方案推进得很慢。你能结合我的兴趣和性格，深入讲解一下校园美化方案设计的全过程吗？最好从前期调研、团队协作、创新激发到落地执行都详细说说，也帮我看看怎么在方案里融入美育和价值观，还能激励学生审美和责任意识。能深入讲解一下吗
  - question: 我是一名初中美育教研员，最近发现学生们在做校园美化方案设计时总是不太主动，创意也不多，团队协作还经常有分歧。你作为校园设计顾问，讲讲看怎么分阶段引导他们主动探索、提升审美素养，还能解决团队里的冲突？讲讲看
  - question: 我是初中班主任，第一次带队做校园美化方案设计，有点没底。你作为美育领域的学习助手，能用几句话说说校园美化方案设计的核心流程和注意事项吗？用几句话说说
  - question: 我是一名初中美术老师，最近带学生做校园美化方案设计，发现大家对中华传统美育元素不太了解，也不知道怎么把它们融入设计里。你作为美育专家，能解释一下怎么把中华优秀传统美育和核心价值观自然地融合进校园美化设计吗？能解释一下吗
  - question: 你作为校园美育领域的高级咨询师，我是雷琪亦，38岁的女老师，喜欢舞蹈、硬笔书法和方言研究，性格有点固化但也喜欢革新，平时常参加社区舞蹈和书法小组。最近学校让我主导初中校园美化方案设计，可我在传统和创新之间总是难以平衡，团队里也有分歧，大家对美育价值观的融入没什么共识。你能结合我的兴趣、性格和社交背景，给我一份完整的分析吗？想系统梳理一下设计流程、团队协作、价值观融合、创新方法和落地要点，还有怎么通过故事或案例启发大家理解美和公共责任。给我一份完整的分析
  - question: 我是初中学生家长，发现孩子在做校园美化方案设计的时候总不太自信，容易被动，也不敢表达自己的想法。你作为美育专家，能具体说说有什么方法可以帮学生在团队里建立自信、激发创新，还能主动承担公共责任吗？能具体说说吗
  - question: 你作为美育专家，我是初中学校美育负责人，最近学校要整体升级校园环境，希望通过美化方案提升学生审美和团队协作。能系统地讲解一下校园美化方案设计的科学流程、创新方法、分阶段实施要点和团队协作机制吗？最好结合一下核心价值观和中华美育元素。系统地讲解一下
  - question: 我是初中班级美化小组的指导老师，最近发现学生们做方案设计时总喜欢模仿别人，创新不够。你作为美育领域专家，我想深入了解怎么通过分阶段引导、资源推荐和团队激励，有效提升学生在校园美化方案里的创新能力和审美素养。能详细说说吗？我想深入了解
  - question: 我是初中美育老师，发现学生做校园美化方案设计时只关注外观美，容易忽视公共责任和团队协作。你作为美育专家，帮我理解一下怎么在设计过程中自然融入公共责任和协作意识，同时提升审美素养。帮我理解一下
  - question: 你作为美育专家，我是DavisAdam，54岁的男教师，喜欢无人机摄影、游泳和收藏古物，教学风格结构化又灵活，喜欢实际和创新结合。最近我负责初中校园美化方案设计，团队成员各有特长但分工不太清晰，推进有点慢。你能用几句话说说怎么结合我的兴趣和教学风格，快速提升团队协作效率，还能激发学生创新吗？用几句话说说
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-初中-校园美化方案设计（美育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化学生画像匹配度_理由
    type: str
    description: 解释个性化学生画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化学生画像匹配度
    type: float
    description: 评估校园美化方案是否基于学生兴趣、能力、性格等多维度建立详细画像，分阶段动态收集和更新学生特征信息，并据此设计差异化任务、参与机制和激励措施，关注个体持续成长与反馈。高分要求方案全过程体现学生个性差异的动态适配与成长跟踪，低分仅为表面或一次性收集、无实际应用。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 评估方案内容是否严格按照规定格式、结构和要素完整性要求进行分点组织，标题分明、层次清晰、内容无遗漏，便于教师和学生查阅、理解和高效执行。高分需体现结构的系统性与规范性，低分表现为结构混乱、要素缺失或表述不清。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估方案是否采用与初中生发展阶段相匹配的先进教学方法（如项目式学习、分层指导、合作探究、反思总结等），并在全过程中体现探究性、反思性和自主性，结合美育理论促进学生创新能力和综合素养发展。高分要求多元方法融合、环节设计科学、促进学生深度学习，低分为机械执行、缺乏探究与反思。
  - field: 过程指导与支持充分性_理由
    type: str
    description: 解释过程指导与支持充分性评分的详细理由，引用具体例子。
  - field: 过程指导与支持充分性
    type: float
    description: 评估教师在美化方案实施全过程中是否提供具体、持续、分阶段的指导与支持，包括资源推荐、阶段反馈、个体辅导、问题排查与激励等。高分需体现指导的系统性、个性化和及时性，低分表现为指导表面化或缺失。
  - field: 创新思维激发程度_理由
    type: str
    description: 解释创新思维激发程度评分的详细理由，引用具体例子。
  - field: 创新思维激发程度
    type: float
    description: 评估方案是否通过多元机制（如创意竞赛、开放主题、跨学科合作等）持续激发学生提出独特新颖的美化创意，支持多样表达和自主探索，避免模板化或应付式完成。高分强调创新机制和成果多样性，低分表现为执行标准模板、限制创意表达。
  - field: 开放性问题设置_理由
    type: str
    description: 解释开放性问题设置评分的详细理由，引用具体例子。
  - field: 开放性问题设置
    type: float
    description: 评估方案是否设计具有开放性、探究性的问题或任务，鼓励学生主动思考、表达观点和多样化解决方案，促进批判性和创造性思维。高分需体现多层次开放问题设计并引导深入讨论，低分仅有标准化、封闭式作业。
  - field: 社会主义核心价值观融入度_理由
    type: str
    description: 解释社会主义核心价值观融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入度
    type: float
    description: 评估方案是否系统且自然地将社会主义核心价值观（如美丽校园、团结协作、绿色环保、尊重传统文化等）贯穿于设计、实施和宣传各环节，推动思想引领与文化传承。高分需有具体举措和实际成效，低分仅停留在口号或完全缺失。
  - field: 模拟真实提问回应能力_理由
    type: str
    description: 解释模拟真实提问回应能力评分的详细理由，引用具体例子。
  - field: 模拟真实提问回应能力
    type: float
    description: 评估方案能否针对师生在实际操作中提出的具体问题（如预算、材料选择、风格融合等）做出专业、深入、可操作的解答，并结合实际案例或数据提供解决方案。高分为多角度、具体、创新回应，低分为泛泛而谈、无实际指导意义。
  format_mode: prompt
