agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为英语-高中-跨文化交际与背景知识应用教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我刚成为高中英语老师，现在主要负责跨文化交际和背景知识应用的教学。你作为教育专家，能不能详细分析下在中国高中英语课堂推进跨文化交际教学的各个方面？比如科学教学设计、学生怎么主动参与、多样化评价怎么做、创新案例有哪些，还有怎么融合中国和西方文化的具体实践。详细分析下各个方面。
  - question: 我是MartinezMadison，54岁英语老师，性格比较保守，领导力强但逻辑分析能力一般，喜欢太极、烹饪和视频剪辑，工作生活都很有结构。你作为我的教学顾问，能不能讲清楚点，怎么结合我的这些特点来设计适合我的高中英语跨文化交际与背景知识应用课程？最好有创新活动和多元评价，还能体现中国价值观和跨文化融合。
  - question: 我是学校的教研员，最近要帮高中英语老师设计跨文化交际和背景知识应用的培训方案。你能不能彻底说清楚，怎么系统规划培训内容和流程？包括理论、教学实践、怎么让老师积极参与、创新案例、评价机制、怎么融合多种文化以及引导中国价值观等。
  - question: 你是高中英语教学专家，我想深入了解在跨文化交际与背景知识应用课堂上，怎么引导学生主动参与跨文化讨论、合作项目和反思活动？能结合教学理论、创新活动设计、多样化评价和中西方文化融合策略，全面系统分析一下吗？能深入讲解一下吗？
  - question: 我是高二女生连素蕾，能力还算均衡，就是有些焦虑，喜欢摄影和钢琴，和同龄人关系友善但不太深入，家里和妈妈关系挺亲密但也会因为学业紧张。最近英语老师让我们在跨文化交际与背景知识应用课上做分组合作项目，我有点担心合作效果和自己能不能参与进去。你能详细说说像我这种情况，该怎么发挥自己的优势、主动参与、老师和同学怎么评价我的成长，有没有适合我的创新活动？
  - question: 你是我的学习助手，我想知道在高中英语跨文化交际与背景知识应用教学中，学生怎么通过自评、互评和老师反馈提升学习效果？能结合具体活动设计、评价方式和激励策略讲讲怎么促进学生兴趣和跨文化理解吗？能解释一下吗？
  - question: 我是高中英语学生，最近在课上学中西方节日的差异，老师希望我们做些主动探索。你能简单说说有哪些有趣的探索方式和活动设计能帮助我们理解这些文化差异，还能促进大家主动参与吗？简单说说就行。
  - question: 你是教学专家，能不能讲清楚点在高中英语跨文化交际与背景知识应用课上，老师怎么设计创新的分组合作项目，既让学生主动参与，又能融合中国价值观和全球视野？最好有具体案例和评价方法。
  - question: 我是高一英语老师，最近带学生做跨文化背景的探究。你能用几句话说说怎么设计一个简单又有创意的跨文化交流活动，让学生主动参与还能自我评价吗？
  - question: 我是四年级小学生权星，喜欢露营和绘画，性格有点自信波动，和同学关系不错，经常分享露营经历，爸妈周末带我全家一起露营。你作为教育专家，能不能深入讲解一下在英语跨文化交际课堂上，怎么结合我的这些兴趣和成长环境，设计适合我的活动和评价方式，让我更主动参与并理解不同文化？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-高中-跨文化交际与背景知识应用进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 教学设计需基于学生多维画像（学习风格、兴趣、能力、文化背景等）进行差异化内容与任务安排，并能根据学生过程性表现和反馈动态调整教学策略，确保每位学生获得持续、针对性的学习支持，避免标签化和同质化。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 教学内容需严格遵循场景要求和结构规范，内容结构清晰、层次分明，包含背景引入、目标说明、过程分解、任务指令、成果展示与反思等环节。指令具体、逻辑严密，表达准确无遗漏，便于学生理解与操作。
  - field: 教学方法科学性与创新性_理由
    type: str
    description: 解释教学方法科学性与创新性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与创新性
    type: float
    description: 所采用的教学方法需紧密契合跨文化交际主题，体现科学性（如基于教育学原理、理论支撑），并鼓励方法创新（如多模式融合、情境创设、项目驱动、跨学科整合等）。需明确目标、过程、评价标准，并能有效促进学生能力提升与知识迁移。
  - field: 跨文化背景知识整合与深度分析_理由
    type: str
    description: 解释跨文化背景知识整合与深度分析评分的详细理由，引用具体例子。
  - field: 跨文化背景知识整合与深度分析
    type: float
    description: 教学内容需系统整合中外及多元文化背景知识，涵盖深度（如价值观、行为习惯、历史根源等）、广度（多文化对比）、应用性（现实交际迁移），并通过案例、实践活动引导学生深度分析、批判性反思和实际应用。
  - field: 创新与创造力激发_理由
    type: str
    description: 解释创新与创造力激发评分的详细理由，引用具体例子。
  - field: 创新与创造力激发
    type: float
    description: 教学任务应包含开放性、探索性或项目式活动，鼓励学生提出独特见解、创新表达，支持多样化、跨媒体成果呈现（如短剧、视频、海报、播客等），并引导学生进行批判性、创造性思考。优秀设计需体现成果的原创性和多样性。
  - field: 真实情境与问题关联度_理由
    type: str
    description: 解释真实情境与问题关联度评分的详细理由，引用具体例子。
  - field: 真实情境与问题关联度
    type: float
    description: 问题或任务需高度贴近学生实际生活、学习、未来出国交流等真实场景，能激发学生真实困惑、表达个人经历，避免空泛定义或脱离实际的提问。高阶要求应包含多轮追问和对复杂现实问题的探究。
  - field: 中国价值观与本土文化自然融入度_理由
    type: str
    description: 解释中国价值观与本土文化自然融入度评分的详细理由，引用具体例子。
  - field: 中国价值观与本土文化自然融入度
    type: float
    description: 跨文化交际教学需自然、恰当地融入社会主义核心价值观和中华优秀传统文化，通过具体交流情境引导学生理解、比较、反思，能将中国理念与跨文化策略有机结合，避免生硬灌输或形式主义。
  - field: 学生主动参与度与持续互动_理由
    type: str
    description: 解释学生主动参与度与持续互动评分的详细理由，引用具体例子。
  - field: 学生主动参与度与持续互动
    type: float
    description: 教学设计应包含多样化主动参与环节（如小组讨论、案例分析、角色扮演、成果展示等），并设计持续、深入的互动与合作任务，鼓励学生主动表达、跨组合作、动态反馈，提升主体性和持续参与感。
  - field: 多样化评价与过程性反馈机制_理由
    type: str
    description: 解释多样化评价与过程性反馈机制评分的详细理由，引用具体例子。
  - field: 多样化评价与过程性反馈机制
    type: float
    description: 需建立多元化、过程性评价与反馈体系，包括自评、互评、教师评语、同伴建议、阶段性成果展示等，评价结果能有效指导学生持续改进，促进能力提升和个性化发展。高阶要求包括评价标准的公开透明和学生参与评价标准制定。
  format_mode: prompt
