tasks:
  mode: iter
  content:
  - question: 我是初三学生，历史基础一般，最近复习中国近代史时总觉得知识点很零散，抓不住主线。你作为历史教育专家，能帮我系统梳理一下初中中国近代史的知识框架吗？详细说说重点、难点，还有怎么构建知识网络。
  - question: 我是刚入职的初中历史老师，对《世界古代史》这章的教学设计还不太熟悉。你作为学科教研员，能帮我梳理一下这一章的知识框架、重点难点和创新教学方法吗？详细说说。
  - question: 你作为历史学习助手，我喜欢探究历史事件背后的原因，但复习中国古代史时总觉得每个朝代都差不多，分不清各自的特点。能不能帮我讲清楚这一部分的知识框架和各朝代的主要特征？讲清楚点。
  - question: 我是一名初中历史老师，平时比较注重学生自主探究，但讲《中国革命与现代化进程》这一章时，班上学生觉得内容太多、主线不清，难以系统掌握。你作为历史专家，能彻底说清楚这一章的知识框架、重点难点，还能推荐一些创新教学方法吗？最好能结合社会主义核心价值观和中华传统文化，举些案例或者讲讲故事。
  - question: 我是一名初二学生，历史成绩一般但喜欢历史故事，最近学《世界近现代史》总记不清重大事件的时间和影响。你作为我的学习助手，能深入讲解一下这一章的知识结构、重点难点和复习建议吗？还有怎么通过趣味活动和探究任务提升记忆力和理解力，能深入讲解一下吗？
  - question: 你作为历史教研员，我叫雷璇，41岁，是一名放任型风格的女老师，平时喜欢京剧、茶艺和音乐欣赏，也是京剧社团的资深票友，经常参与社区茶艺活动交流。我现在备课初中历史《中华文明的起源与发展》，想全方位地理解这章的知识框架、重点难点和创新教学方法，还想知道怎么把中华优秀传统文化融入课堂。能全方位地讲解一下吗？内容要适合我这种注重兴趣引导和生活体验的教学风格。
  - question: 我是初一学生，刚开始学历史，老师讲《人类起源与远古社会》这一章时内容挺多，我有点记不住。你作为AI历史助手，能大概讲讲这一章主要内容和重点吗？
  - question: 我是一名初中生，对世界历史很感兴趣，但觉得历史章节太多，有时候分不清各章节之间的逻辑关系。你作为历史教育专家，能帮我深入讲解一下初中世界史各章节的知识框架、逻辑联系、重点难点，还有怎么用创新方法提高学习兴趣和理解吗？我想深入了解。
  - question: 我是初三学生，最近复习历史时发现《中国古代科技与文化》这一章很有趣，但不知道怎么抓重点和主线。你作为历史老师，能具体说说这一章的知识框架、重点内容、难点和学习建议吗？
  - question: 我是家长，我女儿上初二，最近学历史总觉得《世界近代史》很难，重点、主线都分不清楚。你作为历史学习助手，能大概讲讲这一章的知识框架和主要内容吗？我想帮她理一理思路。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 历史-初中-章节知识框架的构建与梳理进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像精准识别_理由
    type: str
    description: 解释个性化画像精准识别评分的详细理由，引用具体例子。
  - field: 个性化画像精准识别
    type: float
    description: 评估教学方案是否对学生的多维个性画像（学习风格、兴趣、基础水平、认知障碍等）进行深入、动态的识别，并据此调整教学内容和活动，体现持续性与针对性。高分需体现对个体差异的细致分析与动态调整，中分为浅层识别或仅部分针对，低分为完全忽视或机械处理。
  - field: 个性化格式指令遵循度_理由
    type: str
    description: 解释个性化格式指令遵循度评分的详细理由，引用具体例子。
  - field: 个性化格式指令遵循度
    type: float
    description: 评估答案是否严格按照题目指定格式展示知识，并主动结合学生个性特征优化呈现方式。高分为既遵循格式又创新适合该生的表达，中分为仅机械执行格式或部分优化，低分为无视格式要求或表达混乱。
  - field: 教学方法科学性与系统性_理由
    type: str
    description: 解释教学方法科学性与系统性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与系统性
    type: float
    description: 评估教学方法是否完整遵循教育学原理，包括目标设定、结构化梳理、分阶段引导、知识迁移等环节。高分需全过程系统设计并支持知识网络构建与迁移，中分为部分环节落实或结构不够紧密，低分为无目标、无结构、无系统流程。
  - field: 教学方法创新性_理由
    type: str
    description: 解释教学方法创新性评分的详细理由，引用具体例子。
  - field: 教学方法创新性
    type: float
    description: 评估是否结合历史学科特点采用多元创新教学方法，包括项目式学习、探究任务、跨学科融合、数字化工具应用等。高分需有多样创新元素和深度参与，中分为创新形式但参与度不足或仅单一创新，低分为仅用传统讲授或机械背诵。
  - field: 知识框架逻辑清晰度_理由
    type: str
    description: 解释知识框架逻辑清晰度评分的详细理由，引用具体例子。
  - field: 知识框架逻辑清晰度
    type: float
    description: 评估知识框架梳理是否层次分明、逻辑严密、结构合理，便于学生理解和掌握内容及其内在联系。高分体现多层级结构、因果链条、关键节点突出，中分为结构基本合理但层次或逻辑不够清晰，低分为知识点排列混乱、无层级结构。
  - field: 创造性思维激发度_理由
    type: str
    description: 解释创造性思维激发度评分的详细理由，引用具体例子。
  - field: 创造性思维激发度
    type: float
    description: 评估是否通过开放性问题、跨学科联系、创新活动等方式，积极激发学生创造性思考与历史想象力。高分需有多样创造性任务和持续思维开放引导，中分为偶有开放性问题但缺乏系统激发，低分为仅要求复述教材内容。
  - field: 模拟真实提问匹配度_理由
    type: str
    description: 解释模拟真实提问匹配度评分的详细理由，引用具体例子。
  - field: 模拟真实提问匹配度
    type: float
    description: 评估内容语言是否贴近真实初中历史课堂，问题设置是否反映学生实际困惑和需求，表达自然、互动性强。高分主动模拟真实师生互动场景，中分为偶有互动但不自然或场景感不足，低分为机械、无互动或无现实感。
  - field: 社会主义核心价值观及中华优秀传统文化融入度_理由
    type: str
    description: 解释社会主义核心价值观及中华优秀传统文化融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观及中华优秀传统文化融入度
    type: float
    description: 评估内容是否自然融入社会主义核心价值观及中华优秀传统文化元素，结合历史事件进行价值观引导，方式润物细无声。高分需结合具体历史情境引发思考并体现价值观，中分为偶有价值观点但不系统或生硬，低分为完全割裂或机械灌输。
  - field: 学习反馈与调整能力_理由
    type: str
    description: 解释学习反馈与调整能力评分的详细理由，引用具体例子。
  - field: 学习反馈与调整能力
    type: float
    description: 评估教学设计是否包含针对学生学习过程的动态反馈机制，能根据学生表现及时调整知识框架梳理方式，提升学习效果。高分体现持续跟踪、个性化调整与针对性补救，中分为偶有反馈但调整不系统，低分为一成不变、无反馈调整。
  format_mode: prompt
