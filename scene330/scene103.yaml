    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为物理-初中-电路故障与动态分析教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是初中物理老师，最近在带初三毕业班，发现班里有几个同学在做串并联电路实验时总是遇到灯泡不亮或者电流表、电压表示数异常的问题，分析和排查电路故障的能力提升很慢。你作为物理专家，可以全面分析一下初中生在电路故障与动态分析方面常见的困惑和误区吗？详细讲讲该怎么培养他们多角度思考和动态排查电路故障的能力，最好结合实际课堂和实验教学举些例子，说说怎么激发学生科学探究精神和创新能力。
  - question: 我是邱仪，今年28岁，是刚带初三物理的女老师，平时喜欢手工制作和看电影，风格比较放任。下班经常和手工社团朋友一起做工艺品，也会和同事去看电影。最近课堂上有学生在电路实验中总接错线，导致灯泡不亮或者实验做不下去。你作为物理学习顾问，能简要说明下学生通常容易在哪些环节出错，我在教学中可以用哪些简单有效的方法帮他们提升动态分析和排查电路故障的能力吗？简要说明下就行。
  - question: 我是一名初中物理教研组长，最近要组织一次全校范围的电路故障与动态分析专题教研活动。你作为物理教学专家，能全面深入地讲讲初中物理电路故障与动态分析的教学策略和学生常见思维障碍吗？系统分析一下动态排查电路故障的方法、常见误区、能力培养路径，还希望结合创新实验设计、分层教学、跨学科合作等方面，给出可操作的建议和评价方式，帮我们老师提升学生科学思维、合作探究和创新能力。
  - question: 我是段昊强，15岁，初三学生，喜欢3D建模、电子竞技和机器人制作，性格上抗干扰强，有点隐性竞争但没明确学习动机，情绪比较稳定。和同学表面关系还行但其实有些暗中较劲，周末常和父亲一起讨论建模技术，在电竞社团里主要做技术和策略指挥，平时不太主动社交。最近物理实验课上老师让我们分析电路故障，但感觉排查过程很繁琐，有时候还会漏掉细节。你作为物理学习助手，能具体说说实际排查初中物理电路故障时，有哪些高效又系统的动态分析方法？最好能结合和我兴趣相关的例子帮我理解一下。
  - question: 我是蔚全，今年36岁，是男老师，平时喜欢篮球、科学实验和跆拳道，表达欲比较强但思维有点固化，领导力还行。平常负责组织学校科学社团活动、带队参加市级竞赛，也是篮球队队长和跆拳道馆助教。最近在指导学生物理竞赛时发现他们在电路实验出现故障时容易只看表面，缺乏动态分析和多角度思考。你作为物理专家，简单说说怎样在日常教学和竞赛辅导中有效培养学生动态分析电路故障的科学思维？
  - question: 我是崔宪萌，54岁，男清洁工，喜欢跳广场舞和种花草，性格上有点暗自较劲。在广场舞队里和同龄人表面互助但私下会比较，平时喜欢在社区花坛种花，常和邻居讨论种植。最近我孙子初一，在家做物理电路实验时灯泡总是不亮，说可能是接线有问题。我自己不太懂电路，还有点担心他没信心。你作为物理专家，能帮我理解一下初中物理电路实验常见的故障有哪些？遇到灯泡不亮这种情况，我们应该怎么一步步判断和排查？帮我理解一下吧。
  - question: 我是缪菊，14岁，初二女生，性格内向但创新性强，做事持续专注，不太喜欢功利性的东西。平常喜欢和妈妈在花园一起打理植物，周末有时和社区乒乓球爱好者交流。最近物理课上做电路实验时发现电路明明接对了，灯泡却时亮时不亮，有点好奇也有点困惑。你是物理教学助手，能详细说说遇到这种电路动态故障该怎么分析和排查吗？希望能举些生活里的例子，帮我建立科学思维。
  - question: 你作为初中物理教学专家，能系统地讲解一下初中物理电路故障与动态分析的核心知识点、常见故障类型和动态排查方法吗？希望你结合实验设计、学生能力培养、科学精神渗透等方面，讲讲分层教学和创新评价的综合策略，帮老师们全面提升学生的电路分析和创新实践能力。
  - question: 我是初中物理老师，带实验班时经常碰到学生做电路实验时出现故障，比如灯泡不亮、电流表没反应或者数据异常，很多学生不知道怎么下手排查。你作为物理专家，能具体说说初中电路实验中常见的动态故障类型，还有每种故障该怎么科学分析和排查吗？
  - question: 你作为有丰富经验的物理教学顾问，能讲得详细点吗——在初中物理电路实验中，学生做动态分析和故障排查时常见的心理障碍和思维误区有哪些？能结合具体实验案例系统分析一下，怎么通过分步指导、合作探究和创新活动，帮学生建立科学的动态分析流程、提升自主排查电路故障的能力，同时在过程中渗透勤学善思、团结协作等核心价值观？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 物理-初中-电路故障与动态分析进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 评价教学是否充分结合学生的学习基础、兴趣、认知风格等个性化特征，针对不同群体设计多层次、差异化教学方案，并在反馈和活动中体现对每位学生独特需求的关注和支持。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 评价教学内容是否严格按照任务/题目要求的结构、流程进行呈现，步骤完整、分层清晰，配套材料齐全，语言表达规范，避免遗漏或杂乱。
  - field: 科学性与逻辑性_理由
    type: str
    description: 解释科学性与逻辑性评分的详细理由，引用具体例子。
  - field: 科学性与逻辑性
    type: float
    description: 评价内容是否严谨遵循物理学科知识体系，推理过程层层递进，能科学解释和区分相关概念，并在分析中体现系统性、深度和批判性，杜绝知识性错误和逻辑漏洞。
  - field: 动态分析能力培养_理由
    type: str
    description: 解释动态分析能力培养评分的详细理由，引用具体例子。
  - field: 动态分析能力培养
    type: float
    description: 评价教学是否设计多步探究任务，引导学生通过电路状态变化、故障排查等动态过程进行自主观察、推理、记录与反思，鼓励学生提出假设、设计方案、分析多种可能，体现动态与系统性思维。
  - field: 启发式提问与创新思维激发_理由
    type: str
    description: 解释启发式提问与创新思维激发评分的详细理由，引用具体例子。
  - field: 启发式提问与创新思维激发
    type: float
    description: 评价是否通过层级化、开放性、探究性问题激发学生多角度思考，鼓励创新设计和独立见解，提出高阶任务（如优化方案、反思局限），并引导学生进行方案比较和反思。
  - field: 模拟真实提问还原度_理由
    type: str
    description: 解释模拟真实提问还原度评分的详细理由，引用具体例子。
  - field: 模拟真实提问还原度
    type: float
    description: 评价问题及案例设置是否紧密结合真实生活或课堂情境，能真实还原学生常见困惑、实际需求或典型案例，具有代表性和实用性，并能引发学生共鸣和实际操作兴趣。
  - field: 中华优秀传统文化与价值观融入_理由
    type: str
    description: 解释中华优秀传统文化与价值观融入评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化与价值观融入
    type: float
    description: 评价教学内容是否自然融入社会主义核心价值观和中华优秀传统文化，如团队协作、尊重科学、勤于探索、实事求是等精神，且表达方式贴切、与物理学习有机结合，能引发学生思考与认同。
  - field: 错误引导与纠错机制_理由
    type: str
    description: 解释错误引导与纠错机制评分的详细理由，引用具体例子。
  - field: 错误引导与纠错机制
    type: float
    description: 评价教学是否预设学生常见错误，通过引导性问题、反思环节或案例分析，帮助学生自主发现、分析并修正错误，体现专业化的纠错与反思机制，并鼓励学生总结经验防止再犯。
  - field: 反馈与成长建议_理由
    type: str
    description: 解释反馈与成长建议评分的详细理由，引用具体例子。
  - field: 反馈与成长建议
    type: float
    description: 评价教学是否对学生分析过程和结果给予具体、个性化反馈，指出优点与不足，并提出明确成长建议，如优化思维方法、补足知识盲点、提升探究深度，促进持续进步。
  format_mode: prompt
