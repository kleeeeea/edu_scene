      content: 你的任务是为英语-小学-趣味单词记忆方法指导教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是五年级男孩的家长，你是一位小学英语教育专家。我儿子很喜欢运动和玩乐高，但对背英语单词总是不感兴趣，还容易因为发音难就放弃。能不能彻底说清楚，怎么根据他的兴趣和性格教他用趣味的方法记单词？希望你系统分条讲讲，每种方法具体怎么做、适用什么孩子，要注意啥，还能举些例子吗？内容尽量全面深入些，谢谢！
  - question: 我叫潘雅雅，8岁，三年级女生，喜欢弹小提琴和尤克里里，平时喜欢自己学东西但一遇到难题就想逃避。我记单词总是记不牢，背完就忘。你作为小学英语学习顾问，能深入讲解一下，结合我的兴趣和性格，有哪些趣味记单词的方法适合我？最好分条说说，每种方法怎么做、有什么例子和注意点。
  - question: 我是二年级英语老师，班里有孩子总觉得背单词很无聊。你作为小学英语专家，能解释一下有哪些适合小学生的趣味记单词方法吗？最好讲讲怎么操作和注意啥。
  - question: 我是四年级女生陈蕾的家长，她喜欢小提琴和芭蕾舞，平时主要靠我监督学习，自己缺乏动力。你作为小学英语专家，能不能概括一下，像她这样性格和兴趣的孩子，有哪些简单有趣的单词记忆方法？给点具体建议。
  - question: 我三年级，喜欢手工和画画，背单词觉得无聊还容易忘。你作为小学英语老师，能具体说说适合像我这样孩子的趣味记单词方法吗？给些例子和做法。
  - question: 你好，我叫ThompsonSummer，是20岁的女性作家，平时喜欢写作和新闻。你作为教育内容专家，能详细说说小学英语趣味记单词的方法背后的教育理念和激发创造力的原理吗？我还想知道这些方法怎么能和写作辅导结合起来。
  - question: 我是三年级学生家长，孩子上课容易分心，背单词没兴趣，可喜欢和同学玩游戏。你作为小学英语老师，讲讲看适合他们这种孩子的趣味记单词方法吧，最好说说怎么操作，有什么要注意的。
  - question: 我是小学英语教研员，你是一名小学英语教育专家。现在小学生背单词普遍觉得枯燥、效果也不好。你能全面深入地讲讲有哪些趣味记单词的方法吗？希望你能分类型说说原理、操作、适用哪些孩子，还有典型案例和注意事项。最好结合不同学生特点给出差异化建议，内容越系统越好。
  - question: 我是四年级学生，背单词总觉得没意思。你能简单说说我们小学生怎么用有趣的方法记单词吗？举几个好操作的例子就行。
  - question: 我是三年级学生的家长，你是一位小学英语教育专家。我家孩子背单词记不牢还觉得没劲，总混着用。我想找适合他性格和兴趣的趣味记单词方法。能不能讲得详细点，分条说说每种方法怎么做、适合什么孩子，有什么注意点和例子吗？最好能给点个性化建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-小学-趣味单词记忆方法指导进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评估回答是否充分基于学生的年级、兴趣、学习基础、性格等个体差异，针对不同学生群体进行细致分析，给出差异化、具体且可操作的学习策略。高分要求结合至少两项学生特征，提供定制化方案并举例；中分为有简单区分但分析浅显或操作性不足；低分为一刀切推荐，无针对性。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 评估回答是否严格按照任务指令要求的格式、内容和结构输出，包含方法名称、适用对象、具体步骤、注意事项等，条理清晰分段。高分为每部分标题突出、内容完整且逻辑顺畅；中分为部分内容或结构缺失，条理不够清晰；低分为无结构或内容严重缺失。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估所推荐方法是否基于认知心理学、教育学原理，并能简要说明理论依据及实际效果。高分为方法与理论结合紧密，并有实际案例或研究支持；中分为方法合理但理论说明简略或泛泛而谈；低分为无科学依据或含有不当内容。
  - field: 方法实操性与可操作性_理由
    type: str
    description: 解释方法实操性与可操作性评分的详细理由，引用具体例子。
  - field: 方法实操性与可操作性
    type: float
    description: 评估方法是否具体可操作，步骤详细、易于实施，适合小学生在教师或家长指导下独立实践。高分为操作步骤分解细致、包含材料准备、流程、难易度把控等；中分为有操作说明但细节不足或部分环节模糊；低分为仅泛泛提及方法，无具体操作细节或过于复杂不适合小学生。
  - field: 多样化教学策略覆盖_理由
    type: str
    description: 解释多样化教学策略覆盖评分的详细理由，引用具体例子。
  - field: 多样化教学策略覆盖
    type: float
    description: 评估是否根据学生不同学习风格、兴趣、能力，提供两种及以上不同类型的单词记忆方法，并说明各自适用对象及优缺点。高分为多种方法、适用说明、优缺点分析齐全；中分为多种方法但缺乏适用对象或优缺点说明；低分为仅推荐单一方法或无适用人群区分。
  - field: 创造力激发引导_理由
    type: str
    description: 解释创造力激发引导评分的详细理由，引用具体例子。
  - field: 创造力激发引导
    type: float
    description: 评估内容是否通过具体活动或建议鼓励学生创新，尝试新方法，激发想象力与自主学习动力。高分为有创新活动方案、鼓励学生自主设计、支持多样表达；中分为有鼓励但缺乏具体创新活动或操作建议；低分为仅机械重复、无创新空间或鼓励。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 评估内容是否贴近真实小学英语学习场景，回应学生常见问题和困惑，结合生活实际与真实案例。高分为结合具体场景、学生常见问题、生活实例进行解答；中分为内容贴合但场景或案例不够具体；低分为内容模板化、与实际需求脱节。
  - field: 价值观润物细无声融入度_理由
    type: str
    description: 解释价值观润物细无声融入度评分的详细理由，引用具体例子。
  - field: 价值观润物细无声融入度
    type: float
    description: 评估内容是否自然融入社会主义核心价值观或中华优秀传统文化，表达细腻、自然，无生硬灌输。高分为教学活动自然而然体现团队协作、互助友爱、诚信等积极价值观，语言流畅；中分为有价值观元素但表达生硬或与教学内容衔接不自然；低分为完全缺失或生硬插入影响表达。
  format_mode: prompt
