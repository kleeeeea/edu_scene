  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为地理-初中-重点国家与区域的综合分析教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是初二学生，这阵子老师让我们比较美国、德国和日本的地理和经济情况，要从地理位置、资源、经济发展、文化交流等方面分析，还要举生活里的例子。你能帮我理解一下吗？
  - question: 我女儿刚开始学地理，经常把中东和东南亚搞混。你能不能讲清楚这两个地方地理、资源、人口和经济上的主要特点，还要说说它们在世界上的重要性，有具体例子就更好了。
  - question: 我刚成为地理老师，快要给学生讲俄罗斯的地理和区域差异，你大概讲讲俄罗斯的位置、气候、资源和各地发展有什么不一样？
  - question: I'm ThompsonEric, a 9th grader who likes guitar and programming but
      doesn't enjoy competition or group activities. I get confused when comparing
      the European Union and ASEAN in geography class, especially about their differences
      and connections. Could you explain in detail how they're similar or different
      in geography, economy, politics, and culture, maybe with examples and some tech-related
      or visual tasks? Please explain thoroughly.
  - question: I'm DavisPaige, a 7th grader who loves baking and basketball and remembers
      things best with pictures. Sometimes I feel a bit too confident in group projects.
      Can you explain the US-Mexico-Canada region in geography, economy, and culture
      really thoroughly—like with maps, food, sports examples, and ideas for cool
      visual projects? Please give a full explanation.
  - question: 我是一名年长的地理老师，平时生活挺有仪式感，也喜欢交谊舞和麻将。最近准备讲撒哈拉以南非洲，想系统分析一下那里的地理、资源、经济和文化多样性，还想知道怎么在社区或教师圈里引导学生做合作探究。你能讲得详细点吗？
  - question: I'm DavisElla, an 8th grader who likes reading and piano but sometimes
      puts things off and gets a bit overconfident. Could you briefly explain why
      Brazil is important in global geography—like its location, resources, economy,
      and culture? Please keep it concise.
  - question: 我是小学一年级的田夏，喜欢玩棋、打羽毛球和虚拟现实游戏，平时在班里比较安静。老师提到澳大利亚地理很特别，你能帮我理解一下吗？最好说得简单点，还能给我一些小游戏或者动手画画的建议。
  - question: 你是地理专家，能不能全方位地讲解一下东南亚这个区域？最好讲讲地理、国家、经济、文化、历史等各方面，还能给点适合初中生合作探究的建议。
  - question: 我是初中生，最近地理课要讲南极洲的地理和人类活动。你能详细说说南极洲的环境、资源、国际合作，还有中国在南极都做了什么吗？也希望给我点学习建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-初中-重点国家与区域的综合分析进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 教学设计需深入分析学生兴趣、基础与差异，针对不同群体制定分层、分组、个性化支持方案，确保每类学生获得适宜挑战和成长空间。
  - field: 指令遵循与表达规范性_理由
    type: str
    description: 解释指令遵循与表达规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与表达规范性
    type: float
    description: 教学内容与任务须严格按照教学目标和结构要求展开，表达清晰、逻辑严密，完整覆盖各项任务，避免遗漏、混乱或随意更改，优异表现需有条理性和细致分段。
  - field: 教学策略科学性与多样性_理由
    type: str
    description: 解释教学策略科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学策略科学性与多样性
    type: float
    description: 教学方法应科学选取，并根据内容和学生特点融合多种策略（如启发式、探究式、合作学习、情境模拟等），高分需在课堂流程中体现动态调整和多元融合。
  - field: 知识点整合与迁移能力_理由
    type: str
    description: 解释知识点整合与迁移能力评分的详细理由，引用具体例子。
  - field: 知识点整合与迁移能力
    type: float
    description: 教学内容需系统整合多项地理知识点，帮助学生建立知识网络，并引导将所学应用于实际生活或跨学科情境。高分需有具体的迁移任务与学生产出。
  - field: 创新思维激发度（分层开放性）_理由
    type: str
    description: 解释创新思维激发度（分层开放性）评分的详细理由，引用具体例子。
  - field: 创新思维激发度（分层开放性）
    type: float
    description: 教学任务设置需包含不同层次的开放性问题或项目，鼓励学生独立思考、提出多样见解，允许并支持多元答案。高分需有创新产出或独特见解。
  - field: 探究性学习引导（分阶段递进）_理由
    type: str
    description: 解释探究性学习引导（分阶段递进）评分的详细理由，引用具体例子。
  - field: 探究性学习引导（分阶段递进）
    type: float
    description: 教学活动应分阶段引导学生自主查找资料、提出问题、验证假设，促进逐步深入的探究学习。高分需有全过程探究和不同层次学生的深度参与。
  - field: 社会主义核心价值观融入度（自然渗透）_理由
    type: str
    description: 解释社会主义核心价值观融入度（自然渗透）评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入度（自然渗透）
    type: float
    description: 教学内容应自然融合爱国、责任、合作等社会主义核心价值观，通过地理知识引导学生认识服务国家与社会的重要性，避免形式化或生硬灌输。高分需有学生思考或行动产出。
  - field: 中华优秀传统文化渗透性（多层次融合）_理由
    type: str
    description: 解释中华优秀传统文化渗透性（多层次融合）评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化渗透性（多层次融合）
    type: float
    description: 地理教学中应多层次自然融合中华传统文化元素，如古代地理成就、历史地理观、地名文化等，增强文化自信和认同。高分需有文化融入的创新设计和学生产出。
  - field: 反馈与改进机制_理由
    type: str
    description: 解释反馈与改进机制评分的详细理由，引用具体例子。
  - field: 反馈与改进机制
    type: float
    description: 教学中需设立有效的学生反馈和教师自我反思机制，定期收集学生学习成效，并根据反馈及时调整教学内容和方法。高分需有反馈数据、调整记录和持续优化措施。
  format_mode: prompt
