    description: 在教学过程中自然融合社会主义核心价值观与中华优秀传统文化，强调科技创新、生命伦理和社会责任。融入需具体、润物细无声，与教学内容紧密结合。
  - field: 创新与批判性思维激发度_理由
    type: str
    description: 解释创新与批判性思维激发度评分的详细理由，引用具体例子。
