    type: float
    description: 教学能引导学生将分子遗传法则应用于多领域实际问题，促进知识迁移与创新。拓展需涵盖医学、农业、环境等，并鼓励跨学科思考和创新设想。
  - field: 真实提问与常见困惑契合度_理由
    type: str
    description: 解释真实提问与常见困惑契合度评分的详细理由，引用具体例子。
