    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为物理-高中-思想实验的探讨与物理学史联系教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是谢道川，16岁高一男生，喜欢3D建模、科学实验和足球，经常在社团和同学一起交流，科学实验小组也常参加。请说说物理学史上有哪些主要的思想实验，以及它们对物理发展的意义，分点讲讲主要内容，核心要点清楚就好。
  - question: 你作为物理教育专家，我是高中物理老师，最近备课时想深入探索思想实验与物理学史结合的教学。麻烦你详细展开说说：包括思想实验的定义、物理学史经典案例、在物理发展中的作用，以及结合高中生特点的具体教学建议和活动设计。请内容结构清晰，分析充分。
  - question: 我是高二学生，对物理学史很感兴趣，但不太明白思想实验具体是什么，为什么重要。能大概讲讲思想实验在物理学史里的作用吗？举一两个例子说明，条理清楚就好。
  - question: 我是新入职的高中物理老师，最近带学生讨论思想实验和物理学史的联系，但有些学生对抽象推理不太感兴趣。你能讲讲看思想实验和实际实验的区别、它们在物理学史里的价值和创新意义吗？最好举几个具体案例，并结合中国传统文化的探究精神启发一下，结构清楚点。
  - question: 你作为我的物理学习助手，我最近复习思想实验相关内容，感觉理论和实际有点脱节。能解释一下思想实验在物理学史中的发展脉络，以及几个经典思想实验（比如牛顿炮弹、爱因斯坦光钟、薛定谔的猫）的科学意义吗？最好分点讲解，并结合实际生活举例说明。
  - question: 我是杨爱依，16岁高一女生，喜欢古筝、演讲和文学创作，目标导向、情绪化学习，和同龄人有点距离。最近物理课上讲思想实验和物理学史的关系，我觉得挺抽象，难和我的兴趣挂钩。你能解释一下思想实验在物理学史里的作用和意义吗？最好用形象类比或故事帮助理解，也说说怎么从文学或艺术角度理解这些思想实验，结构化讲讲。
  - question: 我是在乡村中学教物理的老师，资源有限，学生基础也不太一样。想通过思想实验和物理学史结合激发学生兴趣。你能讲讲看思想实验的基本概念、物理学史里的经典案例，以及在资源有限条件下怎么设计有趣课堂活动吗？最好结构分明，举例具体，适合我们的实际情况。
  - question: 我是高三物理备考生，你是物理学科专家。我发现思想实验在物理学史和理论创新里很重要，但教材讲得不够系统。能全面深入地讲讲思想实验的定义、类型、历史发展，以及物理学史里最具代表性的思想实验和它们的科学影响吗？还想知道思想实验如何推动理论革新和科学方法演变，并结合高考给些思维训练和学习建议。希望内容系统、结构清晰、案例丰富，适合高三学生理解和应用。
  - question: 我是刚入职的高中物理老师，想提升思想实验和物理学史融合教学的能力。能讲得详细点吗？包括思想实验的理论基础、发展脉络、各时期代表性案例、和物理学科核心素养的联系，还希望能说说融合思想实验和物理学史的课堂设计方法，促进学生科学精神和创新能力。内容系统、结构分明，详细分析下。
  - question: 我是高中物理教研员，负责课程改革。现在很多老师希望通过思想实验和物理学史结合提升学生科学素养。你能全面深入地讲讲思想实验的理论基础、分类、发展历程，以及物理学史里的经典思想实验和科学价值吗？还想知道思想实验在培养科学精神、创新能力上的作用，以及课程设计和教学实践里怎么有效融合思想实验和物理学史，有没有具体案例？最后请谈谈课程改革中如何落实科学方法和中华优秀传统文化的结合。希望内容系统、结构清晰、案例丰富，适合教研和培训用。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 物理-高中-思想实验的探讨与物理学史联系进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 教师应能精准识别并动态追踪学生的年级、认知基础、兴趣、学习进度等多维画像，针对不同层次和特点灵活调整教学内容、表达方式、举例与互动策略。高分要求能基于实时反馈持续优化分层教学方案，确保每类学生均获得针对性成长。
  - field: 格式与指令遵循度_理由
    type: str
    description: 解释格式与指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与指令遵循度
    type: float
    description: 教学内容须严格依照教学任务要求分段组织，逻辑清晰、结构完整，重点突出。高分要求在分段基础上突出核心知识、思维流程、知识间联系，并通过结构化呈现帮助学生系统梳理、复习和迁移。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 教师应采用启发式、探究式、分层协作等科学教学方法，促进学生主动思考与深度学习。高分要求能结合学科特点灵活调整教学策略，设计多样化活动，促进学生自主分析、合作探究、知识迁移，避免单一灌输与机械记忆。
  - field: 物理学史与思想实验联系深度_理由
    type: str
    description: 解释物理学史与思想实验联系深度评分的详细理由，引用具体例子。
  - field: 物理学史与思想实验联系深度
    type: float
    description: 应深入剖析思想实验与物理学史的互动，展现科学理论发展的过程、争议、突破及思想实验对科学观念转变的深远影响。高分要求能结合具体案例，分析思想实验推动科学进步的逻辑机制，帮助学生理解科学精神与历史演变。
  - field: 激发学生创新思维能力_理由
    type: str
    description: 解释激发学生创新思维能力评分的详细理由，引用具体例子。
  - field: 激发学生创新思维能力
    type: float
    description: 教师应通过开放性问题、任务或讨论，激励学生提出新观点、假设或原创解法，鼓励主动探索和批判性思考。高分要求有具体措施促进学生创新表达，能对学生创新尝试进行有效评价与引导，形成创新成果展示。
  - field: 模拟真实学生提问的准确性_理由
    type: str
    description: 解释模拟真实学生提问的准确性评分的详细理由，引用具体例子。
  - field: 模拟真实学生提问的准确性
    type: float
    description: 教师设计的学生提问或互动情境须贴合高中生认知水平、兴趣点和实际困惑，问题具有情境感、针对性和启发性。高分要求能捕捉学生真实疑惑，促进深入思考和讨论，体现学生主体性。
  - field: 社会主义核心价值观与中华优秀传统文化融入自然度_理由
    type: str
    description: 解释社会主义核心价值观与中华优秀传统文化融入自然度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华优秀传统文化融入自然度
    type: float
    description: 教学过程中应自然而然地融入社会主义核心价值观与中华优秀传统文化，如‘实事求是’‘勇于创新’‘追求真理’等，强调科学精神与社会责任。高分要求能将价值观与物理内容有机结合，通过案例、讨论等激发学生社会责任感和科学精神，促进价值观内化。
  format_mode: prompt
