tasks:
  mode: iter
  content:
  - question: 我是高一男生，最近觉得自己耐力不太好，身体素质也一般，你作为我的体育老师，能帮我讲清楚点怎么制定一个提升耐力和健康的学期健身计划吗？
  - question: 你作为健身规划专家，柴艺老师今年57岁，女性，喜欢方言研究和旅行，重视健康饮食，性格高抗压性、善于倾听、批判性思维强，表达欲也很强，兼顾理想和现实。她和同事专业合作，也经常指导学生，还热衷方言保护社群活动。麻烦你讲清楚点怎么为柴艺老师制定一个科学又有趣的学期健身计划，结合她的兴趣和社交情况，详细说说目标、方法、注意事项和反馈机制。
  - question: 你作为体育顾问，侯星晚老师今年54岁，女性，喜欢冥想和旅行，性格高抗压性，和同事关系很好，经常组织冥想活动，已婚，丈夫是企业高管，两个孩子在外地读大学。能具体说说吗，怎么为侯老师制定一个兼顾身心健康、适合她生活和兴趣的学期健身计划？希望包含目标、锻炼方法、注意事项和激励反馈机制，还能融入科学锻炼和成长理念。
  - question: 我是高一女生郭媛，喜欢声乐、穿搭和环保实践，性格比较现实，也容易跟着大家走。你作为体育老师，简单说说就行，怎么帮我制定一个既能提升体能又能结合我兴趣和社交特点的学期健身计划？主要说说目标、方法和注意事项，还有怎么反馈。
  - question: 我是初三女生付涟漪，喜欢书法和自然观察，性格情绪稳定但容易分心，喜欢主动纠错，也比较循规蹈矩。我是书法社团骨干，和自然课老师关系好，经常在公园观察自然，和环保组织也有联系。你作为体育专家，详细分析下各个方面，怎么帮我制定一个科学、全面、能提升专注力和体能的学期健身计划？希望结合我的兴趣、性格和社交情况，系统地分析目标、锻炼方法、注意事项、激励反馈、自我反思和成长体验，还能自然渗透坚持、健康、团队协作这些价值观。
  - question: 我是初三女生韩岚，喜欢书法、茶艺和乒乓球，性格有时候情绪化，有时候理性，习惯主动纠错，但自主学习和逻辑性都比较弱。我妈妈每周陪我练书法，班里有几个朋友也喜欢乒乓球，经常一起打。你作为体育老师，彻底说清楚怎么帮我制定一个能提升体能、专注力和自我管理的学期健身计划？希望结合我的兴趣、性格和社交圈，详细说明目标、锻炼方法、注意事项、激励反馈、自我反思，以及怎么促进心理和身体一起成长，还能自然融入科学锻炼、团队合作和终身运动的理念。
  - question: 我是小学一年级男生孟鹤，喜欢足球和轮滑，分析能力还不太强，也刚开始有点功利心。每天爷爷奶奶接送我，周末才能见到爸妈，足球兴趣班和轮滑俱乐部也是我结识朋友的地方。你作为体育老师，说说你的看法，怎么帮我制定一个既能提升身体素质又能培养团队协作和兴趣的学期健身计划？希望具体说说目标、锻炼方法、注意事项和反馈机制。
  - question: 我是高二学生，平时喜欢羽毛球，但最近学习压力大，身体状态不是很好。你作为体育老师，能讲得详细点吗，怎么帮我制定一个能兼顾学业和兴趣、有效提升身体素质的学期健身计划？希望内容具体、有案例和分析。
  - question: 我是七年级女生KellyAria，喜欢手工艺和时尚造型，理解能力快、动作记忆力好，喜欢动手学新东西，还要兼顾学业。你作为体育老师，全面分析一下怎么帮我制定一个既能发挥兴趣创造力又能提升身体素质的学期健身计划？请具体说明目标、锻炼方法、周期、注意事项、激励反馈和自我反思建议，还要结合我的性格和社交习惯。
  - question: 我是老师MooreIvy，56岁，喜欢插花和科学实验，性格团队合作型，社交圈紧密，工作时喜欢随性互动。你作为体育顾问，简单说说就行，怎么帮我制定一个能促进团队协作、保持健康又兼顾兴趣的学期健身计划？请讲讲目标、锻炼方法、注意事项和反馈机制。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 体育-高中-制定个人学期健身计划进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 评估健身计划是否基于全面、动态的学生个体画像（包含体能、兴趣、健康、目标、成长轨迹等），并在训练内容、目标设定、调整机制中体现明显的个体差异与主动参与，要求计划能根据学生实时反馈和成长变化持续优化，避免形式化和模板化。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 评估健身计划是否严格按照任务要求分项输出，涵盖目标、训练内容、时长、周期、评估方式等关键要素。要求结构层次分明、条目完整、逻辑清晰，便于查阅和执行，缺失任何核心环节即为低分。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估健身计划是否依据体育教学理论，采用周期化、分阶段、强度递进与恢复安排，结合多样训练方式（力量、有氧、柔韧等），并根据学生体能基础与反馈科学调整。要求训练原则（如超负荷、恢复、周期性）得到具体体现，保障安全与效果。
  - field: 健身目标合理性_理由
    type: str
    description: 解释健身目标合理性评分的详细理由，引用具体例子。
  - field: 健身目标合理性
    type: float
    description: 评估健身计划目标设定是否具体、量化、分阶段，紧密结合学生实际能力与成长需求。目标需可测量、可跟踪、可调整，既不过高也不空泛，且区分长期与短期目标。
  - field: 计划实施可行性_理由
    type: str
    description: 解释计划实施可行性评分的详细理由，引用具体例子。
  - field: 计划实施可行性
    type: float
    description: 评估健身计划是否充分考虑实际执行条件（时间、场地、器材、课业负担、健康状况等），合理利用校内外资源，设置灵活调整机制，保障计划可持续和易于操作。
  - field: 创新性与创造力激发_理由
    type: str
    description: 解释创新性与创造力激发评分的详细理由，引用具体例子。
  - field: 创新性与创造力激发
    type: float
    description: 评估健身计划是否鼓励学生自主设计和调整训练方案，融合新颖训练方式、跨学科元素（音乐、科技、艺术等），激发创新思维和探索欲，持续引导学生体验运动多样性和自我表达。
  - field: 模拟真实提问回应度_理由
    type: str
    description: 解释模拟真实提问回应度评分的详细理由，引用具体例子。
  - field: 模拟真实提问回应度
    type: float
    description: 评估健身计划及其说明是否主动、细致回应学生可能的疑问、兴趣与困惑，体现共情与适应性解答，主动提出调整建议、心理支持与激励措施，促进学生积极参与和持续成长。
  - field: 价值观自然融入度_理由
    type: str
    description: 解释价值观自然融入度评分的详细理由，引用具体例子。
  - field: 价值观自然融入度
    type: float
    description: 评估健身计划是否在内容与过程设计中自然、细腻地融入社会主义核心价值观和中华优秀传统文化（如团队协作、坚韧不拔、尊重规则等），表达方式需与训练内容紧密结合，促进品格养成而非生硬灌输。
  - field: 反思与反馈机制_理由
    type: str
    description: 解释反思与反馈机制评分的详细理由，引用具体例子。
  - field: 反思与反馈机制
    type: float
    description: 评估健身计划是否包含系统的自我反思、阶段性反馈、师生交流及动态调整机制，鼓励学生定期总结训练效果、分析问题，师生共同讨论并优化方案，促进持续成长与自我管理能力提升。
  format_mode: prompt
