agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为物理-小学-家庭安全趣味实验指导教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是42岁的女老师，我平时喜欢太极和舞蹈，性格比较正式，也很注重在教育和休闲社区的联系。我想在家里指导孩子做些有趣又安全的小学物理实验，你能具体说说吗？希望能有细致的建议和示例，最好能兼顾亲子互动和科学探索的氛围。
  - question: 我儿子三年级，特别喜欢动手做实验，但是有点粗心，家里有些基本工具像量杯、橡皮筋、小灯泡什么的。我挺担心安全问题，尤其是用电的时候。你能具体说说怎么安排安全又有趣的实验吗？还有我该怎么引导他注意安全？
  - question: 你作为家庭安全教育专家，我是新手小学物理老师，班里有几个挺调皮的孩子，家长对安全很在意。学校还希望我们能多做点促进亲子交流的家庭物理实验。你能帮我讲清楚怎么设计既有趣又安全的家庭实验吗？还有怎么跟家长沟通安全注意事项？
  - question: 最近家里孩子特别喜欢做物理小实验，他很爱问为什么，但我们家空间不大，不过家长很愿意一起陪他玩。能不能大概讲讲，适合小空间做的安全有趣物理实验有哪些？还有怎么引导孩子自己思考科学原理？
  - question: 我是五年级学生的爸爸，我女儿很喜欢做科学实验，但有点胆小，怕会受伤。我们家里有水、纸板、磁铁、气球这些材料。你作为家庭物理教育专家，能全面深入地讲讲怎么设计既安全又能激发她自信和创新力的趣味物理实验吗？还有怎么在实验过程中培养亲子互动和科学精神？希望你能结合中国家庭的温情，说得详细一些。
  - question: 我是四年级男孩的家长，他很外向，喜欢和大家一起玩。我希望通过在家做物理实验，培养他合作能力和安全意识。你作为小学物理老师，能具体说说怎么设计这样的家庭趣味实验吗？最好能结合中国家庭注重团结的传统，给点具体建议和例子。
  - question: 我是一名小学班主任，班里孩子都特别爱问问题，也愿意回家做实验，但家长对安全还是有些担心。你能简要说明下怎么让家长放心支持孩子吗？顺便给几个简单安全的实验建议。
  - question: 我是家长，你作为物理老师，我家有两个孩子，一个六年级的喜欢动手做实验，另一个二年级刚开始接触科学。我希望通过家庭实验让兄妹多互动，也培养他们对科学的兴趣，但又担心年龄差异和安全问题。你能彻底说清楚怎么设计既能照顾不同年龄段、又能保障安全和亲情互动的家庭物理实验吗？最好结合中国家庭观念和教育理念，系统讲讲。
  - question: 我是小学物理老师，班上有几个孩子特别爱探索，家长也很支持，但他们希望能更多了解实验背后的原理和安全措施。你能详细讲讲有哪些适合家庭做的物理趣味实验吗？还想知道怎么保证安全、怎么通过中国故事或家庭互动激发孩子的科学兴趣。
  - question: 你作为小学物理家庭实验指导老师，我是五年级女孩的妈妈，我女儿喜欢画画，对科学有点兴趣但不是很主动。我想通过家庭实验激发她的积极性和想象力，你能全面分析一下怎么把美术和物理结合起来，设计创意安全的家庭趣味实验吗？希望能鼓励孩子多探索科学，还能融入家庭温情和中国的亲子理念。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 物理-小学-家庭安全趣味实验指导进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 能充分识别并针对学生年龄、兴趣、能力、家庭环境等多元差异，动态调整实验指导内容。要求对特殊需求、资源受限等情况提供具体可行的分层建议，不仅限于简单区分年级或兴趣，更需体现对个体背景的深入理解与灵活应对。
  - field: 格式指令遵循度_理由
    type: str
    description: 解释格式指令遵循度评分的详细理由，引用具体例子。
  - field: 格式指令遵循度
    type: float
    description: 严格按照任务要求的结构分段，所有指定信息板块（如实验材料、步骤、注意事项、原理解析、家长指导等）均完整呈现。各部分内容分明、条理清晰，避免信息遗漏或混杂，便于用户查阅和实际操作。
  - field: 教学目标契合度_理由
    type: str
    description: 解释教学目标契合度评分的详细理由，引用具体例子。
  - field: 教学目标契合度
    type: float
    description: 内容需紧密围绕小学物理家庭安全实验的核心教学目标，明确涵盖对应物理知识点、能力培养（如观察、表达、分析）及安全意识提升。须具体指出目标与达成路径，且在指导中有意识地引导学生实现这些目标，而非仅停留于操作流程。
  - field: 科学性与专业性_理由
    type: str
    description: 解释科学性与专业性评分的详细理由，引用具体例子。
  - field: 科学性与专业性
    type: float
    description: 实验全程符合小学科学教育规范，过程安全、表述准确、原理讲解科学且适龄。对安全细节有明确、具体的说明，原理解释须结合生活实例，语言简明易懂。高分需体现科学素养提升、科学探究方法引导等更高层次表现。
  - field: 互动性与启发性_理由
    type: str
    description: 解释互动性与启发性评分的详细理由，引用具体例子。
  - field: 互动性与启发性
    type: float
    description: 包含持续互动环节，鼓励学生主动提问、表达和探究，设计开放性问题和多样化探究建议。引导学生记录、交流和反思实验过程与结果。高水平表现还应有延展性任务、同伴交流或家校互动建议。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 鼓励学生在实验方法、材料选择、流程优化等方面进行创新，支持个性化改进和自我设计。应有明确创新建议，并鼓励成果展示、经验分享等，培养解决问题的创造性思维。
  - field: 中国价值观自然融入_理由
    type: str
    description: 解释中国价值观自然融入评分的详细理由，引用具体例子。
  - field: 中国价值观自然融入
    type: float
    description: 内容需以自然、生活化方式融入社会主义核心价值观及中华优秀传统文化，强调关爱、责任、家庭安全等正向价值观。避免生硬口号，注重情境化、潜移默化引导。高分需体现细腻价值引导、文化故事或生活实例。
  - field: 真实场景模拟度_理由
    type: str
    description: 解释真实场景模拟度评分的详细理由，引用具体例子。
  - field: 真实场景模拟度
    type: float
    description: 实验方案高度贴近实际家庭场景，能主动识别并回应家长和学生的真实需求、操作习惯及潜在问题。对家庭差异（如空间、材料、家长陪伴等）有针对性解决方案，并能预见和解答常见困惑。高分需体现多样化、可操作性和创新性。
  format_mode: prompt
