agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为语文-初中-中考备考支持教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是五年级女生AndersonScarlett，喜欢背诵、羽毛球和京剧，但在竞争环境下容易焦虑和缺乏自信。语文学习时总担心考不好，你作为学习指导专家，能简短回答下我在中考备考时会遇到哪些心理障碍？有什么方法能帮我缓解焦虑、提升自信吗？说说主要的就好。
  - question: 我是初中语文老师，发现一些学生中考作文总是很模板化，没有真情实感或创新。你能解释一下为什么会这样吗？在教学中怎么培养孩子的真实表达和创新写作能力呢？最好能举些例子说明。
  - question: 我是江雨，高二女生，喜欢冥想、钢琴和写作，性格持续专注但有点盲从和逃避，功利心强、分析力不错，人际关系简单。课外活动和社交圈都围绕学业，跟师长交流很表面，成绩就是我的动力。你作为教育专家，能详细展开说说我在语文中考备考时会遇到哪些学习和心理挑战吗？结合我的性格和社交方式，怎么制定高效的备考策略和心理调适？最好能分点分析，具体举例，多讲讲实际操作的方法。
  - question: 我是初三新班主任，虽然带过几届毕业班，但这届孩子语文基础普遍较差，文言文和写作都偏弱，有些学生还容易厌学、自卑。你作为语文备考专家，能彻底说清楚在这种班级背景下怎么科学规划中考语文备考吗？最好分点系统讲讲，结合实际案例，把学情分析、分层教学、文言文和作文突破、心理疏导、家校协同、激励机制以及价值观和传统文化的自然融入都说清楚。
  - question: 我是初中语文教研员，负责全校中考备考。我们学校语文成绩分化很明显，优生作文好但阅读理解弱，中下层学生则没兴趣也没自信。你能全面深入地讲讲怎么针对这种学情设计分层备考方案吗？最好分点系统分析，讲清楚知识点梳理、分层训练、个性化辅导、心理激励、家校联动，还有怎么在教学中自然传递核心价值观和中华传统文化。结合实际经验和案例，多讲讲具体做法。
  - question: 我现在初三，语文成绩算中等，但文学类文本阅读题总是抓不住重点，尤其分析人物形象和表达情感时容易写偏。你能帮我理解一下这类题的常见答题思路和技巧吗？举个例子说明怎么分析人物和情感表达，让我考试能答得更准确。
  - question: 我家孩子初三了，语文作文总丢分，现在有点没自信。他写作时素材不多，表达也不太有条理。你能讲清楚点为什么会这样吗？家长在家里怎么帮孩子积累素材、理清思路、提升表达和自信？说说具体的方法和建议。
  - question: 你作为语文教学专家，能说说古诗词鉴赏题常见的高分答题要点和易错点吗？简单讲讲主要的内容，方便我们复习时快速掌握。
  - question: 我初三，语文成绩不好，说明文阅读题总是做不好，觉得结构和表达方式很难把握。你能具体说说说明文阅读题常考的点、答题技巧和容易犯的错误吗？举个例子说说怎么提升说明文阅读和答题能力。
  - question: 我是初一语文老师，班里有几个学生写作兴趣不高，作文词汇少、内容单调，影响了他们中考作文的表现。你能讲得详细点吗，分析一下是什么原因造成的？结合实际经验，怎么通过课堂活动、阅读引导、写作训练和心理激励等方法提升他们写作兴趣和表达能力？最好分点分段，举例讲清楚。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 语文-初中-中考备考支持进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 评估答复是否能针对学生的学习基础、兴趣、薄弱环节等个体特征，动态调整教学建议。高分要求主动探查学生特点、持续调整方案，并呈现个性化反馈；中分为部分关注但未深入；低分为模板化、无针对性。
  - field: 格式与结构指令遵循度_理由
    type: str
    description: 解释格式与结构指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与结构指令遵循度
    type: float
    description: 评估答复是否严格按照提问中规定的格式、结构、分点等要求组织内容。高分需完全遵循指令、结构清晰、层次分明，并在适当处优化版式；中分为基本遵循但有小瑕疵；低分为结构混乱、未按要求组织。
  - field: 教学方法科学性与创新性_理由
    type: str
    description: 解释教学方法科学性与创新性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与创新性
    type: float
    description: 评估所用教学方法是否基于教育学原理，包含启发式、递进式、学以致用等，同时引入创新元素（如跨学科、项目式、数字化工具等）。高分要求方法多元、创新明显、能激发主动学习；中分为方法合适但创新不足；低分为机械灌输、无互动。
  - field: 知识点准确性、系统性与迁移能力_理由
    type: str
    description: 解释知识点准确性、系统性与迁移能力评分的详细理由，引用具体例子。
  - field: 知识点准确性、系统性与迁移能力
    type: float
    description: 评估知识点讲解是否准确、系统、逻辑清晰，能构建知识网络，并强调知识迁移与实际应用。高分需全方位覆盖、能举一反三并结合实际场景；中分为知识准确但系统性弱或迁移不足；低分为孤立片面、存在知识性错误。
  - field: 激发创新与思辨能力_理由
    type: str
    description: 解释激发创新与思辨能力评分的详细理由，引用具体例子。
  - field: 激发创新与思辨能力
    type: float
    description: 评估是否设置开放性问题、引导多角度思考、鼓励表达独特见解，促进学生创造力和批判性思维。高分需有具体引导、互动讨论；中分为有创新引导但不够深入；低分为只灌输标准答案，未引发思辨。
  - field: 模拟真实提问场景贴合度_理由
    type: str
    description: 解释模拟真实提问场景贴合度评分的详细理由，引用具体例子。
  - field: 模拟真实提问场景贴合度
    type: float
    description: 评估答复内容是否贴合初中生真实备考情境，语言自然亲切，问题有代表性，能反映学生常见困惑。高分需高度贴合学生语境，能共情和缓解焦虑；中分为部分贴合但略显书面化；低分为语言生硬或内容脱离学生需求。
  - field: 社会主义核心价值观与中华文化自然融入_理由
    type: str
    description: 解释社会主义核心价值观与中华文化自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华文化自然融入
    type: float
    description: 评估讲解过程中是否自然融入社会主义核心价值观和中华优秀传统文化，结合文本或情境进行正向价值引导。高分为润物细无声、内容融合自然；中分为有价值观渗透但略显生硬；低分为完全缺失或强行插入导致割裂。
  - field: 学习兴趣激发与情感支持_理由
    type: str
    description: 解释学习兴趣激发与情感支持评分的详细理由，引用具体例子。
  - field: 学习兴趣激发与情感支持
    type: float
    description: 评估答复是否关注学生情感，通过鼓励、共情、趣味引导等方式激发兴趣、缓解压力、增强自信。高分需有针对性激励和趣味方法，能调动积极情绪；中分为一般性鼓励但缺乏个性化；低分为机械说教、无情感关怀。
  - field: 答复完整性、针对性与深度_理由
    type: str
    description: 解释答复完整性、针对性与深度评分的详细理由，引用具体例子。
  - field: 答复完整性、针对性与深度
    type: float
    description: 评估答复是否对问题进行全面、具体、深入、有针对性地解答，涵盖所有关键环节，有案例或方案支撑。高分需结构化、层级清晰、分析深入、能提出反思性建议或提升方案；中分为基本覆盖但不够深入或遗漏细节；低分为泛泛而谈、遗漏要点或无实际指导价值。
  format_mode: prompt
