agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为语文-小学-趣味教学法教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是HarrisRuby，55岁英语老师，平时喜欢研究方言、书法和旅游，管理风格比较随性，逻辑思维不太强，喜欢慢慢改革和反思。我想把自己的兴趣融进小学语文趣味教学，但总找不到系统思路。你作为小学语文趣味教学法专家，能讲清楚点，像我这样的老师，怎么在语文课堂上自然结合方言、书法和旅行见闻，让课堂更有趣，也让学生感受到语文的生活气息和中华文化的魅力？
  - question: 我是小学语文老师，班上有个男孩喜欢画画，但语文成绩一般，觉得语文课枯燥，上课容易分心。你作为小学语文趣味教学法专家，大概讲讲我该怎么结合他的绘画兴趣，把趣味性融进语文教学，让他慢慢喜欢语文？
  - question: 我是小学语文实习老师，带三年级。班上几个女生平时很活泼，课堂发言多，但一到写作课就说没话写。我想用趣味教学法激发她们写作兴趣，你作为语文趣味教学顾问，简单说说针对这种情况，有哪些有趣又实用的写作教学方法？
  - question: 你好，我是WilsonVincent，52岁小学语文老师，喜欢门球、休闲游戏和航空模型，做事有条理但对压力比较敏感，平时注重方法和课堂节奏，也喜欢创意。最近我在趣味语文教学上遇到瓶颈，想让课堂更有创新和本土文化特色，还能让学生在轻松氛围中收获成就感。你作为小学语文趣味教学法专家，能详细展开说说，怎么结合我的个人特点，系统设计语文趣味教学活动，让课堂既有创新性又融入本土文化，同时帮助学生愉快成长吗？
  - question: 我是小学语文教研员，要指导年轻老师提升趣味教学能力。我们这边学生基础、性格、兴趣差异挺大。你作为小学语文趣味教学法专家，能全面深入地讲讲，在中国小学实际课堂里，怎么针对不同性格、兴趣和基础的学生，设计能激发兴趣、培养语文核心素养、还有本土创新特色的趣味教学活动和策略？最好结合具体案例、活动流程、家校共育和传统文化等方面系统说说。
  - question: 你好，我是于苑博，60岁的老话剧演员，剧团核心成员，喜欢声乐练习和健身，团队意识强，做事讲享受和效率，组织能力也不错。最近带小学生体验话剧和语文表演时，发现他们对语文朗读兴趣不高。你作为小学语文趣味教学法专家，能解释一下，像我这样有表演和团队经验的人，怎么把语文朗读和话剧表演结合，既激发孩子兴趣，又让他们在合作中体验语文之美？
  - question: 我是小学语文老师，班上有个孩子特别喜欢讲笑话，上课总是插话，其实很聪明，就是不喜欢按部就班地学。我想用趣味教学法让他和全班同学更投入语文学习。你作为小学语文趣味教学专家，帮我理解一下，针对这种幽默、爱插话但有潜力的学生，怎么设计既能发挥他们特长、又能维持课堂秩序的趣味语文教学策略？
  - question: 你好，我是余铁，46岁的老师，喜欢AI绘画和攀树，工作和兴趣常常混在一起，有时候动力很足，有时候也会倦怠。最近发现班里孩子对古诗词兴趣不高，想用趣味教学法激发他们的学习动力，但又怕活动太花哨分散注意力。你作为小学语文趣味教学专家，能深入讲解一下，像我这样热衷AI绘画和攀树、工作生活界限模糊的老师，怎么创新设计古诗词的趣味教学活动，既能调动孩子兴趣，又能保证教学有效性和文化深度？
  - question: 我是AndersonValentina，47岁的英语老师，喜欢打羽毛球和画画，教学风格有同理心但偏单向交流，也很有热情。你作为小学语文趣味教学专家，讲讲看，像我这种老师，怎么设计有感染力和趣味性的语文课堂活动，让学生能主动参与并体会语文的美？
  - question: 你好，我是丁煜婷，59岁的水管工，喜欢钓鱼和木工DIY，做事比较靠压力驱动，在维修圈人脉广，经常和同行交流钓鱼、木工经验。最近有机会参与小学语文课堂的家校共育活动，想用自己的生活经验帮助孩子们理解语文。你作为小学语文趣味教学法专家，能系统地讲解一下，像我这样有丰富生活经验和手工爱好的家长，怎么参与小学语文趣味教学，帮助孩子们把语文知识和生活技能结合起来，培养实践能力和热爱生活的态度？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 语文-小学-趣味教学法进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 评估教学建议是否充分结合学生的多维个性信息（如年级、兴趣、学习风格、学习基础、学习进展等），做出精准差异化回应，并能根据学生表现持续动态调整教学策略。高分要求体现持续追踪、反馈与个别化调整，低分为仅一次性回应或忽视学生差异。
  - field: 指令遵循与格式一致性_理由
    type: str
    description: 解释指令遵循与格式一致性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式一致性
    type: float
    description: 评估回答是否严格遵循用户指令要求，包括结构、分点、步骤、标题、字数等规范，内容完整无缺漏，逻辑清晰，无随意增减无关内容。高分需格式高度统一，内容详实且无遗漏，低分为格式混乱或内容缺失。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学方法是否符合现代教育学原理，能促进学生主动参与、深度理解与综合能力提升。高分要求方法多样（如小组合作、探究、反思等）、理论与实践结合、分层指导，并能根据学生反馈迭代优化。仅表面多样或无理论支撑为中低分；机械、单一、被动学习为低分。
  - field: 活动设计专业性_理由
    type: str
    description: 解释活动设计专业性评分的详细理由，引用具体例子。
  - field: 活动设计专业性
    type: float
    description: 评估教学活动目标明确、流程步骤清晰、操作性强，能有效落实教学目标。高分要求活动具备分层、多样化方案，流程细致且易于执行，能针对不同学生差异进行调整。低分为目标模糊、流程混乱、无分层或差异化设计。
  - field: 创新思维激发_理由
    type: str
    description: 解释创新思维激发评分的详细理由，引用具体例子。
  - field: 创新思维激发
    type: float
    description: 评估教学内容或活动是否能深度激发学生创造力和独立思考，鼓励多样化表达与原创性成果。高分要求学生能主动探索、多渠道创新、成果多样，评价标准突出原创性与独立思考，活动有实际创新成果。仅允许创新但实际空间有限或创新形式流于表面为中分，单一复述教材为低分。
  - field: 开放性问题设置_理由
    type: str
    description: 解释开放性问题设置评分的详细理由，引用具体例子。
  - field: 开放性问题设置
    type: float
    description: 评估教学中是否有高质量开放性问题，能引导学生多角度思考、表达独立见解，问题具有探索性和多元答案可能。高分需包含批判性思考、结构性表达、鼓励学生提出新问题并合作探究。仅浅层开放或答案单一为中低分。
  - field: 价值观自然融入_理由
    type: str
    description: 解释价值观自然融入评分的详细理由，引用具体例子。
  - field: 价值观自然融入
    type: float
    description: 评估教学内容是否将社会主义核心价值观与中华优秀传统美德自然融入情境、故事或活动中，润物细无声，引发学生主动思考与讨论。高分要求价值观融入过程自然、情境真实、能激发学生自我反思与行动。生硬灌输或强加口号为低分。
  - field: 文化传承与本土特色_理由
    type: str
    description: 解释文化传承与本土特色评分的详细理由，引用具体例子。
  - field: 文化传承与本土特色
    type: float
    description: 评估教学内容是否充分融入中国传统文化、地方特色元素，帮助学生体验汉字之美、中华文化底蕴，并结合实际生活场景。高分要求文化融入有深度、活动结合本地实际，学生能主动体验和表达。照搬国外趣味方法或文化融入流于表面为低分。
  format_mode: prompt
