agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为化学-小学-生活中缓慢变化的观察与解释教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是赵曼萍，18岁，做环境科学工作，喜欢园艺、观鸟和徒步，经常和环保圈子的朋友交流。你作为小学化学专家，能不能结合我的兴趣，简单说说生活中有哪些缓慢变化值得观察，它们的观察、记录和解释分别该怎么做？简单说说就行。
  - question: 我是小学科学老师，最近在带学生做‘生活中缓慢变化’的科学探究。你作为我的教研助手，能不能详细展开说说，怎么带学生分步观察、科学记录、合理解释这些缓慢变化，还能引导他们提更多问题？希望能讲讲具体的教学建议和一些创新做法。
  - question: 我是四年级学生，平时喜欢画画和写观察日记。最近老师让我们观察生活中的缓慢变化，比如铁生锈、叶子变黄。你作为我的学习助手，能不能简要说明下要怎么一步步用科学探究的方法去观察、记录和解释这些现象，还能怎么提出新问题？
  - question: 我是刚入职的小学科学老师，你作为小学化学专家，能不能全面深入地讲讲怎么引导不同性格、兴趣的学生来探究‘生活中缓慢变化’？希望你从观察、记录、解释、提出问题这四个环节出发，结合实际给出针对不同学生的教学建议，也能把中国传统和价值观自然融进去，还要多说说创新和实践的方法。
  - question: 我是五年级学生，最近在家里观察铁钉生锈，挺好奇这种缓慢变化是怎么被科学探究出来的。你作为我的学习助手，能解释一下，科学探究的过程具体是怎么一步步进行的吗？多举些例子讲讲。
  - question: 我是六年级女生，做事比较细心，特别喜欢记笔记和画图。最近老师让我们观察生活中的缓慢变化，比如水果腐烂。你作为小学科学专家，能不能讲清楚点，整个科学探究的流程要怎么做，从观察、记录到解释和提出问题？最好能结合例子详细说说。
  - question: 我是四年级班主任，班上有不少好奇但容易分心的孩子。你作为小学化学专家，能不能全面分析一下，要怎么用科学探究的方法引导他们观察和解释生活中的缓慢变化？特别是记录和提出问题这块，怎么激发他们的兴趣？希望你能详细讲讲，举些例子和分析。
  - question: 我是五年级学生，最近在家做了个土豆发芽的实验。你作为我的科学学习助手，能不能解释一下，像这种生活中的缓慢变化，科学探究时每一步是怎么做的？希望你能讲讲观察、记录、解释和提出问题，每一步都举点例子。
  - question: 我是马丽，36岁营养师，平时喜欢看健康书和做饭，不过对新环境适应力不太强。最近在厨房经常看到水果慢慢变软、发霉。你作为小学科学助手，能不能帮我理解一下，这些缓慢变化要怎么用科学探究的步骤去观察、记录、解释和进一步思考？希望能多举些例子。
  - question: 我是林妍碧，34岁老师，平时也做文学写作和方言研究，在教师圈有些影响力，工作上喜欢精准表达和渐进改革。你作为小学科学教学专家，能不能全面深入地讲讲，怎么把‘生活中缓慢变化的观察与解释’做成一个跨学科的主题活动？希望你结合科学探究的四步，给出分层教学设计、差异化活动和创新评价建议，还能自然融入中国传统文化和价值观，帮助教师实现教学创新和学生全面发展。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 化学-小学-生活中缓慢变化的观察与解释进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 评估教学是否根据学生的年龄、兴趣、学习能力和表达方式差异，提供分层支持与个性化引导。高分要求教师能主动识别并响应不同学生的需求，设计多渠道参与和表达机会，记录个体成长，针对性反馈，确保每位学生都能有效参与和进步。
  - field: 指令遵循完整性_理由
    type: str
    description: 解释指令遵循完整性评分的详细理由，引用具体例子。
  - field: 指令遵循完整性
    type: float
    description: 评估教学设计与实施是否严格遵循既定教学流程（如观察-记录-解释-提出问题），各环节顺序合理、内容无遗漏，每一环节均有明确目标和产出，且教师给予有效指导。高分要求每个环节均得以落实，并有学生实际参与和成果展示。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学方法是否基于小学生认知规律，采用多样化、互动性强的策略（如实验、情境创设、游戏、讨论等），促进主动参与和科学思维。高分要求方法多元、学生广泛参与，教学活动能激发兴趣、支持深度理解，兼顾理论与实践。
  - field: 探究式学习引导_理由
    type: str
    description: 解释探究式学习引导评分的详细理由，引用具体例子。
  - field: 探究式学习引导
    type: float
    description: 评估教学是否通过开放性问题、鼓励自主实验、组织讨论等方式，激发学生主动探索和多角度分析。高分要求教师不仅提出探究任务，还引导学生自主设计实验、交流不同发现，并支持多样化成果表达。
  - field: 创新思维激发_理由
    type: str
    description: 解释创新思维激发评分的详细理由，引用具体例子。
  - field: 创新思维激发
    type: float
    description: 评估教学是否鼓励学生提出新见解、尝试不同观察与解释方法，支持独立思考和创造性表达。高分要求学生能自主改进实验方案、提出创新性问题或解释，教师积极引导和支持创新尝试。
  - field: 内容适龄性与易懂性_理由
    type: str
    description: 解释内容适龄性与易懂性评分的详细理由，引用具体例子。
  - field: 内容适龄性与易懂性
    type: float
    description: 评估教学内容和语言是否贴合小学生认知水平，示例生活化、易于理解，避免复杂术语和抽象概念，注重趣味性和亲近感。高分要求内容有趣、语言简明，结合图片、动画或实际物品辅助讲解，学生能轻松理解和表达。
  - field: 社会主义核心价值观自然融入_理由
    type: str
    description: 解释社会主义核心价值观自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观自然融入
    type: float
    description: 评估教学是否自然融入诚实、合作、尊重自然等价值观，通过具体活动或语言引导学生在实践中践行相关价值观。高分要求在小组活动中有明确分工、诚信记录、协作讨论、尊重自然的行为引导，并鼓励学生反思与践行。
  - field: 中华优秀传统文化传承_理由
    type: str
    description: 解释中华优秀传统文化传承评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化传承
    type: float
    description: 评估教学是否恰当融合中华传统文化元素，如诗词、成语、民间故事、古代科学智慧等，引导学生体会科学与文化的联系，提升文化认同感。高分要求能结合传统文化表达观察成果，讲述相关故事或引用诗词，鼓励学生用传统艺术方式参与。
  format_mode: prompt
