tasks:
  mode: iter
  content:
  - question: 我是初中英语老师，最近发现班上有不少学生在阅读理解部分总是容易丢分，特别是一遇到长文本或者生词较多的题目就容易放弃。你作为英语教育专家，能具体说说适合初中生的英语阅读理解策略与技巧吗？尤其是怎么帮助学生在遇到难句和生词时保持积极心态并有效获取信息。
  - question: 我是一名初中生，最近英语阅读理解题总是得分不高，特别是抓不住文章主旨和细节信息。你作为学习指导老师，简要说明下我可以用哪些有效的方法提升英语阅读理解能力，最好能举些简单的例子。
  - question: 我是初中英语新教师，发现部分学生做阅读理解题时很容易被复杂句型和生词影响，导致无法理解文章核心内容。你作为教学顾问，能讲得详细点吗？请帮我系统讲讲在初中英语阅读理解教学中，怎么科学设计训练方案，帮助学生逐步提升分析长难句、猜测生词、提取主旨和细节的能力，最好能结合真实课堂案例和生活场景，让学生体会到阅读的乐趣与价值。
  - question: 我是一名初中英语教研员，最近准备给老师们做一次关于阅读理解教学策略的专题培训。你作为英语教育专家，详细展开说说吧，从文本选择、题型训练、学生心理和课堂活动等角度详细介绍初中英语阅读理解教学的科学策略和实用技巧，还希望你能结合中华优秀传统文化及科学思维在教学中的细腻渗透，激发学生的多元思维与创造力。
  - question: 你作为英语学习指导老师，详细说说吧：从初中到高中阶段，如何帮助像我这样的女生——我是MooreAria，18岁，高三学生，喜欢时尚造型、外语学习和骑行，有较强的专注力，习惯将学业与创意时尚以及语言练习有序结合，并通过骑行和个人成长培养独立性——在英语阅读理解方面持续发力，提升主旨理解、细节捕捉和跨文化思考能力，尤其希望策略可以和我的兴趣、日常习惯结合，让学习更有趣更有效。
  - question: 我是初中生家长，我家孩子刚升初中，英语基础薄弱，尤其在做阅读理解题时总是丢分、缺乏信心。你作为英语教育专家，帮我理解一下怎么科学引导和鼓励孩子提升英语阅读理解能力，包括日常学习方法、心理建设和家庭支持这些方面的具体建议。
  - question: 我是初中英语教师，最近班里有学生反映做阅读理解题时容易被一些陌生单词卡住，影响整体理解。你作为英语教学顾问，大概讲讲初中生遇到生词时应采取哪些科学策略，怎么帮他们顺利完成阅读理解题。
  - question: 你作为英语教育专家，从各个角度详细说说吧：针对WhiteAurora（53岁，女性，教师，热爱旅行、方言研究和社区活动，教学风格随性灵活、善于适应变化，习惯用灵活和适应性强的方法教学），在初中英语阅读理解教学中，怎么根据学生差异与多元兴趣科学整合文本选择、任务设计、分层指导和课堂活动，全面提升学生的阅读理解力，同时细腻渗透中华传统文化与科学思维，让教学既有系统性又能激发学生的兴趣与创造力。希望能结合真实课堂案例、社区活动和跨文化交流的实际经验，多角度深入讲讲。
  - question: 我是初中班主任，最近发现班里有几位学生英语阅读理解总是丢分，主要是抓不住文章主旨和容易忽略细节。你作为英语教学专家，讲讲看怎样科学培养学生的主旨提取能力和细节捕捉能力，同时提升他们的积极阅读态度。
  - question: 我是一名英语教研组组长，准备组织一次关于初中英语阅读理解教学创新的专题研讨。你作为英语教育专家，给我一份完整的分析吧，系统讲讲初中英语阅读理解教学的核心难点、创新教学策略、分层指导、跨学科融合和多元文化渗透等方面，最好能结合真实案例、科学方法和中华优秀传统文化，提出可操作的教学建议，帮助教师们提升课堂教学质量和学生的综合阅读能力。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-初中-阅读理解的策略与技巧进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像深度适配_理由
    type: str
    description: 解释个性化画像深度适配评分的详细理由，引用具体例子。
  - field: 个性化画像深度适配
    type: float
    description: 评估内容是否基于学生的真实学习基础、兴趣、认知风格和成长轨迹，能动态调整教学策略，持续收集并响应学生反馈，实现分层、分流与个体差异的长期跟踪与优化。高分需体现学生主动参与画像完善、个性化方案迭代，以及对不同群体的持续支持。
  - field: 格式规范与表达质量_理由
    type: str
    description: 解释格式规范与表达质量评分的详细理由，引用具体例子。
  - field: 格式规范与表达质量
    type: float
    description: 回答内容是否严格遵循题目结构要求，分点、层级清晰，语言规范、简明，逻辑递进自然。高分需体现结构创新（如图表、流程图辅助表达）、内容无歧义、重点突出，并能有效引导读者深入理解，避免仅满足基本分点要求。
  - field: 科学教学方法整合性_理由
    type: str
    description: 解释科学教学方法整合性评分的详细理由，引用具体例子。
  - field: 科学教学方法整合性
    type: float
    description: 教学设计是否结合主流教育理论（建构主义、差异化、元认知、合作学习等），并在课堂流程中创新应用，形成理论与实践的双向反馈。高分需体现多理论融合、分层推进、课堂活动创新，以及对学习过程的持续评价与优化。
  - field: 策略实用性与课堂可操作性_理由
    type: str
    description: 解释策略实用性与课堂可操作性评分的详细理由，引用具体例子。
  - field: 策略实用性与课堂可操作性
    type: float
    description: 阅读理解策略是否具体、明确、步骤可执行，配套工具和流程易于在课堂或自学中直接落地，包含操作细节、评价方式，并能通过实际应用获得成效反馈。高分需体现策略多样性、适应不同学生、并有实际成效验证与持续优化。
  - field: 真实问题契合与针对性解答_理由
    type: str
    description: 解释真实问题契合与针对性解答评分的详细理由，引用具体例子。
  - field: 真实问题契合与针对性解答
    type: float
    description: 回答内容是否精准聚焦初中生英语阅读理解中的实际困惑，针对具体问题（如主旨句定位、推理理解、信息筛选等）提供细致、有效的解决方案，体现对学生真实需求的深度洞察。高分需结合典型案例、学生提问、并有针对性练习设计。
  - field: 思维拓展与创新激发_理由
    type: str
    description: 解释思维拓展与创新激发评分的详细理由，引用具体例子。
  - field: 思维拓展与创新激发
    type: float
    description: 内容设计是否鼓励学生多角度分析文本，提出开放性问题、探究任务或项目式学习，激发创新思考、自主探索和批判性评价能力。高分需体现学生主动提出见解、参与文本改写或跨学科探究，形成创新性成果或多元表达。
  - field: 价值观与文化内涵润物细无声融入_理由
    type: str
    description: 解释价值观与文化内涵润物细无声融入评分的详细理由，引用具体例子。
  - field: 价值观与文化内涵润物细无声融入
    type: float
    description: 内容是否自然融合社会主义核心价值观和中华优秀传统文化，在实际任务、情境、合作等活动中潜移默化引导品德养成。高分需体现价值观与文化内涵的创新渗透，如通过跨文化对比、角色扮演等方式促进尊重、合作与多元理解，避免表面化或生硬灌输。
  format_mode: prompt
