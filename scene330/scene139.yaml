    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为生物-初中-生物技术与社会应用的连接教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是六年级男生相宁，喜欢做科学实验、野外露营和书法，父母离异后和妈妈一起生活，周末去科学实验班和同龄人交流不多。老师说我在比赛和活动里不太主动，不过书法作品经常被展出。我一直对生物技术感兴趣，比如转基因食品、微生物发酵、克隆动物这些，但有点搞不懂这些技术和我们生活到底有什么实际联系，特别像我这样不喜欢竞争、喜欢动手实验的人，学这些内容到底有什么意义？你作为生物教育专家，能不能系统地讲解一下，还能结合我的兴趣和性格给我一些适合的学习建议？
  - question: 我是初中生，最近上课学到转基因技术，听说能让农作物更抗病、产量高，但网上也有人说转基因食品不安全，还可能影响环境。你怎么看转基因食品的好处和坏处？说说你的看法
  - question: 我是高一女生简莲，喜欢和朋友练瑜伽、研究美妆，也参加声乐社团，和妈妈关系很好，但对生物课的小组合作总是没什么兴趣，觉得不太自在。我发现现在很多化妆品、护肤品广告都会提到‘生物科技’，像玻尿酸、胶原蛋白什么的。你能作为生物学和生活导师，系统地讲讲现代生物技术在我们日常生活，比如护肤品、健康产品、运动等方面的应用和影响吗？希望能讲得具体点，也能结合我的兴趣和性格给我一些合适的学习建议。
  - question: 我是初中生家长，女儿最近在生物课上问我，超市里很多酸奶写着‘添加益生菌’，还有些食品强调‘无添加抗生素’，这些到底是什么意思？你能讲清楚点，益生菌、抗生素这些生物技术在食品里有什么用，我们平时要注意什么？
  - question: 我是一名初中生，喜欢和爷爷奶奶一起种菜，最近听说有‘无土栽培’和‘智能农业’这些新技术，感觉挺新鲜，但我不太明白和传统种地有什么不同。你作为学习助手，能不能深入说说现代生物技术对农业生产带来了哪些变化？能举些适合和家人一起体验的例子吗？
  - question: 我是初中生，新闻里看到科学家用基因编辑技术治好了一些遗传病，但也有人担心这种技术会被滥用，甚至影响人类基因。你能详细说说基因编辑技术究竟是什么吗？它有什么好处和风险？
  - question: 我是初中生，老师布置作业要总结生物技术在医学方面的应用。其实我对这个没什么特别兴趣，你能帮我概括一下医学里常见的生物技术应用都有哪些？简单说说就行
  - question: 我是41岁的老师陆娜，平时喜欢研究方言、做公益活动，对教学有一定仪式感但管理比较粗放。最近在社区活动发现有家长对生物技术很感兴趣，也有人觉得‘转基因’、‘克隆’这些词很可怕。作为方言文化的传播者，我想组织一次科普活动，帮助大家理性看待生物技术。你能结合社区实际，讲讲看怎么设计一场既有科普性又能兼顾多元文化的生物技术专题活动吗？
  - question: 我是初中生，老师上课讲到‘生物多样性保护’，还说跟生物技术发展有关系。我有点搞不明白，这两者是怎么联系的？你能大概讲讲吗？
  - question: 我是35岁的男老师陈耀，平时喜欢虚拟现实开发和无人机航拍，但很少和同事聊这些兴趣，遇到事喜欢自己独处思考。最近发现班里学生对生物技术和社会话题的互动不积极，尤其在涉及伦理争议（像克隆、基因编辑）时，讨论都很表面。你作为教学顾问，能不能详细展开说说在初中生物课堂上怎么引导学生深入思考生物技术的社会影响和伦理问题？希望你结合实际教学和科技创新，给出具体可操作的建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 生物-初中-生物技术与社会应用的连接进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评价教学设计是否针对学生的不同学习基础、兴趣、认知特点进行分层与动态调整。高分需体现针对性任务、资源支持，并根据学生反馈持续优化教学策略，低分则表现为一刀切、忽视差异。
  - field: 指令遵循完整性_理由
    type: str
    description: 解释指令遵循完整性评分的详细理由，引用具体例子。
  - field: 指令遵循完整性
    type: float
    description: 评价教学内容是否严格按照任务要求完成全部环节，且各环节内容充实、逻辑衔接清晰。高分需完整覆盖每一环节且有细致展开，低分则表现为遗漏、简略或顺序混乱。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评价教学策略是否结合学生认知发展、学科特点，采用多元互动、探究、建构性方法。高分需融合多种教学方法，如实验、讨论、情境模拟、及时反馈与反思，促进主动学习和知识迁移。
  - field: 知识与社会应用深度连接度_理由
    type: str
    description: 解释知识与社会应用深度连接度评分的详细理由，引用具体例子。
  - field: 知识与社会应用深度连接度
    type: float
    description: 评价教学内容是否将生物学知识与现实社会问题、生活情境进行多维、系统的结合。高分需有具体案例分析，跨学科视角，学生参与实际调研或方案设计，并能促进对社会意义的深度思考与应用。
  - field: 创新思维激发性_理由
    type: str
    description: 解释创新思维激发性评分的详细理由，引用具体例子。
  - field: 创新思维激发性
    type: float
    description: 评价教学是否通过开放性问题、创新任务、探索活动等方式激发学生提出独特见解、设计多元解决方案，发展批判性和创造性思维。高分需任务开放度高、鼓励思维碰撞、成果展示与辩论，低分则仅限于标准答案或重复教材内容。
  - field: 模拟真实提问还原度_理由
    type: str
    description: 解释模拟真实提问还原度评分的详细理由，引用具体例子。
  - field: 模拟真实提问还原度
    type: float
    description: 评价教师设计的问题是否充分贴近学生实际认知和生活体验，具有情境性、启发性和互动性。高分需体现多层次问题设计，能激发学生主动提问和深入探究，低分则为机械记忆或脱离实际。
  - field: 价值观润物细无声融入度_理由
    type: str
    description: 解释价值观润物细无声融入度评分的详细理由，引用具体例子。
  - field: 价值观润物细无声融入度
    type: float
    description: 评价是否在教学内容和过程自然融入社会主义核心价值观或中华优秀传统文化，方式需贴合学科情境，通过故事、案例、角色扮演等潜移默化引导学生形成正确价值观。高分需有具体情境和学生共鸣，低分则为生硬灌输或无实际联系。
  - field: 多样化表达与包容性_理由
    type: str
    description: 解释多样化表达与包容性评分的详细理由，引用具体例子。
  - field: 多样化表达与包容性
    type: float
    description: 评价教学是否采用多种表达形式（如图片、流程图、模型、比喻、故事、视频、实验等）以适应不同学习风格，兼顾视觉、听觉、动手等多元需求。高分需融合至少三种表达方式，鼓励学生自主表达与交流，低分则表现为单一讲解和表达方式。
  format_mode: prompt
