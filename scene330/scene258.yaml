tasks:
  mode: iter
  content:
  - question: 我是初中二年级的学生，最近政治课在讲‘参与社会公共生活’，但我性格比较内向，喜欢读书和画画，不太敢在公开场合表达自己，家里环境也比较普通，爸妈工作忙很少带我参加活动。我想提升社会参与能力，但害怕和陌生人交流。能讲得详细点吗？希望你能帮我分析适合我的参与方式、成长路径和心理调适，还能结合中华优秀传统文化和社会主义核心价值观讲讲社会责任。
  - question: 我是一名初中政治老师，班上有几个学生特别喜欢网络和打游戏，对社区服务和公益活动不太感兴趣，甚至有些排斥参加这些社会公共生活。帮我理解一下，怎么向他们说明参与社会公共生活的重要性，能不能结合他们的兴趣和性格举些例子，还能让他们认识到社会责任感？
  - question: 我是初三学生，家在农村，父母做农业，家里经济一般。我很关心社会问题，比如环境保护和农村公共设施，性格外向，喜欢组织同学做事情。你能全面分析一下，像我这样农村背景的学生有哪些参与社会公共生活的具体方式？能不能讲讲社区调研、志愿服务、环保项目这些途径，还要分析参与过程中可能遇到的困难和解决办法，最好能结合社会主义核心价值观和中华传统美德，让我更好发挥个人作用。
  - question: 我是一名刚入职的初中政治老师，班里有不少学生是单亲家庭，还有几个是留守儿童。这些孩子在学校表现安静，参加班级和社会活动都不积极。我想设计一套既系统又能照顾学生个性差异的社会公共生活参与方案，帮助他们提升自信和社会责任感。你能全面深入地讲讲吗？希望你能从心理关怀、活动设计、家校协作和社会资源整合等方面详细分析，还要结合具体案例和中华传统文化，让这些学生能有温度地融入社会、积极成长。
  - question: 我是初中生家长，我女儿学习认真，就是除了画画之外对其他事情没什么兴趣，也不太愿意参加社会活动。学校最近要求主动参与社会公共生活，我有点担心她会压力大或者没兴趣。简要说明下，像我女儿这种喜欢画画但不爱说话的孩子，家长可以怎么帮助她培养社会参与的兴趣和能力？
  - question: 我是初中生，性格活泼偶尔有点冲动，喜欢体育运动，在班里挺有号召力。老师最近让我们参与社区志愿服务，我觉得挺有意思但有点不知道怎么开始，也担心自己脾气容易冲动。讲讲看，适合我的社会参与活动有哪些，怎么在参与过程中提升自我管理和责任感？能结合一些体育或团队活动的例子说明下吗？
  - question: 我是冯羽，51岁，政治老师，平时教学严谨细致，表达精准，周末喜欢钓鱼，家里注重药膳养生。最近课堂上发现一些成绩好但性格内向的学生，对参与社会公共生活的意义理解不深，只关心成绩，社会责任感不强。能具体说说吗，教师应该怎么通过教学和活动引导他们理解、主动参与社会公共生活，还能融合传统文化和社会主义核心价值观？
  - question: 我是初中生，性格慢热，喜欢安静看书，很少主动参加集体活动。老师让我们小组合作做社区调研，要跟陌生人交流，我有点紧张也不知道怎么参与。大概讲讲，像我这样慢热安静的学生怎样更好参与社区调研活动？能给一两个具体建议吗？
  - question: 我是初中政治教研员，负责指导几个不同背景的班级开展社会公共生活主题活动。班里有城市独生子女、农村留守儿童和外来务工子女，性格、家庭环境、兴趣都不一样。详细分析下各个方面，帮我系统梳理如何根据不同学生类型设计多元化社会参与活动，提升社会责任感和公共精神？请从参与形式、活动设计、价值观融合、师生协作等角度全面讲讲，还能结合具体案例和中华优秀传统文化。
  - question: 我是初中生，性格开朗但有点粗心，喜欢音乐和舞蹈，家里人很支持我的兴趣。学校最近要让我们参与学生自治委员会，负责班级管理和活动策划。我担心自己做事不够细致会影响团队。能具体说说吗，我这种性格和兴趣怎么发挥优势参与学生自治？还有什么办法能提升细致度和团队协作能力？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 政治-初中-参与社会公共生活进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 评估建议是否基于学生的多维画像（年龄、兴趣、能力、成长环境等至少三项），并针对性分析其特点、需求与成长目标。高分要求对画像有深入剖析，建议紧密结合个体差异，体现独特性和发展性。中低分为分析表面、建议泛泛或仅形式上提及画像。
  - field: 指令遵循与格式规范_理由
    type: str
    description: 解释指令遵循与格式规范评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范
    type: float
    description: 内容结构需严格按任务要求组织，分段、标题、层次清晰，每个要素均有完整展开。高分要求格式标准化、要点齐全，逻辑缜密且易读。中低分为要素缺失、结构混乱或仅形式分段但内容无层次。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 活动设计应体现政治学科的科学教学方法，如启发式、讨论、情境模拟等，促进学生主体性和深度思考。高分要求有具体教学环节，能引导学生积极参与、反思和表达。中低分为仅灌输知识、无互动或方法与学科不符。
  - field: 活动设计实操性_理由
    type: str
    description: 解释活动设计实操性评分的详细理由，引用具体例子。
  - field: 活动设计实操性
    type: float
    description: 所提活动需具体、流程明晰、分工合理，资源准备充分，能真实落地。高分要求活动步骤详尽，操作指引清楚，能有效保障学生安全与体验。中低分为流程模糊、操作难度大或仅口头倡议。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 活动或建议能激发学生创造力，鼓励提出新观点或自主设计参与方式。高分要求有具体创新方案或引导学生进行个性化创意表达，体现多样性。中低分为仅传统参与，无创新引导或个性化方案。
  - field: 多样化思路引导_理由
    type: str
    description: 解释多样化思路引导评分的详细理由，引用具体例子。
  - field: 多样化思路引导
    type: float
    description: 为学生提供至少三种显著不同的社会参与途径，详细说明各自特点、适合人群，鼓励结合自身兴趣和特长选择。高分要求参与方式跨领域、差异明显。中低分为仅数量达标或实际内容雷同。
  - field: 社会主义核心价值观融入度_理由
    type: str
    description: 解释社会主义核心价值观融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入度
    type: float
    description: 活动中需自然融入社会主义核心价值观（公平、正义、责任、友善等），通过体验与反思环节促进学生理解和内化。高分要求有具体实践、反思与讨论。中低分为口号式表达或仅表面提及，无实际体验。
  - field: 中华优秀传统文化传承性_理由
    type: str
    description: 解释中华优秀传统文化传承性评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化传承性
    type: float
    description: 活动需有机融合中华优秀传统文化元素（家国情怀、团结互助、节日习俗等），并安排体验、传承及反思环节。高分要求文化元素与活动深度结合，促进学生感受与传承。中低分为表面拼贴或完全不涉及。
  format_mode: prompt
