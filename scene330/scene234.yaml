agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为地理-高中-区域可持续发展的评价与路径选择教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高二学生，地理基础一般，最近在学习区域可持续发展的评价与路径选择这部分内容时遇到很多困惑。你作为地理学科教育专家，能结合中国本土案例，系统分析一下区域可持续发展的主要评价指标、评价方法及其创新路径选择吗？我想深入了解
  - question: 我是一名新入职的高中地理老师，正在设计关于区域可持续发展评价与路径选择的互动教学活动。你作为地理教学设计专家，能帮我详细阐述在课堂中如何引导学生批判性分析区域可持续发展的评价标准，并提出能激发学生创新思维的教学方案吗？我想深入了解
  - question: 我是一名高三学生，准备参加地理竞赛，想要深入研究区域可持续发展的评价与路径选择。你作为地理竞赛辅导专家，能从经济、环境、社会、资源等各个角度，结合中国和国际典型案例，全方位系统讲解区域可持续发展的评价体系、存在的问题以及创新路径设计吗？从各个角度详细说说
  - question: 我是任利，今年57岁，是一名中学地理老师。平时喜欢无人机航拍、晨间八段锦和交谊舞，教学管理风格偏民主，条理有时不够清晰，倾向于保守派。与同事教研交流密切，也活跃于无人机玩家社群。周末常参加社区活动，与邻居保持适度社交。最近学校要求我们在地理教学中加强区域可持续发展的评价方法教学。你作为地理教研专家，能帮我详细分析一下在现有教学条件下，如何结合本地实际案例，对区域可持续发展的评价方法进行优化吗？详细说说
  - question: 我是一名高中地理兴趣小组成员，最近在准备一个关于区域可持续发展的主题演讲。你作为地理知识支持助手，能说说你的看法，区域可持续发展的评价标准在不同地区会有哪些差异？说说你的看法
  - question: 我是养逾静，7岁，二年级的小学生，平时喜欢田径和折纸，经常参加田径训练和折纸兴趣班，性格温顺爱向老师同学求助。由母亲照顾日常，父亲周末陪伴参与亲子活动。最近在学校地理课上听说区域可持续发展，但我有点不懂。你可以用我容易理解的方式，讲讲区域可持续发展是什么吗？讲讲看
  - question: 我是一名高一地理教师，正在筹备一场师生共同参与的区域可持续发展主题研讨会。你作为地理学科专业顾问，能全方位地讲解一下区域可持续发展的评价体系、路径选择及其在中国不同区域的创新实践吗？全方位地讲解一下
  - question: 我是高二学生，正在准备地理期末复习，遇到区域可持续发展的评价路径相关问题。你作为地理学习助手，能说说你的看法，区域可持续发展的评价路径在实际应用中有哪些挑战与对策吗？说说你的看法
  - question: 我是鄂凡，52岁，男，中学地理老师，喜欢珊瑚缸养殖和钓鱼，职业使命感强，逻辑性强，师生界限分明，偶尔在朋友圈分享珊瑚养殖经验。最近学校让我们给学生讲区域可持续发展的评价指标，但课时有限。你作为地理教研专家，能简单说说区域可持续发展的核心评价指标及其现实意义吗？简单说说就行
  - question: 我是尹瑜沛，15岁，初三女生，喜欢编程、写作和羽毛球，易分心但自主学习能力强，社交慢热，母亲自由职业经常陪伴，父亲工程师工作忙但稳定。最近地理课上老师讲到区域可持续发展的路径选择，我还有点不太明白。你作为地理学习助手，能用简单易懂的话，给我讲讲区域可持续发展的路径选择有哪些常见方式吗？简单说说就行
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-高中-区域可持续发展的评价与路径选择进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 评估内容是否针对学生学习基础、兴趣和能力等差异，提供分层、分组或个别化的学习支持，能否体现对学生多样性和个体差异的深入理解与有效应对。高分需具体体现分层教学或个别指导，低分为无差异、一刀切。
  - field: 指令遵循准确性_理由
    type: str
    description: 解释指令遵循准确性评分的详细理由，引用具体例子。
  - field: 指令遵循准确性
    type: float
    description: 评估内容是否严格、完整地按照教师或任务指令的结构、步骤和内容要求输出，涵盖所有细节，无遗漏、无偏离，逻辑清晰、条理分明。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 评估所采用的教学方法是否体现因材施教、启发式、合作学习、实践操作等教育学原理，并与地理学科实践紧密结合。高分要求方法多样、互动性强，有分层、小组、项目式、情境模拟等多元策略，促进学生主动参与和深度理解。3分为仅有部分互动或方法单一但有实践环节，低分为完全单向讲授。
  - field: 评价与路径选择的专业深度_理由
    type: str
    description: 解释评价与路径选择的专业深度评分的详细理由，引用具体例子。
  - field: 评价与路径选择的专业深度
    type: float
    description: 评估内容是否建立在区域可持续发展理论基础上，结合权威评价体系和中国实际案例，提出系统、具体、可操作的路径选择。高分要求理论与实践结合紧密，分析全面深入，建议具有创新性与可行性。低分为内容空泛、无理论支撑或无实质建议。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评估内容是否通过开放性任务、情境设定、挑战性问题等方式，激发学生创新思考、批判性分析和独立见解。高分为设有多元解答空间、角色扮演、项目制任务等，鼓励学生提出原创方案。3分为仅有一般性开放提问，低分为机械记忆和复述。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 评估语料中的提问是否贴近真实地理课堂，反映学生在区域可持续发展学习中的实际疑惑、兴趣或挑战。高分为结合具体生活情境或区域问题，体现学生真实关注点和思考深度。3分为仅有一般性提问，低分为空洞、脱离学生实际。
  - field: 社会主义核心价值观与中华优秀传统文化融合度_理由
    type: str
    description: 解释社会主义核心价值观与中华优秀传统文化融合度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华优秀传统文化融合度
    type: float
    description: 评估内容是否将社会主义核心价值观（如绿色发展、公平、和谐、创新等）及中华优秀传统文化（如天人合一、和谐共生）自然而深入地融入地理教学，结合实际案例阐释价值观与学科内容的有机联系。高分为价值观与知识点、案例深度融合，低分为机械罗列或完全脱节。
  - field: 案例与本土化结合度_理由
    type: str
    description: 解释案例与本土化结合度评分的详细理由，引用具体例子。
  - field: 案例与本土化结合度
    type: float
    description: 评估内容是否结合中国具体区域、政策、数据和成效，选用具有代表性和现实意义的本土案例，增强地理知识的现实感和针对性。高分为案例详实、紧扣中国实际，低分为泛泛而谈或只用国外案例。
  format_mode: prompt
