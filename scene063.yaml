    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为化学-小学-物质混合与分离方法启蒙教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 你作为小学化学启蒙专家，我是一名40岁的男老师许灿卓，教学风格很严谨，平时喜欢文玩收藏、3D建模和观星摄影，对新鲜事物接受度不是很高，常和古玩圈的朋友交流。最近我在准备小学物质混合与分离方法启蒙课程，想让课程既科学有系统，又能激发学生探索兴趣，还能融入中华传统文化和核心价值观。能讲得详细点吗？请结合实际举例和分析下具体的教学方案和活动设计。
  - question: 我是一名小学化学老师，最近发现有些学生对物质混合与分离实验提不起兴趣，注意力也容易分散。你作为AI教学助手，能简单说说有哪些方法或活动可以让他们更积极参与吗？
  - question: 我是初二男生冷宪，喜欢天文社团、跆拳道和3D打印，模仿力强，抗干扰也不错。你作为小学化学启蒙专家，能详细分析下小学物质混合与分离方法的教学内容如何结合我的兴趣和特长吗？比如知识点讲解、动手实践、科学探究、团队活动等方面如何设计，让我能主动参与、发挥优势，同时自然融入核心价值观和传统文化。详细分析下各个方面。
  - question: 我最近在辅导家里小孩学小学化学，他对物质混合很感兴趣，总问我为什么水和沙子混在一起能分开，但糖溶在水里就分不开了。你作为化学教学顾问，能讲讲看怎么用生活例子和简单实验，让孩子理解这些原理，同时培养观察和思考能力吗？
  - question: 我是一名小学科学教师，发现学生在学习物质混合与分离方法时，总是搞不清过滤、蒸发、磁选这些方法具体能用到哪些场景。你作为化学教学专家，能讲清楚点怎么通过实验、故事和互动活动，让孩子们分清这些原理和应用吗？最好能结合些传统文化自然引导。
  - question: 我在开发小学科学课程，想设计一堂关于物质混合与分离方法的主题课，需要彻底说清楚不同分离方法的原理、实际应用、教学活动设计，以及怎么激发学生自主探究兴趣。你作为化学启蒙专家，能系统分析一下吗？希望内容全面深入，最好能自然融入价值观和传统文化。
  - question: 我是初二学生潘鹤轩，喜欢露营、乒乓球和观星，性格比较专注。你作为化学教学助手，能大概讲讲小学物质混合与分离方法的基本知识和日常应用吗？举几个生活例子让我快速了解一下。
  - question: 你作为小学化学专家，我是新入职老师，最近备课时发现学生对物质混合与分离现象很感兴趣，但主动探究的动力不足。能讲得详细点吗？请结合创新教学方法、动手实践和团队活动，分析怎么让他们主动参与学习，同时自然融入核心价值观和传统文化。最好有具体案例和策略。
  - question: 我是小学化学老师，班里有几个学生特别好奇，但对物质混合与分离的原理理解不太到位。你作为化学启蒙专家，能详细说说怎么设计实验活动，既满足他们的好奇心，又能让他们掌握原理吗？举些例子，并自然融入传统文化和核心价值观。
  - question: 我是高二学生冯洋，喜欢电子竞技、足球和骑行，专注力有时不太稳定，比较注重个人表现，和同学关系还行。你作为小学化学助手，能解释一下小学物质混合与分离方法的基本原理和常见分离方式吗？希望结合生活例子说清楚分离原理和应用。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 化学-小学-物质混合与分离方法启蒙进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 评价教学是否能基于学生的年龄、兴趣、认知水平等画像，精准调整内容表达、案例选择和互动方式。高分需体现系统性差异化设计和动态调整，能针对不同学生特点持续进行个别化指导与激励，关注学习进程中的个体变化。
  - field: 格式与结构规范性_理由
    type: str
    description: 解释格式与结构规范性评分的详细理由，引用具体例子。
  - field: 格式与结构规范性
    type: float
    description: 评价教学设计是否分段清晰，逻辑连贯，内容编排科学，能辅助学生整体把握知识结构。高分需体现课前、课中、课后环节的有机衔接，结构化导图或流程图贯穿始终，教学目标、重点与难点明确呈现，便于复习与迁移。
  - field: 教学内容科学性与严谨性_理由
    type: str
    description: 解释教学内容科学性与严谨性评分的详细理由，引用具体例子。
  - field: 教学内容科学性与严谨性
    type: float
    description: 评价教学内容是否科学准确，符合小学认知规律，能深入阐释知识本质与原理。高分需无科学性错误，内容表述严谨，能区分相关概念、解释实验原理，针对学生常见误区有预防和纠正措施，并能引导科学思维和批判性反思。
  - field: 教学方法多样性与互动性_理由
    type: str
    description: 解释教学方法多样性与互动性评分的详细理由，引用具体例子。
  - field: 教学方法多样性与互动性
    type: float
    description: 评价教学是否采用多种方法（实验、情境模拟、游戏、探究、小组合作等），设计高质量互动，促使学生深度参与和自主思考。高分需多方法融合，互动层次丰富，能激发学生主动探索、合作解决问题，并能有效追踪学生参与质量和思维发展。
  - field: 创新思维激发与自主探究引导_理由
    type: str
    description: 解释创新思维激发与自主探究引导评分的详细理由，引用具体例子。
  - field: 创新思维激发与自主探究引导
    type: float
    description: 评价教学是否通过开放性问题、实验设计等方式激发创新思维和探究能力。高分需为学生提供提出新问题、尝试多种分离方法的机会，鼓励比较、反思与优化，能追踪学生创新点和探究过程，促进持续改进。
  - field: 学生兴趣与主动参与度激发_理由
    type: str
    description: 解释学生兴趣与主动参与度激发评分的详细理由，引用具体例子。
  - field: 学生兴趣与主动参与度激发
    type: float
    description: 评价教学是否通过趣味化、生活化、挑战性任务等激发学生兴趣，促进持续主动参与。高分需绝大多数学生持续投入，主动表达观点、体验乐趣，参与深度高，能在活动中获得成就感与自我提升。
  - field: 社会主义核心价值观自然渗透_理由
    type: str
    description: 解释社会主义核心价值观自然渗透评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观自然渗透
    type: float
    description: 评价教学是否将合作、诚信、尊重劳动、科学探索等社会主义核心价值观自然融入全过程。高分需在小组活动、实验分享、评价反馈等环节持续体现价值观，表达方式自然、具体，有助于学生品格养成和行为实践。
  - field: 中华优秀传统文化适度融合_理由
    type: str
    description: 解释中华优秀传统文化适度融合评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化适度融合
    type: float
    description: 评价教学是否恰当融合中华优秀传统文化（如古代分离工艺、传统智慧、成语等），增强文化自信。高分需文化元素与主题紧密结合，能激发学生兴趣，引导联系传统与现代科学，促进比较与思考。
  format_mode: prompt
