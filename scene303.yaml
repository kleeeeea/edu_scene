tasks:
  mode: iter
  content:
  - question: 我是小学体育老师，班里有几个性格腼腆、运动能力一般的学生，每次传球接力赛都很紧张，不敢主动参与。你作为体育专家，能简单说说我可以用哪些方法和活动，激发他们的参与热情，提升团队精神吗？
  - question: 你作为小学体育教学顾问，我最近在传球接力赛教学中遇到难题：班里孩子性格、能力差异很大，有外向喜欢竞争的，也有内向容易紧张的，还有体能弱和注意力不集中的。家长希望孩子能在活动中学会合作、收获快乐，但我对如何兼顾个体差异、引导团队协作、保障安全还不太有把握。能讲得详细点吗？希望你能分析不同学生的表现，给出具体教学策略、创新活动建议和安全措施，还能自然融入团队精神等价值观。
  - question: 我是雷翠琳，今年14岁，初二女生，喜欢手工制作、视频剪辑和小提琴，有科创特长，家里很重视艺术和创新教育。我体育课上经常参加传球接力赛，但觉得传统玩法有点单调，想发挥创新能力，也希望和同学们更好互动。你作为体育专家，能全方位地讲解一下怎么设计既能体现创新、又能促进团队合作和个性表达的传球接力赛活动吗？希望能系统谈谈创新规则、团队策略、安全以及价值观引导等方面，帮助我和同学们全面成长。
  - question: 我是小学体育老师，班里有几个运动能力较弱、容易自卑的学生，经常在传球接力赛中失误，导致团队成绩不好，孩子们也会互相埋怨。家长希望孩子能在体育活动中增强自信、学会互助。你作为体育教学顾问，能详细说说怎么通过接力赛帮助这些学生提升自信和团队合作吗？需要有具体的做法和示例，避免因失误而让他们产生消极情绪。
  - question: 我是一名小学体育老师，最近在传球接力赛中发现有些学生很急躁，喜欢抢风头，有些则安静容易被忽略。你作为体育专家，能讲清楚点怎么针对这些性格差异设计活动和引导方法，让他们更好理解团队精神和规则吗？最好有细节和例子。
  - question: 我是小学三年级班主任，最近班里同学在传球接力赛中因为分工和失误出现争执，情绪波动大，家长也很担心孩子们在团队活动中容易争抢。你作为体育专家，能详细讲讲出现这些问题的原因和具体解决策略吗？希望你能从分工协作、情绪调节、团队激励等方面深入分析，同时自然融入团队精神和互助友爱的价值观。
  - question: 我是五年级孩子的家长，他运动能力一般但很喜欢团队活动，最近在传球接力赛中总怕拖累同学，不敢主动承担关键环节。我希望他在体育活动中能收获自信、学会团队协作。你作为小学体育专家，能给我一份完整的分析吗？希望能系统讲讲孩子在团队活动中的心理发展、体育活动设计、家庭支持和激励方法，还能融入积极的价值观和中华优秀传统文化，帮助他健康成长。
  - question: 我是小学体育老师，班里有几个注意力不集中的学生，在传球接力赛时容易走神、传球失误，影响了团队配合。家长希望他们能通过体育活动提升专注力和责任心。你作为体育教学顾问，讲讲看怎么设计活动和引导方法，帮助这些孩子提升专注力和合作意识吧。
  - question: 我是小学体育老师，班里有个特别喜欢创新、有领导力的学生，在传球接力赛里经常提出新玩法，但有时影响了团队配合。家长希望他能发挥创造力，也能学会尊重大家和团队协作。你作为体育专家，讲讲看怎么引导这类学生既能创新又能团队合作，最好自然融入规则意识和互助友爱价值观。
  - question: 我是小学体育老师，最近在传球接力赛里发现有些学生容易争抢、推搡，甚至受伤，家长很担心安全和心理健康。你作为体育专家，用几句话说说怎么科学组织接力赛，保障安全和公平参与吧。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 体育-小学-传球接力赛进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 教学方案需基于学生能力、兴趣、性格等多维差异，系统分析并针对不同层次提供分层任务、差异化激励与角色安排。要求具体操作方案，确保所有学生均获得成长支持，且动态关注个体变化。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 教学方案需严格按照场景和题目要求，清晰分步呈现分组、流程、规则、角色分配、评分细则等环节。结构应条理分明，便于教师照章执行和学生理解。对于流程、规则等应有详细说明，不得遗漏关键环节。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 教学设计需综合运用分层指导、协作学习、正向激励、技能分解、即时反馈等体育教学理论，并针对学生实际表现灵活调整。应体现运动技能、团队合作、心理素养的系统培养，避免单一或机械流程。
  - field: 安全与公平保障_理由
    type: str
    description: 解释安全与公平保障评分的详细理由，引用具体例子。
  - field: 安全与公平保障
    type: float
    description: 教学方案需细致制定安全预案，包括场地、器材全面检查、应急措施演练。分组应均衡，规则公开透明，确保学生安全、参与机会均等。要求动态关注风险，及时干预处理争议，保障活动全过程安全与公平。
  - field: 创造力激发设计_理由
    type: str
    description: 解释创造力激发设计评分的详细理由，引用具体例子。
  - field: 创造力激发设计
    type: float
    description: 教学方案应设计开放性、探究性任务，鼓励学生自主创新传球方式、变换路线、优化战术等，形成多样化解决方案。需设置展示与交流环节，激发学生主动思考和创新实践。
  - field: 学生自主参与度_理由
    type: str
    description: 解释学生自主参与度评分的详细理由，引用具体例子。
  - field: 学生自主参与度
    type: float
    description: 教学方案需赋予学生实际决策权，包括小组自选、规则共创、战术讨论、角色协商、赛后自评等。应促进学生主动参与、合作决策和反思总结，教师主要起引导作用。
  - field: 社会主义核心价值观融入_理由
    type: str
    description: 解释社会主义核心价值观融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入
    type: float
    description: 教学活动需将团结协作、尊重规则、友善互助等核心价值观通过具体活动环节和行为引导自然渗透，关注学生实际表现，结合情境点评和反思，避免口号化或表面化。
  - field: 中华优秀传统文化传承_理由
    type: str
    description: 解释中华优秀传统文化传承评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化传承
    type: float
    description: 教学方案应有机融入中华优秀传统文化元素（如礼仪、成语、故事、团队精神等），并结合体育活动实际，强化文化认同和实践体验。应在活动环节中体现文化内涵，让学生切身体验和反思。
  format_mode: prompt
