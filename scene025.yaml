agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为语文-高中-研究性写作辅助教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是MartinezHarper，13岁，七年级女生，喜欢时尚造型、诗歌写作和攀岩，善于听觉记忆和批判性思维。你是语文教育专家，能不能系统地讲解一下高中语文研究性写作的完整流程？我最近在英语课上想用研究性写作探讨‘时尚与文化认同’，但对选题、资料查找、结构设计和创新表达这些环节有些迷茫。希望你能结合我的兴趣和特长，给我一些个性化建议，既能发挥我的诗歌创意，又能在写作中体现批判性思考和中华文化价值。
  - question: 我是MartinCaroline，今年7岁，上二年级女生，喜欢背诵和写作，但不太喜欢和同学一起合作，平时更喜欢自己完成朗读和写作。你作为语文学习助手，能不能说说主要的，适合我这样喜欢独立完成任务的小学生在研究性写作时要注意哪些方面？
  - question: 我是高二学生，老师让我们用研究性写作分析‘古诗词中的家国情怀’，但我不太清楚怎么调研、整合资料，以及怎么在写作里体现创新和批判性思考。你作为语文写作导师，能深入讲解一下整个流程吗？特别是选题、资料整理、结构设计和怎么表达中华优秀传统文化和责任担当。
  - question: 我是高中语文老师，想指导学生用研究性写作探究‘网络流行语和青少年价值观的关系’，但对流程和怎么激发学生批判性思维还有些疑问。你作为研究性写作专家，详细说说在这个主题下应该怎么安排流程吧，包括选题、资料收集、结构设计，还有怎么引导学生自然融入核心价值观和中华传统文化。
  - question: 我是一名高三学生，最近准备参加全国作文竞赛，想用研究性写作分析‘传统节日对现代青少年的影响’。你作为语文教育专家，我想深入了解怎么完整开展这项研究性写作，包括选题思路、资料查找、结构设计、创新表达和反思提升，还希望你结合中华优秀传统文化和社会主义核心价值观给我一些建议。
  - question: 我是秦浩天，25岁，工业设计师，喜欢创意手绘、3D打印DIY和模型车收藏，性格偏合作被动，公司同事关系稳定但互动不多，周末常独自玩3D打印和收藏模型车。你作为语文研究性写作导师，能不能用几句话说说，如果我想用研究性写作分析‘创意设计和传统文化融合’，应该注意哪些核心要点？
  - question: 我是高中语文教研员，最近在组织老师参加研究性写作培训，大家对‘怎么在写作中激发学生创新思维和批判性表达’都挺困惑。你作为研究性写作专家，能解释一下有哪些策略和方法吗？最好结合具体案例说明下在高中语文研究性写作教学里怎么实现这个目标。
  - question: 我是高一学生，老师让我们用研究性写作深入探究‘网络文学对青少年审美的影响’，但我对流程、创新表达和怎么结合传统文化很迷茫。你作为语文学习助手，能不能从各个角度详细说说高中语文研究性写作的完整流程？我想了解选题、查找资料、结构设计、创新表达、反思总结等环节，还有怎么结合中华优秀传统文化和核心价值观。
  - question: 我是潘韵诗，33岁，无人机操作员，喜欢炒股投资和插花，性格竞争回避、功利心强，还有潜在领导力但压力容易崩溃，比较务实。和同事保持距离但下属信任我，投资圈有几个朋友，家庭关系比较疏离。你作为语文研究性写作导师，详细说说在我这样性格和社交背景下，怎么高效开展‘职业创新与个人成长’主题的研究性写作，同时自然融入中华优秀传统文化和责任担当。
  - question: 我是梁潮，11岁，五年级男生，喜欢羽毛球、篮球和跆拳道，性格有些疏离，内外向混合，平时和同学交往不多，主要社交活动都在运动场合，跆拳道培训班里很积极但课后很少和同学深入交流。你作为语文学习助手，能不能讲讲看，像我这样性格和社交习惯的小学生，怎么在研究性写作里选题和表达才能更好地体现自我成长和社会责任？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 语文-高中-研究性写作辅助进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 评估答复是否依据学生的具体背景（包括学习水平、兴趣、写作能力、常见问题等）进行有针对性且深入的个性化指导。高分要求能体现对学生个体差异的敏锐洞察，并据此灵活调整建议策略和内容，低分表现为建议千篇一律、忽视个体差异。
  - field: 格式指令遵循度_理由
    type: str
    description: 解释格式指令遵循度评分的详细理由，引用具体例子。
  - field: 格式指令遵循度
    type: float
    description: 评估答复是否严格按照用户或题目要求的结构、格式、字数、引用方式等执行，并主动提醒学生注意格式细节。高分要求格式与内容高度匹配，且能指导学生避免常见格式错误，低分表现为结构混乱或忽视格式要求。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学建议是否基于公认的教育理论，采用系统、科学的研究性写作训练流程（如问题导向、合作学习、过程性评价、反思等），并能简要阐明方法理论基础及实际成效。高分需体现理论与实践结合，有明确步骤和方法解释，低分表现为随意建议、缺乏理论或流程支撑。
  - field: 研究性写作流程完整性_理由
    type: str
    description: 解释研究性写作流程完整性评分的详细理由，引用具体例子。
  - field: 研究性写作流程完整性
    type: float
    description: 评估答复是否覆盖研究性写作全过程，包括选题、资料收集、论证、写作、反馈、修改等环节，并对各环节衔接给出具体操作指导。高分要求流程细致、环节齐全且环环相扣，低分表现为遗漏关键环节或流程断裂。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评估答复是否通过开放性问题、案例分析、跨学科联想等具体方法，持续激发学生创新思维和独立见解，并引导其形成新颖观点。高分要求有明确创新引导方案并能落地实施，低分表现为仅口头鼓励创新或泛泛而谈。
  - field: 模拟真实提问匹配度_理由
    type: str
    description: 解释模拟真实提问匹配度评分的详细理由，引用具体例子。
  - field: 模拟真实提问匹配度
    type: float
    description: 评估答复是否充分贴合高中生在研究性写作中常见的具体困惑，能预判学生疑难并给出可操作、详细的解决方案。高分需体现问题预判、细致解答及实际操作指引，低分表现为回答空泛、缺乏针对性。
  - field: 中华优秀传统文化融入度_理由
    type: str
    description: 解释中华优秀传统文化融入度评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化融入度
    type: float
    description: 评估答复是否将中华优秀传统文化元素有机、深入地融入写作指导，能够结合写作主题、写作方法或研究过程，引导学生理解传统文化与现代写作的联系。高分要求文化融入自然、有深度且能启发思考，低分表现为机械引用或与写作内容脱节。
  - field: 社会主义核心价值观体现度_理由
    type: str
    description: 解释社会主义核心价值观体现度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观体现度
    type: float
    description: 评估答复是否在写作指导中自然体现社会主义核心价值观（如诚信、友善、敬业、创新等），并结合写作实践、写作情境具体引导学生践行相关价值观。高分要求价值观与写作过程紧密结合，有实际操作建议，低分表现为生硬罗列、无实际指导。
  format_mode: prompt
