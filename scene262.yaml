tasks:
  mode: iter
  content:
  - question: 我是高中政治老师谢媛媛，班上的学生在学习宏观调控时，对财政政策和货币政策的具体应用场景分辨不清，尤其在理解两者的实际作用和区别时容易混淆。你作为教育助手，能结合现实案例，系统梳理并深入分析财政政策和货币政策在我国宏观调控中的应用机制、实际成效，以及各自适用的典型情境吗？能具体说说吗？教学建议最好能结合我权威依赖型、喜欢心理辅导和朗诵的特点。
  - question: 你作为高中政治学科的AI助教，我是一名班主任，学生在学习宏观调控时经常混淆财政政策与货币政策的具体应用，且对两者的调控工具、实现路径和现实效果缺乏深入理解。能讲得详细点吗？希望你结合我国近年来的实际政策举措，并设计一些启发式问题或小组探究活动，帮助学生建立系统思维和批判性分析能力。
  - question: 我是高一学生，最近老师讲到财政政策和货币政策在调控经济中的作用，但我对两者的主要区别和常见应用例子有点模糊。你可以简单说说就行吗？顺便举个生活中的例子帮助我理解。
  - question: 你是高中政治学习助手，我是政治兴趣小组的指导老师。我们小组准备探讨财政政策和货币政策在当前中国经济发展中的实际作用。能不能讲讲看这两种政策的基本概念、主要工具、实施目标以及它们在现实中的应用成效？希望能举一些贴近学生生活的案例，帮助小组成员更好地理解。
  - question: 我是高二学生，最近在复习宏观调控时有点困惑，财政政策和货币政策这两者到底有什么主要区别？你能用几句话说说吗？最好能举个身边的例子帮我理解。
  - question: 我是高中政治教师，班里的学生思维活跃但基础参差不齐。最近我们在讲财政政策与货币政策，有学生提出疑问：两者在调控经济时各自有哪些优势和局限，实际应用时如何选择？你作为教育专家，能结合实际案例说说你的看法吗？希望你也给出能激发学生创新思维的教学建议。
  - question: 我是高三学生，准备高考时对财政政策和货币政策的具体工具和作用还不太清楚。你可以帮我解释一下这两种政策分别有哪些主要工具，它们是如何影响经济的？能解释一下吗？最好能结合实际生活中的例子帮助我理解。
  - question: 我是一名高中政治教师，班级里有几位同学对财政政策和货币政策的协同运用产生了浓厚兴趣，想深入探究它们在我国宏观调控体系中的地位、相互关系及未来发展趋势。你作为教育专家，能全方位地讲解一下财政政策与货币政策的理论基础、历史演变、现实协同机制、经典案例、存在的问题与挑战以及未来创新方向吗？希望你结合中国实际，提出能够促进学生批判性与创新思维的探究任务和情境模拟活动设计，帮助他们实现知识迁移和能力提升。
  - question: 我是高中政治班主任，学生对财政政策和货币政策在调控不同经济情境下的具体应用表现出较强好奇心，但分辨不同政策组合的最佳时机和效果存在困难。你作为学习助手，能深入讲解一下财政政策和货币政策在经济过热、经济下行等不同情境下的应用策略、配合方式、实际案例及其成效吗？希望你能引导学生批判性思考和创新表达。
  - question: 我是黄秀，高中政治教师。你作为教育专家，能为我详细分析下财政政策和货币政策在我国宏观调控中的各个方面吗？包括理论基础、主要工具、现实应用、成效评估、面临的挑战和未来发展趋势。详细分析下各个方面，最好能结合中国背景、我的兴趣和个性特点，给出创新教学建议，帮助我更好地教学和与学生互动。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 政治-高中-宏观调控：财政政策与货币政策的应用进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像精准识别_理由
    type: str
    description: 解释个性化画像精准识别评分的详细理由，引用具体例子。
  - field: 个性化画像精准识别
    type: float
    description: 教学设计需基于多维学生画像（知识基础、兴趣、困惑点、学习风格等），并能动态采集和调整，确保内容与方法针对差异化需求持续优化，支持个别化成长。
  - field: 指令格式与深度严格遵循_理由
    type: str
    description: 解释指令格式与深度严格遵循评分的详细理由，引用具体例子。
  - field: 指令格式与深度严格遵循
    type: float
    description: 教学内容严格按任务要求分步组织，每环节目标明确，理论、案例、互动等环节均有高阶思考引导，确保结构合理且有深度，避免流程化或表面化。
  - field: 个性化回应深度与成长引导_理由
    type: str
    description: 解释个性化回应深度与成长引导评分的详细理由，引用具体例子。
  - field: 个性化回应深度与成长引导
    type: float
    description: 针对学生提出的个性化问题或创新想法，教师应系统回应并引导学生进一步探究，鼓励批判性与创新思维，促进持续成长。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 根据学生实际，灵活采用案例分析、情境模拟、探究活动、分组讨论等多样科学方法，促进主动参与和深度理解，并能适时调整以适应学生反馈。
  - field: 知识结构清晰性与多维迁移能力_理由
    type: str
    description: 解释知识结构清晰性与多维迁移能力评分的详细理由，引用具体例子。
  - field: 知识结构清晰性与多维迁移能力
    type: float
    description: 知识体系层次分明，逻辑清晰，教学能引导学生在跨学科、实际生活、社会热点等不同情境下灵活迁移、综合应用所学，迁移路径和结果有创新或批判性表现。
  - field: 创新与批判性思维激发及分层表现_理由
    type: str
    description: 解释创新与批判性思维激发及分层表现评分的详细理由，引用具体例子。
  - field: 创新与批判性思维激发及分层表现
    type: float
    description: 通过开放性任务、情境设计等方式分层激发创新与批判性思考，根据学生表现展示不同创新层次，鼓励多样化表达和跨学科视角。
  - field: 真实提问适应性与系统拓展能力_理由
    type: str
    description: 解释真实提问适应性与系统拓展能力评分的详细理由，引用具体例子。
  - field: 真实提问适应性与系统拓展能力
    type: float
    description: 针对学生在真实场景下提出的个性化或延展性问题，教师能系统分析并多角度回应，引导学生开展深入探究和知识扩展，形成自主学习能力。
  - field: 社会主义核心价值观与中华文化润育_理由
    type: str
    description: 解释社会主义核心价值观与中华文化润育评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华文化润育
    type: float
    description: 教学内容自然融合社会主义核心价值观和中华优秀传统文化，结合实际政策案例、历史典故和价值观讨论，促进学生思想品德和文化素养成长。
  format_mode: prompt
