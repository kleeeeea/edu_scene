agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为历史-小学-趣味时间轴排序教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是一名小学历史老师，最近班里四年级的学生对历史事件的时间排序很感兴趣，尤其喜欢通过游戏和故事来学习。想用趣味时间轴排序活动帮助他们理解中国古代重要历史事件的先后关系，还希望他们能主动参与讨论。可以讲讲看怎么设计这样的活动，以及怎样引导学生比较、分析历史事件，激发创造性和探索兴趣吗？
  - question: 我是五年级学生的家长，我女儿特别喜欢有趣的历史故事，但她在历史时间轴排序时总是搞混事件的先后顺序。我想通过趣味时间轴排序游戏帮她提高区分事件顺序的能力，也想让她感受到中华文化的魅力。能详细说说适合家庭场景的趣味时间轴排序方法，以及如何引导孩子自主探索和思考吗？
  - question: 你作为小学历史课程设计专家，我是一名小学历史教研员，最近我们团队在讨论如何用趣味时间轴排序活动深入培养学生的历史思维和创新能力。我们希望孩子们不仅能记住历史事件的时间顺序，还能在活动中主动比较事件影响、人物选择和价值观体现，通过游戏化、互动式和项目化的学习方式深入理解中国历史的文化内涵。能详细分析下各个方面，比如活动设计、实践方法、创新点、评价体系，以及如何自然融入价值观和中华优秀传统文化吗？
  - question: 我是邹红，今年47岁，是小学老师。我的性格比较策略性妥协，逻辑性不是很强，跟学校同事关系一般，但在舞蹈社团和公益组织里社交很活跃。最近在班上试了趣味时间轴排序教学，发现学生容易混淆事件顺序，也不太主动探索历史。我想通过创新活动激发孩子们的好奇心，让他们在项目化和互动式排序活动中理解历史事件的因果和文化意义。能帮我理解一下，结合我的个人特质和班级情况，如何优化趣味时间轴排序教学，让学生更有参与感和创造性吗？
  - question: 你是小学历史教学领域的专家，我是一名刚入职的历史教师，最近准备在三年级课堂里做趣味时间轴排序活动。我的目标是让学生通过游戏和互动的方式，认识中国历史上的几个关键事件和人物，并能分析这些事件背后的原因、影响和所体现的中华优秀传统文化与核心价值观。能深入讲解一下吗？比如活动设计流程、教学策略、创新方法和如何自然融入文化价值。
  - question: 我是小学历史兴趣班的辅导老师，班里有几个二年级的孩子特别喜欢拼图和卡牌游戏。我想结合他们的兴趣，设计一个趣味时间轴排序小游戏，帮他们理解历史事件的先后顺序，激发他们的兴趣。可以大概讲讲适合低年级的趣味时间轴排序活动的基本方法和注意事项吗？
  - question: 我是陈劲，24岁，做社交媒体运营，喜欢短视频创作和摄影修图，性格理想化生存、任务优先级驱动、圆滑处世，环境选择性适应，主要靠社交平台和时尚圈维系人脉。最近在策划有关小学历史教育的短视频，想用趣味时间轴排序活动吸引家长和学生关注历史学习的乐趣。能概括一下趣味时间轴排序活动的主要价值和创新亮点，并给些适合社交媒体传播的建议吗？
  - question: 我是小学六年级历史老师，班里有几个学生喜欢动手做手工，也喜欢团队游戏。我想用趣味时间轴排序活动帮他们梳理中国近现代史的重要事件，希望他们能在合作和探究中提升历史分析能力。能详细说说怎么通过时间轴排序活动结合手工和团队游戏，促进学生主动探索和思考历史事件的因果关系及文化意义吗？
  - question: 你是小学历史教育领域的专家，我是微生岚裳，50岁，是一名音乐家，喜欢乐器收藏和户外徒步，性格压力驱动型，平时和音乐界同行保持专业往来，喜欢在收藏圈和徒步活动中跟朋友分享和互动。最近我希望为孩子们设计一堂融合音乐元素的趣味时间轴排序历史课，让他们在体验音乐与历史事件结合的过程中，主动探索历史人物的选择与文化价值。能给我一份完整的分析吗？比如融合音乐元素的活动设计、实践流程、创新亮点、培养创造性思维的方法，以及如何自然融入中华优秀传统文化和核心价值观。
  - question: 我是小学三年级班主任，班里有些学生对历史不太感兴趣，但喜欢团队竞赛和小组合作。我想通过趣味时间轴排序活动，激发他们对中国历史事件的兴趣，让他们在分组合作中主动发现历史事件的联系和文化意义。能详细展开说说趣味时间轴排序活动在团队竞赛中的实施方法、合作策略、创新亮点和价值观引导吗？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 历史-小学-趣味时间轴排序进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配性_理由
    type: str
    description: 解释个性化画像适配性评分的详细理由，引用具体例子。
  - field: 个性化画像适配性
    type: float
    description: 评价内容是否根据学生的年龄、兴趣、知识水平等个体特征进行深度定制，包括主题选择、语言表达、难度分层和学习风格适配。高分需体现针对不同学生的差异化设计，并有动态调整机制；中分为有初步分层但缺乏深度定制；低分为一刀切、完全无视个体差异。
  - field: 格式指令遵循度_理由
    type: str
    description: 解释格式指令遵循度评分的详细理由，引用具体例子。
  - field: 格式指令遵循度
    type: float
    description: 评价内容是否严格依照教学任务或题目要求的格式、步骤、交互方式输出。高分需全流程落实指令、结构清晰、逻辑严密，并进行适当美化和优化。中分为基本遵循但有小瑕疵或遗漏；低分为步骤混乱、关键环节遗漏或格式错误。
  - field: 教学目标契合度_理由
    type: str
    description: 解释教学目标契合度评分的详细理由，引用具体例子。
  - field: 教学目标契合度
    type: float
    description: 评价内容是否紧密围绕小学历史时间轴排序的核心教学目标，帮助学生理解事件顺序、因果关系并能主动分析和迁移。高分为引导学生深入比较、分析事件关系并能举一反三；中分为表面分析，缺乏深度或迁移；低分仅机械排序，无任何分析或关联。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评价教学方法是否基于小学生认知规律，注重趣味性、互动性和体验性。高分为方法多样、设计新颖、能激发主动参与且循序渐进；中分为部分趣味或互动但单一、重复性强；低分为机械、枯燥、完全单向讲解。
  - field: 认知负担适宜性_理由
    type: str
    description: 解释认知负担适宜性评分的详细理由，引用具体例子。
  - field: 认知负担适宜性
    type: float
    description: 评价任务难度、信息量和复杂度是否科学匹配小学生的认知发展水平。高分为难度适中、分层设计、任务有挑战但可达成，并能关注特殊群体（如学困生、学优生）；中分为大致适宜但无分层或有少量超纲内容；低分为任务过难、过易或无挑战，忽视学生差异。
  - field: 创造性思维激发_理由
    type: str
    description: 解释创造性思维激发评分的详细理由，引用具体例子。
  - field: 创造性思维激发
    type: float
    description: 评价内容是否鼓励学生用多样方式表达思考和排序理由，激发创新和自主表达。高分为多渠道、多形式、鼓励独特见解和创新解释；中分为允许一定自由表达但形式单一；低分为只要求标准答案、无任何创新空间。
  - field: 开放性与探索性引导_理由
    type: str
    description: 解释开放性与探索性引导评分的详细理由，引用具体例子。
  - field: 开放性与探索性引导
    type: float
    description: 评价是否设置开放性问题，引导学生自主探索事件间联系、假设多种可能，并鼓励多元视角。高分为有针对性开放问题、鼓励独立探究和多元解读；中分为有少量开放性但主要为封闭性任务；低分为全部封闭式，无讨论或延伸。
  - field: 中华优秀传统文化融入_理由
    type: str
    description: 解释中华优秀传统文化融入评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化融入
    type: float
    description: 评价内容是否深度融入中华优秀传统文化，体现文化自信与传承。高分为历史事件与文化内涵紧密结合，深入讲解其对社会、科技和世界的影响，并结合传统节日、民俗、故事等；中分为表面介绍历史名词，缺乏文化深度；低分为完全缺失或生搬硬套。
  - field: 社会主义核心价值观体现_理由
    type: str
    description: 解释社会主义核心价值观体现评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观体现
    type: float
    description: 评价内容是否以故事、角色体验等方式自然渗透爱国、诚信、友善等价值观。高分为通过具体情境或活动潜移默化传递价值观，并能引发学生共鸣和行动；中分为偶尔提及但不深入；低分为生硬说教或完全缺失。
  format_mode: prompt
