tasks:
  mode: iter
  content:
  - question: 我是郝婷倩，14岁初二女生，喜欢冥想和乒乓球，学习时经常模仿别人。最近学到电化学原理，但搞不太清它和普通化学反应有什么不同，还有它在生活里到底能怎么用。能帮我概括一下吗？说说主要的就行。
  - question: 我高二，最近复习电化学原理，电池和电解槽总分不清，还有它们到底平时有什么用。你能用几句话简单讲讲电化学原理的对比和应用吗？
  - question: 我是高一学生，化学基础一般但挺感兴趣。老师讲了电化学原理，原电池和电解池到底怎么区别？它们在生活里的应用又有哪些？帮我理解一下，详细说说。
  - question: 你是化学竞赛辅导老师，我是高二的竞赛学生。最近学电化学时，原电池和电解池的区别、能量转化、实际应用和绿色技术创新我还有不少疑问。你能全面分析一下电化学原理的对比和应用吗？从各方面详细讲讲。
  - question: 我是龙夕雾，42岁高级女教师，喜欢冥想、乒乓球，平时重视教学创新，经常参加教学评比。备课时发现学生容易把原电池和电解池搞混，对实际应用和绿色能源创新理解也不深刻。你作为我的教学助手，能系统地讲解一下高中化学电化学原理的对比与应用吗？希望你从各方面全面分析一下，并带上分层教学建议和创新案例。
  - question: 我高三，最近复习电化学原理，原电池和电解池总记不住区别，实际应用也不太清楚。你能具体说说电化学原理的本质区别和生活应用吗？讲详细点。
  - question: I am WilsonMia, a 13-year-old girl in 7th grade. I like recitation and
      fashion design, and I understand things quickly. In chemistry class, I found
      electrochemical principles a bit puzzling—especially comparing galvanic cells
      and electrolytic cells, and how they’re used in daily life and new technologies.
      Could you thoroughly explain the comparison and application of electrochemical
      principles for me? Please make it really clear and detailed.
  - question: I’m MillerChristian, 14 years old, 8th grade boy. I like making robots,
      playing football, and programming. I’m good at visual memory and fixing my own
      mistakes. In chemistry, I want to understand the differences between galvanic
      cells and electrolytic cells, and how electrochemical principles connect to
      tech and everyday stuff, maybe even robotics. Could you explain these points
      clearly? Please make it detailed enough with examples.
  - question: 我是黎振，39岁男社会学家，经常做社会调查和公益活动，但喜欢自主行动，不太喜欢领导工作。最近参与青少年科技公益项目，需要了解高中化学电化学原理的对比与应用，最好能结合社会实际和公益活动举例说明。你能讲讲看吗？细致点说说。
  - question: 我是肖平，56岁女老师，喜欢烹饪、绘画和舞蹈，注重职称提升，经常组织聚餐扩大影响力。备课时发现电化学原理教学难度大，学生兴趣也不高。你作为教学专家，能详细展开说说高中化学电化学原理的对比与应用吗？希望有充分论述、实际案例和教学建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 化学-高中-电化学原理的对比与应用进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 用户画像匹配度_理由
    type: str
    description: 解释用户画像匹配度评分的详细理由，引用具体例子。
  - field: 用户画像匹配度
    type: float
    description: 评估教学内容、方法、资源是否针对不同学生基础、兴趣、目标进行细致分层与个性化设计，包括分层任务、差异化案例、针对性互动，能动态调整以满足学生成长需求。
  - field: 指令遵循与格式规范性_理由
    type: str
    description: 解释指令遵循与格式规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范性
    type: float
    description: 评估回答是否严格遵循任务要求的结构（如分点、分段、小标题、图表、案例）、逻辑顺序、内容范围，表达清晰、格式统一，便于快速检索与理解。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学方法是否采用现代教育学原理（如启发式、探究式、情境任务、合作学习等），并设计多样化互动环节与思维引导，流程层次分明，能激发学生主动、深度参与和反思。
  - field: 内容准确性与严谨性_理由
    type: str
    description: 解释内容准确性与严谨性评分的详细理由，引用具体例子。
  - field: 内容准确性与严谨性
    type: float
    description: 评估教学内容的科学性、准确性，概念界定清晰，推理严密，能深入辨析易混淆点，防范常见误区，支持学生形成系统、严谨的知识体系。
  - field: 创新思维引导性_理由
    type: str
    description: 解释创新思维引导性评分的详细理由，引用具体例子。
  - field: 创新思维引导性
    type: float
    description: 评估教学是否通过开放性问题、案例延伸、实验设计、跨学科任务等方式系统激发学生创新思考，鼓励提出假设、设计方案、批判性分析、表达独立见解，并有产出展示。
  - field: 实际应用关联度_理由
    type: str
    description: 解释实际应用关联度评分的详细理由，引用具体例子。
  - field: 实际应用关联度
    type: float
    description: 评估教学内容是否系统结合电化学原理与现实生活、社会热点、产业发展等实际问题，深入分析实际案例，鼓励学生探究应用价值与社会影响，提升认知共鸣和兴趣。
  - field: 价值观自然融入度_理由
    type: str
    description: 解释价值观自然融入度评分的详细理由，引用具体例子。
  - field: 价值观自然融入度
    type: float
    description: 评估社会主义核心价值观及中华优秀传统文化是否通过科学家故事、创新精神、团队协作、环保责任等案例自然融入教学，激发学生责任感、民族自豪感，避免生硬说教。
  - field: 模拟真实提问还原度_理由
    type: str
    description: 解释模拟真实提问还原度评分的详细理由，引用具体例子。
  - field: 模拟真实提问还原度
    type: float
    description: 评估问题与回答是否贴近高中课堂真实情境，反映学生常见困惑、表达风格和互动方式，具备真实教学互动性和针对性，能有效回应学生实际需求。
  format_mode: prompt
