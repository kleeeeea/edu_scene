    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为德育美育-高中-设计一件表达社会关怀的艺术作品（美育+德育）教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高二的学生，最近美育课让我们设计一件能表达社会关怀的艺术作品。我对社会关怀的主题有点模糊，也不知道怎么把德育内容和现实问题自然融入到艺术创作里。你能深入讲解一下，在高中阶段怎么把德育和美育结合起来，用艺术作品体现对社会的关怀吗？最好系统说说创作思路、素材选择、表现形式和创新方法，还能举些具体案例和分析。
  - question: 我是高一班主任，最近我们班要做一个表达社会关怀的艺术作品。班里同学都挺活泼，但有时候容易分心，对社会话题也比较不敏感。你能大概讲讲，老师怎么引导他们在艺术创作里关注社会关怀，同时实现德美融合吗？主要思路和操作建议有哪些？
  - question: 我是高三学生，性格比较内向，平时喜欢写诗和素描。美育老师最近让我们设计一个能表达社会关怀的艺术作品，我有点担心自己表达不够深刻。你能解释一下，像我这种内向型学生在美育德育融合的主题下，怎么发挥自己的优势，挑选合适的表达方式来体现对社会关怀的理解吗？希望有具体建议和实际方法。
  - question: 我是刚入职的高中美术老师，班里学生兴趣很广，但大家对社会问题的关注度都不高。学校希望我们在美育和德育结合上做得更好，特别是在艺术创作里体现社会关怀。你能详细说说，作为新老师，我该怎么引导学生通过艺术作品关注社会现实，同时兼顾德育目标和美育创新？有哪些有效的教学方法和资源推荐？
  - question: 我是高一学生的家长，我孩子喜欢摄影和手工，但对社会现实有点漠不关心。最近老师让他们设计一个表达社会关怀的艺术作品，我想帮助孩子理解这个主题，同时提升德育和美育素养。你能详细讲讲，家长应该怎么在家庭和课外活动中帮助孩子建立社会关怀意识，并用艺术创作提升德育美育素养吗？最好能有具体案例、方法和资源推荐。
  - question: 我是陈倩，28岁的女老师，喜欢旅行、烘焙和园艺，性格逻辑性强、管理风格民主但思维有点固化。我和学生相处很平等但坚持教学原则，平时也喜欢和同事交流和分享。最近学校让我组织一次以社会关怀为主题的德美融合艺术创作活动。你能彻底说清楚，结合我的教学风格和性格特点，怎么在高中美育德育课堂上设计一套系统化的艺术作品创作和教学方案？希望方案能激发学生创新，同时自然融合社会主义核心价值观和中华优秀传统文化，提升学生社会责任感。请把教学步骤、活动流程、案例和资源全面系统地讲清楚。
  - question: 我是张莲，五年级女生，家里只有我一个人，和妈妈关系有点疏远，周末会去做园艺活动。我喜欢植物养护、书法和写诗，老师说我书法有灵气但专注力不够。现在老师让我们做一件表达社会关怀的艺术作品，我其实不太懂什么是社会关怀，也不知道怎么用我的兴趣来表达。你说说你的看法，结合我的兴趣和性格，有没有适合我的表达方式和创作建议？
  - question: 我是龚滨，男老师，喜欢虚拟现实开发、摄影和机械键盘改装，平时学科壁垒挺强，遇到新技术话题还挺保守。现在学校让我负责美育和德育融合的艺术创作指导，主题是社会关怀。你讲讲看，像我这种技术偏好明显、学科壁垒比较重的老师，怎么有效引导学生用科技手段（比如VR、摄影等）来表达社会关怀，实现德美融合？最好能结合实际案例或方法。
  - question: 我是高二学生，最近我们班美育课让我们小组合作做一个表达社会关怀的艺术作品。我们组成员性格差别挺大，合作时经常有分歧，也不知道怎么把大家的想法融合，主题还得突出社会关怀。你说说主要的，像我们这种情况小组该怎么分工合作，既融合多元观点又能突出社会关怀，实现德美一体化创作？
  - question: 我是熊宇，16岁的高一男生，喜欢围棋、山地骑行和武术，性格比较独立，经常自己活动，也在社团和教练那里有师徒和朋友关系。美育老师最近要求我们设计一个表达社会关怀的艺术作品，我想结合自己的兴趣和独立性格，创作一个有现实意义的作品。你能系统地讲解一下，结合我的兴趣、性格和社交特点，怎么构思和实施一个德育美育融合、关注社会现实的艺术创作项目吗？希望讲清楚创作流程、表达渠道、案例分析、资源利用和创新建议，能有全面系统的指导。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-高中-设计一件表达社会关怀的艺术作品（美育+德育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与回应_理由
    type: str
    description: 解释个性化画像识别与回应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与回应
    type: float
    description: 评估方案需通过具体调研或画像工具，深入了解学生兴趣、能力、背景，并在活动设计、建议和互动中针对不同学生做出差异化安排。要求至少在作品主题选择、创作方式、评价反馈三个环节体现个性化响应，避免表面化或形式化处理。
  - field: 指令格式完整遵循_理由
    type: str
    description: 解释指令格式完整遵循评分的详细理由，引用具体例子。
  - field: 指令格式完整遵循
    type: float
    description: 回应须严格分模块，覆盖所有指定环节（如主题、步骤、融合点等），每模块内容详实、结构清晰，无遗漏或混杂。要求每部分不少于两段，层次分明，并有自然衔接与小结，避免只写单段或模块缺失。
  - field: 教学目标与方法清晰科学_理由
    type: str
    description: 解释教学目标与方法清晰科学评分的详细理由，引用具体例子。
  - field: 教学目标与方法清晰科学
    type: float
    description: 方案需设定知识、能力、价值观三维度具体目标，并采用科学的教学方法（如分阶段指导、协作学习、反思记录等），每步活动明确目标与对应方法。要求方法与目标高度匹配，流程可操作，避免空泛描述或错配。
  - field: 德育美育融合深度_理由
    type: str
    description: 解释德育美育融合深度评分的详细理由，引用具体例子。
  - field: 德育美育融合深度
    type: float
    description: 在活动设计、过程体验、评价标准中深度融合德育与美育，要求至少三环节均有协同作用（如主题讨论、创作体验、反思评价），并有具体融合策略（如社会关怀主题与艺术表现结合、感悟记录等），避免仅表面结合或单环节体现。
  - field: 创造性思维激发_理由
    type: str
    description: 解释创造性思维激发评分的详细理由，引用具体例子。
  - field: 创造性思维激发
    type: float
    description: 通过开放式任务、创新挑战、媒介多样与自主选择，系统激发学生创造性思维，要求有具体激发策略（如创新提问、跨界合作、过程记录），并在评价中设创新性指标。需有成果展示与创新过程反思，避免仅鼓励创新无实际措施。
  - field: 真实场景模拟与问题共情_理由
    type: str
    description: 解释真实场景模拟与问题共情评分的详细理由，引用具体例子。
  - field: 真实场景模拟与问题共情
    type: float
    description: 方案需贴近学生真实创作场景，预判并回应学生在表达社会关怀时可能遇到的情感、技术或协作难题，设置具体支持措施（如情感疏导、技术指导、小组交流等），教师需主动倾听与反馈，体现共情与关怀。
  - field: 社会主义核心价值观自然融入_理由
    type: str
    description: 解释社会主义核心价值观自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观自然融入
    type: float
    description: 在主题选择、活动设计、评价标准中自然融入社会主义核心价值观及中华优秀传统文化，通过故事、体验、讨论等方式润物细无声引导学生内化。要求至少两环节有具体融合表现，避免机械灌输或表面化处理。
  - field: 多样化表达渠道推荐_理由
    type: str
    description: 解释多样化表达渠道推荐评分的详细理由，引用具体例子。
  - field: 多样化表达渠道推荐
    type: float
    description: 根据学生兴趣和能力，推荐至少两种以上艺术表达渠道（如绘画、摄影、影像、写作等），并为不同类型学生提供个性化建议，鼓励自主选择与跨媒介创新。需说明每种方式优势及适用场景，避免单一化或强制统一。
  format_mode: prompt
