    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为数学-小学-家庭辅导方法教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是WilsonJoshua的家长，他是一名6岁的男孩，目前就读一年级，喜欢跆拳道、乒乓球和电竞，性格有碎片化记忆以及反实用主义倾向。Wilson喜欢参与充满活力的兴趣活动，比如跆拳道和电竞，但在数学学习时经常记不住知识点，也不太愿意接受常规的解题方法。他更愿意用自己的方式看待问题，抗拒套路化的训练。你作为小学数学家庭辅导专家，说说你的看法，家长在家庭数学辅导时可以采取哪些创新方法提升他的数学兴趣和学习效果？
  - question: 我是一名二年级学生的家长，最近发现自己的孩子在数学学习上遇到瓶颈，尤其是对于数的分解和简单应用题，总是理解不够深刻，做题时容易产生畏难情绪。孩子性格内向，喜欢独自画画，但不善于表达自己的想法，也不愿意主动向父母寻求帮助。你作为小学数学家庭辅导专家，全面分析一下家长该如何帮助性格内向、表达能力弱、主动性不强的孩子突破数学学习瓶颈，提升理解力和自信心，并改善亲子互动氛围。
  - question: 我是三年级学生的家长，最近发现我儿子在数学家庭作业中容易粗心大意，经常在计算题中出错。他平时很喜欢拼乐高，对空间想象有兴趣，但做题时总是急于求成，很少检查。你作为数学学习顾问，能说说你的看法吗？家长在家庭辅导中如何结合孩子的兴趣和特点，有针对性地帮助他改掉粗心习惯，提升计算准确率？
  - question: 我是一名四年级学生的家长，最近在家辅导女儿数学时发现她遇到新知识点会表现出明显的抗拒，比如分数和小数的转换题目，她总觉得很难，甚至有时会哭闹。她性格活泼，但遇到难题容易情绪化，不愿意尝试新的解题方法。你作为小学数学家庭辅导专家，能解释一下家长如何在家庭环境中以积极、温和的方式帮助孩子克服对新知识的抗拒，培养其尝试和解决问题的勇气吗？
  - question: 我是五年级男孩的家长，最近发现孩子在数学学习中思维很活跃，喜欢把题目拆分成不同部分分析，但有时候容易钻牛角尖，忽略整体结构，导致做题效率低下。他喜欢下棋和编程，善于逻辑推理，但不太擅长快速归纳总结。你作为数学教育专家，详细讲讲家长在家庭数学辅导中如何引导孩子把握整体与细节、提升归纳能力，同时保护其思维的创造性吧。
  - question: 我是一名家长，孩子刚升入六年级，数学成绩一直中等偏下，遇到多步骤的应用题总是容易卡住，不知道如何分步解决。他性格外向，喜欢和同学交流，也很喜欢讲笑话，但学习时容易分心，缺乏自控力。你作为小学数学学习顾问，彻底说清楚家长在家庭辅导中如何帮助外向、注意力易分散的孩子提升多步骤应用题的解题能力，同时培养其专注力和自律性。
  - question: 我是二年级学生的家长，最近发现我儿子在数学作业中喜欢把题目和他自己的兴趣结合，比如用足球人数来理解加减法，但有时候会把题目想得太复杂，影响做题速度。你作为数学学习指导老师，用几句话说说家长该怎么引导孩子发挥兴趣优势，同时帮助他把握题目本质，不走偏？
  - question: 我是黎若冰的家长，她是一名6岁女孩，现在读一年级，喜欢舞蹈和跳绳，性格表现出拖延倾向、自主学习弱以及功利心萌芽。在舞蹈培训时需要家长频繁催促，学习进度常常落后于同龄人；课间主要与同学通过跳皮筋等游戏互动，较少参与集体学习活动。你作为小学数学家庭辅导专家，给我一份完整的分析，家长如何针对黎若冰的拖延、自主学习弱和功利心萌芽，结合她的兴趣和社交特点，在家庭数学辅导过程中培养她的自律性、学习主动性和团队合作精神，同时提升数学学习效果？
  - question: 我是一名刚入职的小学数学老师，最近在家庭辅导群里经常被家长问到如何激发孩子的数学学习兴趣。家长们反映孩子普遍对数学课感到枯燥，缺乏自主学习动力。你作为数学教育专家，概括一下家长在家庭辅导中激发孩子数学兴趣的常用有效方法吧。
  - question: 我是金彦，30岁男老师，平时喜欢DIY电脑组装和陆冲滑板，性格注重规则与创新的平衡。学校同事觉得我可靠稳重，业余时间我常和DIY电脑发烧友交流硬件配置，周末会在滑板公园教新人基本动作。作为小学数学教师，我希望在家庭辅导方法上能兼顾规则性和创新性，帮助学生在数学学习中既能遵循思维步骤，又能培养创新解题能力。你作为数学教育专家，详细说说在实际家庭数学辅导中如何做到规则与创新并重，提升孩子的逻辑思维和创新能力？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 数学-小学-家庭辅导方法进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 建议需基于学生多维个性特征（如年龄、兴趣、学习风格、认知水平、学习历史等），动态采集并响应反馈，持续调整辅导策略。要求有明确的个性化调整流程和家长可操作的追踪机制，能对学生表现和新问题做出个性化优化。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 辅导建议需严格按照家长或题目要求的结构分步、分层展开，逻辑清晰、内容完整。复杂问题需分板块、步骤列出，便于家长查找和执行。任何遗漏或层次混乱均扣分。
  - field: 教学方法科学性与理论依据_理由
    type: str
    description: 解释教学方法科学性与理论依据评分的详细理由，引用具体例子。
  - field: 教学方法科学性与理论依据
    type: float
    description: 所有建议须明确引用主流教育学、心理学理论（如皮亚杰、维果茨基等），并说明理论与具体策略的结合点。要求理论出处+实际应用说明，杜绝经验主义或理论与实践脱节。高分需体现理论指导下的具体调整。
  - field: 教学方法适配度与难度匹配_理由
    type: str
    description: 解释教学方法适配度与难度匹配评分的详细理由，引用具体例子。
  - field: 教学方法适配度与难度匹配
    type: float
    description: 建议需精准匹配学生年级、认知发展阶段和当前学习内容，难度分层递进，能根据学生反馈灵活调整，避免超前拔高或低龄化。高分需体现动态难度调整和具体修正机制。
  - field: 创新思维激发与多元解题_理由
    type: str
    description: 解释创新思维激发与多元解题评分的详细理由，引用具体例子。
  - field: 创新思维激发与多元解题
    type: float
    description: 建议需持续鼓励学生尝试多种解题方法，自创策略、表达独特见解，并给予正向反馈。高分要求能分析不同方法优劣，引导孩子反思和比较，避免标准答案导向。
  - field: 开放性问题与探究引导_理由
    type: str
    description: 解释开放性问题与探究引导评分的详细理由，引用具体例子。
  - field: 开放性问题与探究引导
    type: float
    description: 辅导过程中设计开放式问题或探究任务，激发学生主动提问、表达见解、尝试多解、反思过程。高分要求能引导孩子进行小型探究或生活实践，并培养批判与创造性思维。
  - field: 社会主义核心价值观与文化融合_理由
    type: str
    description: 解释社会主义核心价值观与文化融合评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与文化融合
    type: float
    description: 建议需将社会主义核心价值观或中华优秀传统文化与数学内容有机融合，通过实际活动（如合作解题、诚信竞赛等）促进品格养成。高分要求价值观融入活动流程，学生能体验并反思品格意义，杜绝机械植入。
  - field: 真实问题回应度与针对性_理由
    type: str
    description: 解释真实问题回应度与针对性评分的详细理由，引用具体例子。
  - field: 真实问题回应度与针对性
    type: float
    description: 针对家长实际提出的具体问题（如粗心、注意力不集中、兴趣缺乏等）进行深入分析，给出多角度、可持续跟进的解决方案，并根据反馈持续调整。高分要求有问题分析、方案多样、动态跟进和调整建议。
  - field: 语言表达清晰度与可操作性_理由
    type: str
    description: 解释语言表达清晰度与可操作性评分的详细理由，引用具体例子。
  - field: 语言表达清晰度与可操作性
    type: float
    description: 建议表达简明、具体、无歧义，操作步骤详细，每步有小提示，关键流程配图或举例，包含家长易错点提醒，便于家庭场景下直接执行和反馈。高分要求流程完整、举例清晰、注意事项明确。
  format_mode: prompt
