# 一些全局字段
globals:
  # 并发
  concurrency: 16
  # 模型调用限制次数
  recursion_limit: 50
  # 重试（下面是默认）
  retry:
    # 重试次数
    attempt: 5
    # 重试间隔（秒）
    interval: 3
  # 脚本运行期间记忆配置
  memory:
    # 所有记忆、对话记录、评测结果等信息的存储路径
    # 默认和配置文件同名目录
    # 记忆存放的位置，推荐命名为 任务名/模型名
    path: ./scenario-item/72b-0731

# 定义任务中需要用到的模型
models:
  test_model:
    type: openai
    api_key: 2uuD5+89UvtRc4nCn5ZMjQyArLh37ndg3Q5fMeZl7p0=
    api_base: https://eeb5kcocc9o8cjojkphogjmhebqhqpmg.openapi-qb-ai.sii.edu.cn/v1/
    model: qwen3.5-35b
    # 如果需要指定特殊参数
    #kargs:
    # temperature: 0.5
  judge_model:
    type: openai
    api_key: sk-jnCs2n2jW28lCAduYze4DdcOAch0V82MghHbZMDZY8elvr26
    api_base: https://api.innospark.cn/v1/
    model: gemini-2.0-flash
    # 如果需要指定特殊参数
    kargs:
      temperature: 0

# 定义任务中需要使用的agent
agents:
  # agent名，字段可自定义，在本例中为teacher
  test_model:
    # 该agent用到的模型
    model: test_model
    # 提示词
    prompt:
      # 填写完整的openai格式的提示词
      - role: system
        content: You are InnoSpark, created by Lab of AI Education. You are from East China Normal University(华东师范大学), and your Chinese Name is 启创. You are a helpful assistant.
      - role: user
        content: "请你根据以下任务背景生成一份跨学科教案，{question}"
    # 以下memory配置为默认配置
    memory:
      enable: false # 是否启用记忆
      id: null # 记忆的id号，建议不填或留空，除非需要多次运行时保留记忆
      # 调用时携带多少轮上下文对话，一个user一个assistant记作一轮
      keep_turns: 3 # 默认3轮，即上方配置的prompt-[user-assistant-user-assistant-user-assistant]-user

# 信息传递方向
directions:
  # 从一个agent到另一个agent
  # START和END是两个特殊节点，也算作Agent
  - START -> test_model # 程序开始后，首先激活teacher这个agent用于生成数据
  - test_model -> END

tasks:
  # 由START进入第一个agent的prompt
  # start_prompt可选，如果未指定就只传agent中的prompt
  # task模式， 可选union和iter
  # union指将content下所有字段各选一项排列组合，例如在本例中，就形成了len(image) * len(question)个task
  mode: iter
  content:
    # content中的字段将被用于动态生成agents中的prompt，例如image将替换提示词中所有{image}
    - question: 教学对象：初一（7 年级）学生（12 - 13 岁），熟悉基础测量工具（刻度尺、量筒等）的使用，具备简单的观察记录能力，形象思维为主，抽象概念理解较困难。\n- 核心学科：物理\n- 主要关联学科：数学\n- 课时规划：4课时\n- 知识掌握：已掌握长度与体积测量、质量与密度基础概念、力的初步认识

# 设定用于评估的模型和提示词，以及输出的格式
evaluation:
  # 评估任务名称, 推荐命名为 任务名_模型名
  name: question_72b-0731
  # 选择用于评估的模型
  model: judge_model
  # 设置用于评估的提示词
  # 可以使用模板，在评估时将动态修改
  prompt:
    - role: system
      content: |
        你是一个教育领域的专家，擅长对跨学科教案进行评估。请你对下面的教案进行评分，采用量表（1 - 5 分，1 分为 “完全不符合”，5 分为 “完全符合”）进行打分，并需简要说明评分理由
    - role: user
      content: |
        {messages.as_dialog()}

  # 输出格式
  # format下面写每个字段
  # 每个字段需要包含type和description，分别表示数据类型和描述
  # type可以是以下几种类型：str, int, float, bool, dict
  # description可以是任意字符串，用于描述字段的意思
  format:
    - field: 核心概念联结度
      type: float
      description: 一个特定主题或知识领域内，其最重要的、核心的各个概念之间相互关联的紧密程度、清晰度以及逻辑合理性，关注这些核心概念是否形成了一个有机的、结构化的知识网络，而不是孤立存在的零散信息。
    - field: 跨学科逻辑整合性
      type: float
      description: 指教案是否以真实世界问题为导向，并有效地融合至少两个或两个以上学科的知识、方法和工具，以共同解决问题。这种融合应是内在的、有逻辑的，而非简单地拼凑不同学科内容。
    - field: 核心知识覆盖度
      type: float
      description: 在教学过程中，核心知识点的覆盖程度，关注是否涵盖了该主题或学科领域内最重要、最基础的知识，而不是零散的、边缘的内容,是否覆盖核心学科3项及以上基础知识点或研究方法。
    - field: 认知冲突设计
      type: float
      description: 在教案中有意地创设一种情境或提出一个问题，这个情境或问题与学生已有的经验、直觉、普遍认知或先前学到的“常识性”知识产生明显的矛盾或不一致。这个“冲突点”可以是一个反直觉的实验现象、一个挑战常识的问题、一个看似矛盾的案例、或是一组令人意外的数据。仅仅制造冲突是不够的，教案还需要设计好引导学生进行探究的路径和方法，如提出引导性问题、提供必要的材料或工具、组织小组讨论等，最终目标是帮助学生解决这个认知冲突，并形成对相关概念或原理的正确理解。
    - field: 情境真实性
      type: float
      description: 教案中所设计的情境或案例是否真实、贴近学生的生活经验和社会实际，能够引起学生的兴趣和共鸣。情境真实性可以通过使用真实世界中的数据、案例、问题等来实现
    - field: 认知进阶设计
      type: float
      description: 认知进阶设计体现在以下三个关键方面： “事实 - 概念 - 辩证/探究” 问题链 (Fact - Concept - Inquiry/Debate Question Chain)：\n考量点： 教案中的提问是否形成一个有逻辑梯度的链条，从对基本事实的识记，到对核心概念的理解，最终引导学生进行批判性思考、多角度辩论或深度探究。\n“记忆 - 理解/分析 - 应用/创造” 任务序列 (Memory - Comprehension/Analysis - Application/Creation Task Sequence)：\n考量点： 教案中的学习任务是否按照认知复杂度的递增进行组织，从要求学生记忆和回忆信息，发展到理解和分析信息，最终能够应用所学解决问题或进行创新性产出。这通常与布鲁姆认知目标分类法相呼应。\n  教师指导策略随认知阶段的动态调整 (Dynamic Adjustment of Teacher Guidance Strategies)：\n 考量点： 教师的角色和指导方式是否根据学生所处的认知阶段和任务需求进行灵活调整。
    - field: 差异化支持
      type: float
      description: 教案是否考虑到学生的个体差异，提供了不同层次、不同风格学习者所需的支持和挑战。差异化支持可以体现在任务难度、学习资源、评价方式等方面。
    - field: 学生参与度
      type: float
      description: 教案是否设计了足够的机会让学生积极参与到学习过程中，包括讨论、合作、实践等方式。高参与度通常意味着学生在课堂上是主动的，而不是被动接受信息。
    - field: 过程反思记录
      type: float
      description: 教案是否设计了反思环节或反思性问题，让学生在学习过程中记录自己的思考、感受和学习进展。这种反思可以帮助学生更好地理解所学内容，并促进自我调节学习。
    - field: 评价闭环设计
      type: float
      description: 教案是否设计了完整的评价体系，包括形成性评价和总结性评价，确保学生在学习过程中得到及时反馈，并能根据反馈调整学习策略；评价内容与教学目标呼应。
    - field: 多维表现评价
      type: float
      description: 教案中的评价方式是否采取了多维度，包括但不限于知识技能、跨学科思维、问题解决能力等，并且各评价维度均有清晰、可观测的行为表现作为评价指标。
    - field: 教学条件可行性
      type: float
      description: 教案是否考虑了实际教学条件的可行性，包括时间、空间、资源等方面，确保所设计的活动和任务在实际教学中能够顺利实施。
    - field: 材料工具适配性
      type: float
      description: 教案中使用的材料和工具是否适合学生的年龄、认知水平和学习需求，是否能够有效支持教学目标的实现
    - field: 教案规范性
      type: float
      description: 格式规范（统一标题层级/图表编号）；教案的语言表述是否专业、准确、规范，所使用的教育或学科术语是否恰当，且描述清晰、简洁、易于理解，避免歧义和冗余
    - field: 前后内容一致性
      type: float
      description: 教案中各部分内容是否逻辑连贯，前后内容是否一致，教学目标、活动设计、评价方式等是否相互呼应，确保教学过程的整体性和连贯性。

  # 格式化方式，可以是以下几种：tool, prompt
  # 推荐使用tool模式，
  # 但是gptgod似乎并不支持tool :-(
  format_mode: prompt
