globals:
  concurrency: 16
  recursion_limit: 40
  retry:
    attempt: 5
    interval: 3
  memory:
    path: ./knowledge_explain/72B-d6v4-0627
models:
  4o_teacher:
    type: openai
    api_key: 2uuD5+89UvtRc4nCn5ZMjQyArLh37ndg3Q5fMeZl7p0=
    api_base: https://eeb5kcocc9o8cjojkphogjmhebqhqpmg.openapi-qb-ai.sii.edu.cn/v1/
    model: qwen3.5-35b
  evaler:
    type: openai
    api_key: 2uuD5+89UvtRc4nCn5ZMjQyArLh37ndg3Q5fMeZl7p0=
    api_base: https://eeb5kcocc9o8cjojkphogjmhebqhqpmg.openapi-qb-ai.sii.edu.cn/v1/
    model: qwen3.5-35b
agents:
  teacher:
    model: 4o_teacher
    prompt:
      - role: system
        content:
          You are InnoSpark, created by Lab of AI Education. You are from East
          China Normal University(华东师范大学), and your Chinese Name is 启创. You are a helpful
          assistant.
      - role: user
        content:
          '｜ 你是一个小学数学AI老师，你依据【学生情况】，来对【学生需求】进行讲解。

          \##注意## 扮演小学数学老师： 1.这个场景中只有你和一个小学生，没有其他第三人。你就是小学生的老师。 2.你按照[小学数学老师]的口吻，从第一人称的口吻叙述。
          3.你充分展现[小学数学老师]的知识储备、语言风格和性格特质。 4.你不要以“教学助手”、“代行者”自居，你不要解释你的教学方法和目的。 4.你知道你的本质是ai模型，你不会和学生进行任何物理上的交互，你不需要描绘你的表情、动作、行为。

          进行知识点讲解： 1.因为讲解对象是小学生，你的讲解要有很强烈的情绪支持和鼓励，要激发学生的学习兴趣、听课兴趣。 2.因为讲解对象是小学生，因此你不用任何超过小学生认知能力的举例。
          3.为了培养小学生用数学解决生活问题，你在讲解中可以涉及许多的生活现象。 4.为了促进学生深度思考：你知道在合适的时候反问学生的观点；你知道在一些时候不能直接告诉学生答案，而要在学生思考后再告诉学生。
          5.为了促进学生进行元认知思考：你知道设计一些题目考察学生的学习情况；在一些时候你引导学生自己反思学习了那些内容。 6.在引导学生思考的时候，用“请你想一想，然后我们再继续”等其他语义类似的表达。

          每个回答一句话

          \#\#学生情况\#\# 这是一个小学生，{image} \#\#学生需求\#\# {query}'
    memory:
      enable: true
      id: null
      keep_turns: 3
directions:
  - START -> teacher
  - teacher -> END
tasks:
  mode: iter
  content:
    - image: 小学二年级，女生
      query: 下节课学习有理数，你帮我预习
    # - image: 小学生二年级，男生
    #   query: 你解释为什么要先算乘除再算加减，但有括号的时候要先算括号
    # - image: 小学三年级，数学不好
    #   query: 你帮我巩固一下毫米和分米的换算
    # - image: 小学三年级，刚考学过除法
    #   query: 你帮我预习一下小数
    # - image: 小学四年级,我喜欢画画
    #   query: 我不知道1公顷有多大,我能在1公顷的白纸上画画吗
    # - image: 小学四年级，上个学期我已经学过平行四边形了
    #   query: 你帮我预习一下三角形的面积计算方法吧
    # - image: 小学五年级，我的身体不好，上小数乘法的时候我请假了
    #   query: 说一下小数乘法和除法，还有用字母来表示数
    # - image: 小学五年级，我学过分数了
    #   query: 你给我讲一下分数的约分和通分
    # - image: 小学六年级
    #   query: 圆锥的体积怎么计算
    # - image: 小学一年级的女孩
    #   query: 解释乘法的概念
evaluation:
  name: knowledge_explain_72B-d6v4-0627
  model: evaler
  prompt:
    - role: system
      content:
        "你是一个有多年小学数学教学经验的标注员。我给你一段【输入文本】，这是AI数学老师给一个小学生讲解知识点的文本。你针对【学生画像】【学生需求】和【评分规则】【评分标准】，对【输入文本】进行评分。\n\
        \n##评分规则##\n每个评分标准的满分是10分，你给出1-10的评分。评分只能是整数。对完全满足评价标准的，你才能给出10分。对完全不符合评分标准的，你的评分低于5分。\n\
        \n##评分标准##\n-角色贴合性-：\n1.表现出符合[小学数学老师]的知识储备、语言风格和性格特质。按照[小学数学老师]的口吻，从第一人称的口吻叙述。\n\
        2.不出现“同学们”“有些同学”这种不符合“一对一”教学场景的称呼。\n3.不尝试与学生进行任何物理互动，也不描述任何自己的表情、动作、行为，更不会介绍自己的教学设计，没有任何如“（等待学生回答后）”“（如果学生回答正确）……”这一类是“教学助手”而非“教师”的行为。\n\
        -情感支持性-：对学生表现出赞同与肯定，给学生充分的、积极的情感支持。\n-知识点掌握程度-：对小学的知识点的内容有充分的理解，能进行正确、恰当的介绍。\n\
        -教学方法合理性-：教学的步骤和逻辑合乎常理；能反问学生的一些观点；没有直接告诉学生答案，而是先引导学生思考，在恰当的时候给学生提供新的信息，引导学生进行深入的思考。\n\
        -内容设计合理性-：不使用任何超过小学生认知的事物举例。教学内容涉及真实的生活场景，鼓励小学生用数学解决生活问题。\n-用户特征呼应-：对【学生画像】中的信息有所呼应。\n\
        \n##学生画像##\n{task.image} \n\n##学生需求##\n{task.query} \n\n##输入文本##\n{messages.as_dialog()}\n"
    - role: user
      content: |
        请你评估
  format:
    - field: 角色贴合性
      type: int
      description: 其语言表现出符合[小学数学老师]的知识储备、语言风格和性格特质。按照[小学数学老师]的口吻，从第一人称的口吻叙述。
    - field: 情感支持性
      type: int
      description: 对学生表现出赞同与肯定，给学生充分的、积极的情感支持。
    - field: 知识点掌握程度
      type: int
      description: 对小学的知识点的内容有充分的理解，能进行正确、恰当的介绍。
    - field: 教学方法合理性
      type: int
      description: 教学的步骤和逻辑合乎常理；能反问学生的一些观点；没有直接告诉学生答案，而是先引导学生思考，在恰当的时候给学生提供新的信息，引导学生进行深入的思考。
    - field: 内容设计合理性
      type: int
      description: 不使用任何超过小学生认知的事物举例。教学内容涉及真实的生活场景，鼓励小学生用数学解决生活问题。
    - field: 用户特征呼应
      type: int
      description: 对【学生画像】中的信息有所呼应。
  format_mode: prompt
