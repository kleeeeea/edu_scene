# 一些全局字段
globals:
  # 并发
  concurrency: 16
  # 模型调用限制次数
  recursion_limit: 50
  # 重试（下面是默认）
  retry:
    # 重试次数
    attempt: 5
    # 重试间隔（秒）
    interval: 3
  # 脚本运行期间记忆配置
  memory:
    # 所有记忆、对话记录、评测结果等信息的存储路径
    # 默认和配置文件同名目录
    # 记忆存放的位置，推荐命名为 任务名/模型名
    path: ./scenario-item/7b-v1-0618

# 定义任务中需要用到的模型
models:
  test_model:
    type: openai
    api_key: 2uuD5+89UvtRc4nCn5ZMjQyArLh37ndg3Q5fMeZl7p0=
    api_base: https://eeb5kcocc9o8cjojkphogjmhebqhqpmg.openapi-qb-ai.sii.edu.cn/v1/
    model: qwen3.5-35b
    # 如果需要指定特殊参数
    #kargs:
    # temperature: 0.5
  judge_model:
    type: openai
    api_key: sk-jnCs2n2jW28lCAduYze4DdcOAch0V82MghHbZMDZY8elvr26
    api_base: https://api.innospark.cn/v1/
    model: gemini-3-pro-preview
    # 如果需要指定特殊参数
    kargs:
      temperature: 0

# 定义任务中需要使用的agent
agents:
  # agent名，字段可自定义，在本例中为teacher
  test_model:
    # 该agent用到的模型
    model: test_model
    # 提示词
    prompt:
      # 填写完整的openai格式的提示词
      - role: system
        content: You are InnoSpark, created by Lab of AI Education. You are from East China Normal University(华东师范大学), and your Chinese Name is 启创. You are a helpful assistant.
      - role: user
        content: "你的任务是出情境化的数学题。{question}"
    # 以下memory配置为默认配置
    memory:
      enable: false # 是否启用记忆
      id: null # 记忆的id号，建议不填或留空，除非需要多次运行时保留记忆
      # 调用时携带多少轮上下文对话，一个user一个assistant记作一轮
      keep_turns: 3 # 默认3轮，即上方配置的prompt-[user-assistant-user-assistant-user-assistant]-user

# 信息传递方向
directions:
  # 从一个agent到另一个agent
  # START和END是两个特殊节点，也算作Agent
  - START -> test_model # 程序开始后，首先激活teacher这个agent用于生成数据
  - test_model -> END

tasks:
  # 由START进入第一个agent的prompt
  # start_prompt可选，如果未指定就只传agent中的prompt
  # task模式， 可选union和iter
  # union指将content下所有字段各选一项排列组合，例如在本例中，就形成了len(image) * len(question)个task
  mode: iter
  content:
    # content中的字段将被用于动态生成agents中的prompt，例如image将替换提示词中所有{image}
    - question: 我需要一道关于三角形周长的基础题，考察学生对等边三角形特性的理解。题目要适合四年级下学期的学生课堂练习。

# 设定用于评估的模型和提示词，以及输出的格式
evaluation:
  # 评估任务名称, 推荐命名为 任务名_模型名
  name: question_7b-v1-0618
  # 选择用于评估的模型
  model: judge_model
  # 设置用于评估的提示词
  # 可以使用模板，在评估时将动态修改
  prompt:
    - role: system
      content: |
        请你作为一名教育专家，对模型按照教师要求生成数学题目的能力进行详细评估，你需要按李克特五点量表打分（1-5分，1分为“完全不符合”，5分 为“完全符合”）
    - role: user
      content: |
        教师的要求如下: {task.question}
        模型的回复如下:
        {messages.as_dialog()}

  # 输出格式
  # format下面写每个字段
  # 每个字段需要包含type和description，分别表示数据类型和描述
  # type可以是以下几种类型：str, int, float, bool, dict
  # description可以是任意字符串，用于描述字段的意思
  format:
    - field: 题干质量
      type: float
      description: 请你对于题干质量维度评估，对于这个维度评估时无需关注题目其他信息，请你严谨、严格、细致的评分，评分细则如下:题干应语言表达准确，避免使用含糊不清或易引起歧义的措辞（如“可能”、“大概”、“也许”等）。题干应具有明确的解答目 标与方式，确保在设定的条件下可推导出正确答案，避免无解、信息缺失等问题。题目应紧密围绕课程标准，准确考查对应的知识点，避免偏题、错位或知识覆盖不足的情况。注意在评估该维度时你无需评估解析和对话其他部分的质量，只需要关注题干即可。。一些示例如下：该维度正例：['题干明确，问法清晰，如：‘请计算以下分数加法：3/4 + 2/5’。', '选择题设有四个选项，正确答案唯一且明确。', '紧密围绕课程内容，例如‘用数轴表示负数的大小关系’符合初中数学知识点。']。该维度负例：['题干含糊，如：‘小明可能走了一段路’。', '解答无唯一解，或信息不足（例如 缺少单位、关键条件）。', '考查知识与当前课标脱节，如小学生试题考查复数运算。']。评分细则：题干模糊或无法解题：1–2分；考查知识偏浅 或表达有瑕疵：3–4分；表达清晰、知识精准匹配：5分。。
    - field: 情境质量
      type: float
      description: 请你对于情境质量维度评估，对于这个维度评估时无需关注题目其他信息，请你严谨、严格、细致的评分，评分细则如下:题目所采用的情境可以是现实生活中的，也可以是虚构、未来设想、童话等类型，但必须能够激发学生的兴趣和好奇心，增 强参与感。情境应与所考查的知识点密切相关，避免生搬硬套。设定中的事件、角色、数据等元素应自洽、有逻辑性，避免出现违背常识、令人出戏的情境问题。注意在评估该维度时你无需评估解析和对话其他部分的质量，只需要关注情境即可。一些示例如下：该维度正例：['通过未来太空旅行设定引出‘速度计算’题，贴近科幻阅读兴趣。', '以节能减排数据为背景，探讨‘单位换算’，与环境议题结合。', '以校内食堂价格为背景，引出‘ 比例计算’。']。该维度负例：['出现‘小明给出30元纸币’的错误设定。', '题目设定与所学知识无关，如‘小红去火星采矿’引出‘拼音排序’。', ' 空泛无背景，无法激发兴趣，如‘计算a+b的值’。']。评分细则：脱节或无情境：1–2分；设定贴合但未能激发学生兴趣，较为平淡：3–4分；情境新 颖、逻辑清晰、激发兴趣：5分。
    - field: 解析质量
      type: float
      description: 请你对于解析质量维度评估，对于这个维度评估时无需关注题目其他信息，请你严谨、严格、细致的评分，评分细则如下:解析应完整覆盖解题过程的关键步骤，逻辑清晰、条理分明，不跳步、不省略关键推理过程。应突出对学生认知过程的引导 ，可采用对话式、引导式或类比等交互表达方式，帮助学生逐步建立知识结构。优秀的解析不仅给出“怎么做”，还要解释“为什么这样做”，具备教学价值与可迁移性。注意在评估该维度时你无需评估题干和对话其他部分的质量，只需要关注解析即可。一些示例如下：该维度正例：['分步骤逐条解释解题过程，每一步都附理由，例如‘因为是等比数列，所以用a×r^n’。', '通过对话方式呈现解析，如‘小明问：为什么要先约分？老师答：因为约分可以简化计算’。', '通过错因分析引导学生避免常见误区。']。该维度负例：['仅给出答案无过程，如‘答案是3.5’。', '跳步严重，不解释思维路径，学生难以迁移学习。', '仅给出公式代入，不解释公式来源与适用条件。']。评分细则：无过程或过程混乱：1–2分；有解析但未体现引导性 ：3分；步骤清晰、富有引导性和教学价值：4-5分。
    - field: 教学适用性
      type: float
      description: 请你对于教学辅助维度评估，对于这个维度评估时无需关注题目其他信息，请你严谨、严格、细致的评分，评分细则如下:对话应具有良好的教学适用性，能够辅助教师实现教学目标。例如，所提供的内容能够引发学生的思考与讨论，所提供内容 是否便于在课堂中开展引导性讲解或拓展，是否可以引出多种解法或多角度分析等。题目与解析应支持教师用于概念澄清、知识迁移、错因分析等常见教学环节，具有较强的教辅潜力。。一些示例如下：该维度正例：['题目设计能引导学生提出不同解法，如‘你还能用别的方法解吗？’', '可作为复习或拓展题，例如‘请用两种方法解这道方程’。', '适合教师课堂互动使用，如“预测结果”、“小组辩论”等。']。该维度负例：['题目机械重复，无法用于教学讨论。', '仅能直接套用公式，无法引发思考。', '设计无法引出知识迁移或概念澄清机会。']。评分细则：无教学拓展空间，仅适用于训练：1–2分；可部分支持教学：3–4分；教学引导性强、应用丰富：5分。
    - field: 价值观引导
      type: float
      description: 请你对于价值观体现维度评估，对于这个维度评估时无需关注题目其他信息，请你严谨、严格、细致的评分，评分细则如下:对话应体现社会主义核心价值观，倡导诚信、环保、勤劳、友善、守法等正向观念。情境设计应避免涉及暴力、赌博、酗 酒、成瘾行为、性别刻板印象、拜金主义等负面导向内容。若题目未体现价值导向但无明显问题，可中性评分；若有明显正向引导，则应给予高分。题目作为教育内容，应具备基本的育人导向和社会责任感。注意在评估该维度时你无需评估题干、情境、解析和对话其他部分的质量，只需要关注价值观即可。一些示例如下：该维度正例：['以志愿服务、节约用水、劳动实践为题目背景。', '鼓励学生独立思考、助人为乐等行为。', '以诚信、环保、爱国为价值引导主题。']。该维度负例：['设定中鼓励暴力、打架、攀比、成瘾行为（如抽盲盒、沉迷网游）。', '隐含性别歧视或偏见，如‘女生不擅长计算’。', '情境引导消费主义，如“买50个限量款玩具”。']。评分细则：存在负面引导：1分；中性内容无价值导向：3分；有明确正向价值体现：5分。

  # 格式化方式，可以是以下几种：tool, prompt
  # 推荐使用tool模式，
  # 但是gptgod似乎并不支持tool :-(
  format_mode: prompt
