tasks:
  mode: iter
  content:
  - question: 我是二年级学生家长，我女儿学拼音经常混淆声母和韵母，整体认读音节也记不牢，而且她性格有点害羞，不敢大声读拼音，也不太主动参与课堂。你作为语文教育专家，能不能详细讲讲这类孩子拼音学习常见难点，还有怎么结合她的性格和家庭环境，帮她提升发音和自信心？麻烦系统地分析一下，并多举些具体例子
  - question: 我是新入职的小学语文老师，班里不少孩子拼音发音不准，拼读规则容易混淆，还有些学生注意力不集中、基础薄弱或兴趣不足，课堂氛围也不够活跃。你作为拼音教学顾问，能不能全方位地讲解一下怎么解决这些问题？想听听你的教学方法、活动设计、个别辅导和家庭协同建议，越全面越好
  - question: 我是英语老师，平时喜欢戏剧和太极，也很重视平衡教学法。最近教非华语背景学生拼音时，他们总是搞不清楚声母、韵母的发音规则，对拼音结构也很困惑。你作为拼音专家，能不能讲清楚点有哪些教学难点，还有怎么结合戏剧或太极等兴趣让学生更愿意参与？
  - question: 我是小学语文教研员，最近调研发现一年级学生学拼音有几个主要难点，比如声母韵母分不清、整体认读音节记不住，还容易受方言影响。你作为专家，能不能说说主要的难点和对应的解决办法？
  - question: 我儿子上三年级，特别喜欢篮球，学拼音时总把声母混淆，发音也不太标准，而且注意力老是分散，做拼音作业时还想着打球，兴趣也不高。你作为拼音教学顾问，能解释一下这种情况常见的难题，还有怎么结合他的兴趣和注意力帮他提升拼音学习效果？
  - question: 我是小学语文老师，平时性格比较放任，管理方式也比较粗放，课外喜欢书法、烘焙和阅读，和学生互动很灵活。最近班里有些孩子拼音发音不准、拼读规则记不牢，尤其在互动活动里容易分心。你作为拼音教育专家，能具体说说吗？怎么结合我的兴趣和风格，设计既有趣又能让孩子专注的拼音教学方案？
  - question: 我是高二男生，喜欢3D建模和篮球，不太喜欢团队学习，平时靠听觉记忆纠正拼音发音。最近准备普通话测试，整体认读音节和某些声母发音老是搞混，有时候还受情绪影响。你作为拼音学习顾问，能大概讲讲拼音学习主要难点，还有适合我的学习建议吗？
  - question: 我是小学语文老师，最近发现低年级学生学拼音总是搞混声母和韵母，整体认读音节也难记，课堂气氛不活跃，孩子们参与度不高。你作为拼音教学专家，能详细说说这些问题的原因，还有什么创新方法能让孩子们更有兴趣和积极性？最好能结合点传统文化和学习态度
  - question: 我是五年级女生SmithZoe，喜欢跳舞、唱歌和越剧，性格比较独立和情绪稳定，能自信地平衡学业和艺术。最近学拼音时有点困难，整体认读音节记不牢，部分声母韵母发音也不清楚，拼读规则容易混淆。你作为拼音教育专家，能不能给我一份完整的分析？麻烦全面讲讲拼音难题、适合我的学习方法、发音训练技巧，还有怎么把传统文化和积极学习态度融进去
  - question: 我是58岁的网红经纪人潘昌铭，平时工作高效自律，社交媒体运营和短视频创作经验丰富，但信息筛选能力有限。最近要帮旗下网红小团队做一套拼音发音提升方案，团队成员基础差异大，有的注意力容易分散，有的地方口音重。你作为拼音与发音教学专家，能深入讲解一下拼音提升的核心策略吗？麻烦结合我的管理习惯，分析怎么分层辅导不同背景的成员，还希望能自然融入传统文化和积极学习态度，激发大家的学习动力
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 语文-小学-拼音与发音进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与回应_理由
    type: str
    description: 解释个性化画像识别与回应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与回应
    type: float
    description: 能准确识别学生的年龄、学习基础、兴趣、学习风格等个性特征，并据此提供差异化、针对性的教学建议和方法。高分需体现动态调整策略与具体个别化举措，能针对至少2类不同学生群体作出显著区分。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 严格按照教师或系统给定的格式、步骤和要求组织内容，结构清晰、排版规范，无遗漏或顺序混乱。高分需完整回应所有要点，分步明确，逻辑连贯。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 教学方法需基于科学教育理论（如多元智能、建构主义等），兼顾听说读写、认知发展与兴趣激发。高分要求至少提供2种互补且有理论依据的方法，并简要说明其适用性和互补性。
  - field: 学习难点识别与应对策略_理由
    type: str
    description: 解释学习难点识别与应对策略评分的详细理由，引用具体例子。
  - field: 学习难点识别与应对策略
    type: float
    description: 能主动识别并分析拼音学习中至少2项常见难点（如发音混淆、书写错误、记忆困难等），并针对性提出具体、分层和可操作的解决方法。高分需体现难点的多样性和应对策略的针对性。
  - field: 激发创新与主动探索能力_理由
    type: str
    description: 解释激发创新与主动探索能力评分的详细理由，引用具体例子。
  - field: 激发创新与主动探索能力
    type: float
    description: 教学内容能鼓励学生主动探索拼音知识，进行创新表达和自我表达。高分需包含至少一种创新活动设计（如自编歌谣、设计游戏、提出问题等），并促进学生自主学习和创造力发展。
  - field: 真实课堂互动与表达贴近度_理由
    type: str
    description: 解释真实课堂互动与表达贴近度评分的详细理由，引用具体例子。
  - field: 真实课堂互动与表达贴近度
    type: float
    description: 教学交流、提问和反馈语言应贴近真实小学课堂，表达自然、互动性强，能反映学生或教师的实际需求。高分需体现师生互动和学生常见表达，无需过度生活化但应避免成人化、学术化。
  - field: 中华优秀传统文化与价值观自然融入_理由
    type: str
    description: 解释中华优秀传统文化与价值观自然融入评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化与价值观自然融入
    type: float
    description: 拼音教学过程中能自然渗透中华优秀传统文化或社会主义核心价值观（如团结、勤奋、尊重等），通过具体活动、故事或情境促进学生文化认同与品格发展。高分需结合教学内容自然融入，避免生硬拼接。
  - field: 语言表达规范性与易懂性_理由
    type: str
    description: 解释语言表达规范性与易懂性评分的详细理由，引用具体例子。
  - field: 语言表达规范性与易懂性
    type: float
    description: 语言表达准确规范，句式简明，词汇适合小学生认知水平，内容通俗易懂，能用生动比喻或贴近生活的语言解释知识点。高分需体现表达生动、易于理解且无专业术语。
  format_mode: prompt
