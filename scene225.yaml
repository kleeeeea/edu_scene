tasks:
  mode: iter
  content:
  - question: 我是江苏苏北小镇的初二地理兴趣小组成员，最近我们地理竞赛要分析农业和工业的区位因素。我对家乡的农业和工业园发展很感兴趣，但区位因素总觉得很抽象。你作为地理竞赛辅导老师，能不能系统地讲讲影响农业和工业区位选择的主要因素、它们之间有什么不同？结合我们苏北实际举例说明，我想深入了解。
  - question: 你作为初中地理老师，我是湖南农村的初三学生，最近复习地理时对农业和工业区位的区别有点迷糊，尤其交通影响工业区位这一点没太明白。能不能简短回答下，农业和工业区位分别受哪些主要因素影响？
  - question: 我是青岛初二学生，喜欢画地图和种花。最近和爸爸讨论家乡工业区和郊区农田布局，发现分布挺有规律，但原因不太懂。你作为我的地理学习顾问，能大概讲讲农业区位和工业区位在实际生活中怎么决定的吗？
  - question: 我是WilliamsLouis，16岁，男，国际学校10年级学生，喜欢摄影、视频剪辑和无人机设计。你作为地理与科技融合的教育顾问，我在地理课上遇到‘农业与工业区位因素分析’这个主题，老师要求结合科技创新和现实案例系统分析。我对技术如何影响区位特别感兴趣，但表达时总没自信。能全面深入地讲讲农业和工业区位选择的主要因素、联系和区别，以及像无人机、智能农业这些科技如何影响现代区位决策吗？结合实际案例和社会价值观帮我分析一下。
  - question: 你作为经验丰富的初中地理老师，我是成都初三学生，喜欢参与社区志愿活动。最近地理课学习农业与工业区位因素分析，老师让我们写一份完整的分析报告，我想结合家乡的农业和新工业区发展实际。请给我一份完整的分析，详细讲讲农业和工业区位选择的主要因素、实际应用、联系与区别，结合成都及周边实际举例说明。
  - question: 你是地理教研组专家，我是梁兆，56岁男老师，喜欢观鸟和家谱编修，教学严谨但对个人价值观话题有点防御。最近给初中生讲农业与工业区位因素时，学生总问实际生活的例子，我觉得教材案例不够贴近。你能解释一下怎么用生动的生活化实例讲清楚农业与工业区位因素吗？
  - question: 我是福建沿海城市的初二女生，家里做食品加工生意，喜欢和爸爸讨论工厂选址和农产品采购。最近地理课学到农业和工业区位分析，发现家庭生意和课本挺有联系。能具体说说农业和工业区位分析有哪些主要因素吗？结合沿海城市实际和生活经验举例说明。
  - question: 你是地理兴趣辅导员，我是河北乡镇初三男生，喜欢骑行和摄影。最近学农业与工业区位分析，老师说要结合实际生活思考。我想知道为什么有些工厂和农田分布在不同地方？帮我理解一下农业和工业区位的决定因素，最好能举例说明。
  - question: 我是贵州山区初二女生，喜欢写作和观察家乡变化。地理课老师让我们分析本地农业和工业区位特点，我发现有的地方既有工厂又有农田，不太理解为什么这样分布。你作为地理学习助手，能详细说说农业和工业区位的主要因素，结合贵州山区实际举例吗？
  - question: 你是初中地理教学专家，我是湖北荆州初三学生，喜欢历史和地理，也喜欢用地图看家乡变化。最近学农业与工业区位因素，老师讲得有点笼统，我想深入理解。你能讲得详细点吗？帮我分析农业和工业区位选择的主要因素、实际应用、联系与区别，结合荆州及周边实际举例说明。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-初中-农业与工业的区位因素分析进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化教学画像适配度_理由
    type: str
    description: 解释个性化教学画像适配度评分的详细理由，引用具体例子。
  - field: 个性化教学画像适配度
    type: float
    description: 评价教学内容是否基于学生的认知水平、兴趣、地域、生活经验等多维画像进行差异化设计，能针对不同学生群体主动调整教学任务、资源和支持方式，不仅允许选择相关案例，还能在任务深度、表达方式等方面体现个性化。
  - field: 格式与指令遵循准确性_理由
    type: str
    description: 解释格式与指令遵循准确性评分的详细理由，引用具体例子。
  - field: 格式与指令遵循准确性
    type: float
    description: 评价教学内容是否严格根据教学指令要求分点、结构清晰、格式规范，涵盖全部指定元素（如分点、案例、图表、小结），并能根据不同任务类型灵活调整结构，避免遗漏、增减或混乱。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 评价教学设计是否采用地理学科认可的科学方法（如探究式、合作学习、情境创设、案例分析等），并能根据内容和学生特点合理组合多种方法，促进学生主动参与、思考和实践，避免单一讲授或形式化操作。
  - field: 知识逻辑性与准确性_理由
    type: str
    description: 解释知识逻辑性与准确性评分的详细理由，引用具体例子。
  - field: 知识逻辑性与准确性
    type: float
    description: 评价内容是否逻辑严密、层次清晰，概念界定准确，推理过程完整，例证贴切，能区分相关/相似概念，并能结合实际进行知识迁移应用，无知识性错误或混淆。
  - field: 模拟真实提问情境能力_理由
    type: str
    description: 解释模拟真实提问情境能力评分的详细理由，引用具体例子。
  - field: 模拟真实提问情境能力
    type: float
    description: 评价教学内容是否能够贴近学生生活，设置真实课堂情境或常见学生问题，并能针对性回应，帮助学生解决实际疑惑，支持学生提出个性化问题并进行探究。
  - field: 激发学生创新思维能力_理由
    type: str
    description: 解释激发学生创新思维能力评分的详细理由，引用具体例子。
  - field: 激发学生创新思维能力
    type: float
    description: 评价教学内容是否通过开放性问题、跨学科联系、未来预测、方案设计等方式，鼓励学生提出新观点、创新方案，激发多角度思考和表达，在任务设计上明确创新要求并给予反馈。
  - field: 案例与应用场景丰富性_理由
    type: str
    description: 解释案例与应用场景丰富性评分的详细理由，引用具体例子。
  - field: 案例与应用场景丰富性
    type: float
    description: 评价教学内容是否结合多个、跨区域或多样化的真实案例和生活应用场景，涵盖不同类型、规模和地区，帮助学生具体理解抽象地理概念，拓展视野并增强学习兴趣，案例能与学生实际产生关联。
  - field: 社会主义核心价值观自然融入度_理由
    type: str
    description: 解释社会主义核心价值观自然融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观自然融入度
    type: float
    description: 评价内容是否能与教学主题有机结合社会主义核心价值观，如绿色发展、劳动精神、集体协作、共同富裕等，表达自然，润物细无声，无生硬灌输，能结合地理案例和学生实际进行价值观引导。
  format_mode: prompt
