tasks:
  mode: iter
  content:
  - question: 我是小学历史兴趣小组的辅导老师，班里的孩子们最近特别爱听历史人物故事，也喜欢通过情景剧和角色扮演来学习。你能详细讲讲怎么设计一个既有趣又能把中华优秀传统文化和核心价值观融进去的历史人物故事会活动吗？最好包括活动流程、历史人物选择、角色扮演、互动环节和评价方式，还能结合具体人物和生活体验，让孩子们在故事会中真正体会到历史人物的精神和家国情怀。我想深入了解。
  - question: 我是57岁的潘菲，是老师，最近觉得上课有些单调，学生也提不起兴趣。我平时喜欢健康饮食和广场舞，广场舞群体里挺受欢迎。你作为历史教育专家，能不能讲讲看，有什么创新方法可以在历史人物故事会里结合学生兴趣和生活实际，让课堂更有活力？最好能举些实际例子和建议。
  - question: 我叫邵峰，高三，喜欢编程和武术。最近我们要办一个历史人物故事会，要求结合现实生活和兴趣创新表达，比如用编程或者武术表演。我在团队合作时有时情绪波动，想知道怎么设计和组织这种活动才能创新又有效，自己也能融入团队。你作为故事会策划专家，能不能全方位地讲解一下，最好从选题、分工、创新表达、团队管理、情绪调节、价值观引领等方面都说说，还能举些具体案例分析吗？
  - question: 我是小学历史老师，准备组织一个全校范围的历史人物故事会，想要一套系统的设计和实施方案。你能系统地讲解一下，包括活动策划、人物遴选、故事编写、师生参与、价值观渗透、成果展示等各个环节吗？希望内容全面深入，还能有理论依据和案例分析。
  - question: 我是南宫凌风，初三学生，喜欢露营和科学实验，还和同学组了实验小组。爸妈是科研人员，平时支持我的兴趣。历史课对我来说有点枯燥，感觉和科学实验没啥关系，记不住故事。你作为历史老师，能不能讲清楚点，怎么把历史人物故事会和我的兴趣结合起来？最好有具体建议和例子。
  - question: 我是小学班主任，准备办历史人物故事会，但有些孩子对历史不感兴趣，总分神。怎么通过故事会活动激发他们兴趣，还能融入传统文化和核心价值观？简短回答下。
  - question: 我是一名小学历史老师，班上有几个学生特别喜欢画画，但对背历史故事不太感兴趣。你觉得在历史人物故事会里怎么结合绘画、手工等艺术活动，让他们更积极参与，还能体会到历史人物精神和传统文化的魅力？能具体说说吗？
  - question: 我是家长，孩子觉得历史人物故事枯燥，没啥共鸣。你作为历史教育顾问，能具体说说怎么通过互动体验、情感引导或者生活化案例，让孩子在故事会里体会人物的情感和责任感，同时自然融入传统文化和核心价值观吗？
  - question: 我是小学历史教研员，想深入了解怎么把中华优秀传统文化和核心价值观自然地融入到历史人物故事会的全过程。能从故事主题设计、活动环节、师生互动、家校协同、评价反馈等方面详细说说，还能举例说明具体做法吗？我想深入了解。
  - question: 我是小学历史老师，想在班级故事会里选一些适合小学生的历史人物，让孩子们体会正义、诚信、爱国这些价值观。你觉得选哪些人物合适？说说主要的理由和人物特点。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 历史-小学-历史人物故事会进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评价教学内容与表达是否充分结合小学生的年龄特点、兴趣、认知基础等画像，针对不同个体/群体调整内容难度、表达方式和活动类型，并根据学生反馈动态优化。高分要求内容和方法明显差异化，能体现学生多样性和发展变化。
  - field: 格式与结构遵循性_理由
    type: str
    description: 解释格式与结构遵循性评分的详细理由，引用具体例子。
  - field: 格式与结构遵循性
    type: float
    description: 评价教学内容是否严格按照规定环节分段（如故事-提问-任务），每一环节目标明确、内容递进，过渡语自然，结构清晰。高分要求所有环节完整出现，顺序合理，逻辑连贯。
  - field: 教学目标契合度_理由
    type: str
    description: 解释教学目标契合度评分的详细理由，引用具体例子。
  - field: 教学目标契合度
    type: float
    description: 评价教学内容和方法是否完整且深入地达成故事会所有核心教学目标，包括：1)人物认知准确深刻；2)兴趣显著激发；3)思辨能力显著提升；4)表达能力明显增强。高分要求每项目标均有具体表现，学生能自我总结收获，低分为仅覆盖部分目标或达成度浅显。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评价教学方法是否符合小学生认知发展规律，采用多样化、体验式、互动性强的方式促进主动参与和深度理解。高分要求方法多样，体验充分，互动频繁，教师根据学生反馈灵活调整方法。
  - field: 互动引导有效性_理由
    type: str
    description: 解释互动引导有效性评分的详细理由，引用具体例子。
  - field: 互动引导有效性
    type: float
    description: 评价互动环节是否包含层次分明、启发性强的开放性问题，能引发学生深入思考和多样表达。高分要求问题递进，能激发群体讨论与个性表达，教师能及时回应和引导，低分为仅有封闭式或机械性提问。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评价教学内容和活动是否鼓励学生创新表达、联想和再创造。高分要求学生能用新颖方式（如漫画、剧本、诗歌、短视频等）表达故事，或提出独特见解，活动能引导学生突破常规思维并展示创意。
  - field: 中华优秀传统文化融合深度_理由
    type: str
    description: 解释中华优秀传统文化融合深度评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化融合深度
    type: float
    description: 评价教学内容是否在故事、讨论、任务等多环节自然、深入地融合中华优秀传统文化元素及社会主义核心价值观，学生能主动体会、理解并表达传统美德，并能联系现实生活践行。高分要求文化元素贯穿全过程，学生能用实例说明并自发表达体会，低分为仅口号式强调或未涉及文化元素。
  - field: 真实互动场景还原度_理由
    type: str
    description: 解释真实互动场景还原度评分的详细理由，引用具体例子。
  - field: 真实互动场景还原度
    type: float
    description: 评价互动环节是否贴近真实小学生在故事会中的兴趣、语言和思维方式，问题与回答具有生活化、趣味性和真实感。高分要求互动语境自然，学生表达自发，教师用儿童化语言回应，内容紧扣学生实际关注点。低分为成人化、书面化交流，问题脱离学生兴趣，缺乏生活体验感。
  format_mode: prompt
