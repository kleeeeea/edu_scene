tasks:
  mode: iter
  content:
  - question: 我是BrownAlbert，一名52岁的男教师，喜欢诗歌、族谱研究和晒太阳。我的职业观很看重头衔和成就，也希望获得家长认可，平时在工作中注重纪律和进步，但和学生、同事的情感交流总感觉有些隔阂。我想在高中德育课上培养学生的志愿精神，让他们能思考如何参与未来世界的构建。你作为教育专家，能结合我的性格、兴趣，比如用诗歌或者故事，帮我设计一些切实可行的启发方式吗？也希望你能顺带给我建议，怎么克服自己同理心不足的问题，更好地与学生连接。讲讲看。
  - question: 我是MooreAlbert，12岁，六年级学生，喜欢探索自然和弹钢琴，情绪比较稳定，但注意力有时会不集中。我很重视归属感，经常会在小组活动中做出一些妥协。你作为成长导师，能不能帮我说说，像我这样的人可以通过志愿服务为未来世界做出哪些贡献？结合我的兴趣和性格，概括一下。
  - question: 我是GarciaGrace，54岁的女教师，喜欢冥想和写作，在工作中会有选择性地和人交往，习惯认真倾听但表达比较克制，私下比较喜欢独处。你作为教育专家，能帮我详细说说，在高中班级里，像我这种更注重个人空间和边界的老师，怎样有针对性地培养学生的志愿精神？最好结合我的性格和习惯，举点例子讲清楚点。
  - question: 我是李舒菁，42岁的女老师，爱园艺、健身和打乒乓球，在教师圈里很活跃，跨学科能力和同理心都不错，但有时候表达条理会模糊。你作为教育专家，能不能帮我全面系统地分析一下，在高中德育课里，如何科学地培养学生的志愿精神，并引导他们积极思考未来世界的构建？希望你能从理论、课程、活动、跨学科融合、价值观引导等各个角度详细分析下各个方面，结合真实案例和互动方式，给出有温度又实际的建议。详细分析下各个方面。
  - question: 你作为教育专家，能不能从德育美育理论、实践活动、课程创新、学科融合、师生互动、社会责任和传统美德等各个角度详细说说，在高中阶段怎样系统培养学生的志愿精神，并帮助他们理解未来世界的构建？希望你的回答全面深入，从各个角度详细说说。
  - question: 我是高中德育老师，你作为德育美育课程专家，能不能帮我全面分析一下，怎么在课程中科学有效地融合志愿精神，让各种性格和兴趣的学生都能积极参与，并在活动中思考自己与未来世界的关系？请全面分析一下。
  - question: 我是高三学生，班里最近组织了关于未来世界构建的志愿服务活动，但大家参与度不高。我性格比较内向，喜欢画画和科幻小说，平时不太主动发言。你作为成长导师，能不能详细说说，像我这种性格的学生，应该怎么克服参与障碍，主动投入到志愿服务中，同时思考自己如何在未来世界发挥作用？详细说说。
  - question: 我是高一学生的家长，我儿子性格阳光但有点怕吃亏，喜欢篮球和摄影。最近学校开展志愿服务和未来世界主题活动，我担心他只是为朋友或者面子参与，没真正理解志愿精神。你作为教育专家，能不能简要说明下，怎样引导这类孩子真正理解志愿精神的内涵，让他在活动中实现成长？简要说明下。
  - question: 你作为高中德育课程专家，能不能详细展开说说，怎么通过志愿服务活动让学生理解个人责任、社会价值和未来世界的构建？希望你能结合具体案例、理论和实践方法，给出有温度又有启发性的建议。详细展开说说。
  - question: 我是储鑫，39岁男老师，喜欢钓鱼、攀岩和国际象棋，性格比较防备，逻辑性一般，平时跟同事保持距离，喜欢独自去户外运动。你作为教育专家，能不能结合我的性格和兴趣，具体说说在高中德育课上该怎么设计适合自己的志愿精神培养方案，让学生们主动思考未来世界的构建？能具体说说吗？
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 德育美育-高中-志愿精神与未来世界的构建（德育）进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评价教学内容与建议是否基于学生的兴趣、能力、成长阶段及独特需求，能否识别和动态响应学生的多样性和变化。高分要求能针对小组或个体精准调整内容、方式和支持措施，体现对学生成长轨迹的持续关注和优化。
  - field: 格式与指令遵循性_理由
    type: str
    description: 解释格式与指令遵循性评分的详细理由，引用具体例子。
  - field: 格式与指令遵循性
    type: float
    description: 评价答复是否严格遵守任务指令，结构层次分明，逻辑严密，表达清晰易懂。高分要求不仅无明显结构缺陷，还能通过层级分条、突出重点、用词准确，便于高中生快速理解和应用。
  - field: 教学目标契合度_理由
    type: str
    description: 解释教学目标契合度评分的详细理由，引用具体例子。
  - field: 教学目标契合度
    type: float
    description: 评价内容与高中德育目标及志愿精神的紧密程度。高分要求内容深入聚焦品格养成、社会责任、未来社会公民素养等核心目标，能结合学生实际、国家需求与社会趋势，层层递进，启发学生深度思考个人成长与社会发展的关系。
  - field: 教学方法科学性与创新性_理由
    type: str
    description: 解释教学方法科学性与创新性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与创新性
    type: float
    description: 评价教学方法是否系统、基于教育学原理，兼顾理论与实践，能促进学生主动探究、深度体验和反思成长。高分要求方法多样、创新且适配学生特性，有效融合项目式学习、情境模拟等，避免机械灌输和单一模式。
  - field: 互动与启发性_理由
    type: str
    description: 解释互动与启发性评分的详细理由，引用具体例子。
  - field: 互动与启发性
    type: float
    description: 评价课堂互动设计的多样性和深度。高分要求设置多元、真实、层次丰富的互动环节（如情景模拟、辩论、角色扮演等），能激发学生主动表达、合作与深度思考，互动能引发持续探究与情感共鸣。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评价教学能否积极引导学生探索新颖观点、独特方案或创新实践。高分要求鼓励学生跨学科、多角度思考，提出原创性见解或服务模式，并有机会展示、论证和完善创新方案。
  - field: 价值观自然融入度_理由
    type: str
    description: 解释价值观自然融入度评分的详细理由，引用具体例子。
  - field: 价值观自然融入度
    type: float
    description: 评价社会主义核心价值观及中华优秀传统文化在教学中的融入方式。高分要求通过真实情境、故事化、体验式活动等，使价值观在具体体验和情感共鸣中自然内化，避免口号化、形式主义。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 评价课堂提问是否贴近高中生真实成长场景、心理困惑和生活体验。高分要求问题具体、真实，能引发学生自我反思和实际共鸣，促进解决实际问题和成长困惑。
  format_mode: prompt
