agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为生物-小学-古生物知识与趣味科普教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是小学三年级的学生，最近老师在生物课上介绍了恐龙和古生物，我对它们很感兴趣，但还不知道它们为什么会灭绝。你作为科学教育专家，能说说主要的恐龙灭绝的原因吗？说说主要的
  - question: 我是五年级学生，最近在古生物兴趣小组里听到老师讲到化石是研究远古生命的重要证据，但我还是不太明白化石到底是怎么形成的，以及科学家是如何通过化石了解古生物生活的。你能解释一下吗？能解释一下吗
  - question: 你作为我的学习助手，我叫贾逸腾，今年10岁，是五年级的男生。我平时喜欢街舞、机器人搭建和国际象棋，性格上边界感比较明确。我的社交圈子主要是在街舞培训班、机器人俱乐部和象棋兴趣班，和大家都很友好。我最近在生物课上学到有些古生物拥有很奇特的身体结构，比如三叶虫的分节身体、恐龙的巨大尾巴，还有猛犸象的长毛，这些结构对它们有什么特别的作用吗？帮我理解一下。帮我理解一下
  - question: 我是小学科学老师，班里孩子们对古生物特别感兴趣，经常在课下讨论恐龙、猛犸象和史前海洋生物，也会问我怎么才能自己动手做“化石”。你作为科普教育专家，能全面深入地讲讲如何在小学阶段系统开展古生物趣味科普吗？能全面深入地讲讲吗
  - question: 我是一名四年级家长，孩子对恐龙和远古生物非常感兴趣，常常喜欢在家画恐龙、做恐龙模型。我希望能引导他通过游戏和动手活动进一步激发科学探索的兴趣。你作为科普专家，能不能深入说说看有哪些适合家庭开展的古生物趣味活动，并且如何在这些活动中融入科学知识和积极价值观？深入说说看
  - question: 我是小学五年级的学生，最近在班级里参加了古生物知识竞赛，但是我发现有些同学总是能记得很多恐龙的名字和特点，而我记得很慢。你是我的学习助手，可以帮我理解一下，有没有什么好方法可以帮助记忆古生物的种类和特征，同时能让学习变得更有趣？帮我理解一下
  - question: 我是小学科学老师，班里很多孩子对恐龙、海洋古生物和史前植物都很感兴趣，经常提出各种问题，比如“恐龙真的都很大吗？”、“古生物是怎么演化的？”你作为科普专家，能讲得详细点吗，如何在课堂上设计趣味化、互动性的古生物知识教学活动，让学生既能学到知识又能提升科学探索的能力？能讲得详细点吗
  - question: 我是潘百捷，今年15岁，是初三男生。我喜欢电子竞技（MOBA/策略类）、无人机操控和轮滑，但有时候学习会拖延，父母挺担心的。我最近在生物课上学到关于恐龙灭绝的知识，但还是不太明白恐龙灭绝和地球环境变化之间的关系。你能简单说说就行？简单说说就行
  - question: 我是林妮，17岁，高二女生，喜欢3D建模、环保实践和戏剧表演，团队依赖型，综合能力比较均衡。平时在建模社团和环保组织里很活跃，也喜欢和同龄人分享创意成果。我最近在生物课上想深入了解一下古生物对现代生态系统有哪些影响，比如它们的演化和灭绝对现在的动植物、环境有什么启发？你能具体说说吗？能具体说说吗
  - question: 我叫裘菲曼，今年11岁，是五年级女生，喜欢田径和羽毛球。性格上有逃避倾向，理想主义，逻辑性强，持续专注，分析力也不错。我在田径队里经常独自练习，遇到训练困难会用逻辑分析动作要领，羽毛球双打时习惯听教练安排，不主动与搭档交流战术。最近生物课老师讲到恐龙和古生物的进化历程，我特别想知道科学家是怎么一步步研究出这些知识的，以及古生物学研究有哪些主要方法和挑战。你作为科普专家，能不能彻底说清楚？彻底说清楚
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 生物-小学-古生物知识与趣味科普进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 评价回答是否针对学生的年龄、兴趣、学习基础、表达习惯进行个性化调整。高分要求主动识别并回应学生个体差异，表达方式、难度和互动均充分适应学生实际，展现关怀和理解。
  - field: 格式与指令遵循度_理由
    type: str
    description: 解释格式与指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与指令遵循度
    type: float
    description: 评价回答是否严格遵循题目或系统的格式要求（如分段、列点、用词规范）。高分需内容层次分明，语言简明易懂，结构清晰，便于小学生理解和操作。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评价教学方法是否符合小学生认知发展规律，善用类比、故事、互动、图示等多样化方式。高分需多方法结合，兼顾不同学习风格，有效激发兴趣和促进理解。
  - field: 科学内容准确性与拓展性_理由
    type: str
    description: 解释科学内容准确性与拓展性评分的详细理由，引用具体例子。
  - field: 科学内容准确性与拓展性
    type: float
    description: 评价古生物知识是否科学、准确，且能适度拓展相关内容或纠正常见误区。高分需无事实错误，并能补充有趣、科学的细节，或澄清常见误解，拓展内容应具备趣味性和关联性。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评价回答是否通过开放性问题、探究活动、想象力挑战等方式，鼓励学生主动思考、提出新观点或创作。高分需持续激发学生创新与表达欲望，促进主动探索和表达。
  - field: 模拟真实提问还原度_理由
    type: str
    description: 解释模拟真实提问还原度评分的详细理由，引用具体例子。
  - field: 模拟真实提问还原度
    type: float
    description: 评价互动或提问是否贴近小学生真实兴趣、认知水平和表达习惯。高分需准确捕捉小学生常见疑问，内容生动、有亲和力，避免成人化、机械化表达。
  - field: 社会主义核心价值观润化_理由
    type: str
    description: 解释社会主义核心价值观润化评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观润化
    type: float
    description: 评价内容是否自然融入社会主义核心价值观，如科学精神、团结协作、尊重自然等。高分要求内容表达自然、贴合情境，能潜移默化地传递正确价值观，而非生硬灌输。
  - field: 中华优秀传统文化渗透_理由
    type: str
    description: 解释中华优秀传统文化渗透评分的详细理由，引用具体例子。
  - field: 中华优秀传统文化渗透
    type: float
    description: 评价内容是否结合中国传统文化元素，适度引入成语、典故或历史故事，增加文化亲和力。高分需自然融合主题，表达贴切，能帮助学生认识传统文化与科学的联系。
  format_mode: prompt
