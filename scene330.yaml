    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为体育-高中-运动后恢复与营养补充知识教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是初一女生，叫白梦璐，13岁，平时喜欢美妆、钢琴和科学实验，运动课后总觉得很累，但我一般都靠妈妈和老师安排，自己不太主动。你作为营养专家，能说说针对我这种情况，运动后恢复和营养补充应该怎么做吗？说说你的看法。
  - question: 我是高二男生，最近在备战校篮球队的选拔，每次训练后小腿都特别酸，恢复得比队友慢。我平时喜欢吃肉不爱吃蔬菜，担心影响恢复。你作为体育健康顾问，能具体说说我运动后应该怎么科学恢复和补充营养吗？能具体说说吗？
  - question: 我是高三女生，要参加体育特长生考试，训练强度很大，课后腿总疼，恢复很慢。饮食也比较清淡，怕胖不敢吃太多蛋白质。你作为健康营养专家，用几句话说说我运动后恢复和营养补充该注意什么，主要说说关键点。
  - question: 我是高中体育老师，带高一新生班做足球训练，班里有女生，体力和恢复能力不一样，还有些同学偏食，比如不爱吃蔬菜，喜欢喝高糖饮料。我想帮大家科学恢复，减少损伤，还希望他们能主动记录和分享运动后的饮食和感受。你作为营养专家，能不能深入说说看针对这些情况该怎么做？包括具体指导、创新教学方法和活动建议，讲详细点。
  - question: 我是高三班主任，班里有体育特长生和普通学生，最近备考体育，训练强度很大。有些同学疲劳、注意力不集中、恢复慢，还有男生不爱吃蔬菜、女生怕胖饮食不均衡。我希望你作为体育健康顾问，详细分析下各个方面，怎么提升学生运动后恢复和整体健康，越全面越好。
  - question: 我是高二学生，最近参加田径集训，训练量大，恢复慢还容易拉伤。我平时吃主食多，很少吃蛋白质，家里条件一般，爸妈工作忙，餐食也没法特别准备。你作为营养专家，能不能详细展开说说针对我这种情况运动后恢复和营养补充应该怎么做？多讲点实际操作和案例分析吧。
  - question: 我是57岁的律师贺其，平时喜欢打高尔夫球，也爱和商界朋友交流。打完球有时候就吃高热量餐点，没怎么关注身体恢复。你作为营养顾问，大概讲讲我运动后科学恢复和营养补充应该注意什么，主要说说关键点。
  - question: 我是高中体育教研组组长，想设计全校运动后恢复和营养补充的教学方案，提升学生健康水平。我们学校学生情况很复杂，有体育特长生、普通体育生，还有慢性病、偏食、饮食失调的同学。你作为体育健康顾问，从各个角度详细说说运动后恢复和营养补充方案，内容越全面越好，建议也要具体。
  - question: 我是高一女生，刚加入田径队，每天训练后身体很累，恢复也慢。我的饮食是早饭吃得少，中午晚上主食多，很少吃水果和蛋白质。你作为营养专家，能具体说说我运动后恢复和营养补充要怎么调整吗？最好举些实际例子。
  - question: 我是体育老师，最近高二班有几个男生训练后总喊腿疼，恢复慢，还喜欢吃零食、甜饮料，正餐都不爱吃。你作为健康顾问，能具体说说运动后恢复和营养补充该怎么安排？最好讲讲实际操作和团队活动的办法。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 体育-高中-运动后恢复与营养补充知识进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与回应_理由
    type: str
    description: 解释个性化画像识别与回应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与回应
    type: float
    description: 评价回答是否能深入识别学生的多维个体特征（如运动类型、体质、性别、训练目标、健康状况、饮食习惯等），并针对不同画像动态调整建议，能够体现持续关注和精细化定制，非仅表面区分。高分需展现对个体变化（如训练进展、特殊时期、文化背景等）的持续响应能力。
  - field: 指令格式遵循度_理由
    type: str
    description: 解释指令格式遵循度评分的详细理由，引用具体例子。
  - field: 指令格式遵循度
    type: float
    description: 评价回答是否严格遵循教师或题目要求，内容分层分点、小标题明确、逻辑顺序合理、结构完整。高分需展现内容条理清晰、层次分明，涵盖全部要素且有创新性表达，避免遗漏、混乱或简单堆砌。
  - field: 科学性与专业性_理由
    type: str
    description: 解释科学性与专业性评分的详细理由，引用具体例子。
  - field: 科学性与专业性
    type: float
    description: 评价答案是否基于最新运动营养科学原理、权威指南和数据，内容准确、符合当前共识，并能结合实际案例/数据说明原理。高分需有权威来源（如2023年中国营养学会、国际运动营养学会）支撑，并能解释科学依据及其实际意义，避免过时信息或无根据建议。
  - field: 教学方法多样性_理由
    type: str
    description: 解释教学方法多样性评分的详细理由，引用具体例子。
  - field: 教学方法多样性
    type: float
    description: 评价是否采用多样化教学方法（如案例分析、小组讨论、情境模拟、角色扮演、数据记录、实际操作、线上互动等），促进学生主动参与、深度理解与实际应用。高分需多方法组合，活动设计新颖，能调动大多数学生积极性，非仅单一讲授或表面化互动。
  - field: 创新思维激发_理由
    type: str
    description: 解释创新思维激发评分的详细理由，引用具体例子。
  - field: 创新思维激发
    type: float
    description: 评价是否鼓励学生提出新观点、设计个性化恢复与饮食方案，探索多样食材或方法，进行自我反思与改进。高分需有具体创新活动或任务，激发学生创造力和批判性思维，支持开放探索和多样表达，非仅照搬老师建议。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 评价问题或场景是否贴近高中生体育课实际困惑与需求，语言自然具体，能反映学生多样化关注点（如体能、营养、恢复效率、特殊体质等）。高分需体现真实场景、复杂性和多样性，避免空泛或与实际脱节。
  - field: 价值观融入自然度_理由
    type: str
    description: 解释价值观融入自然度评分的详细理由，引用具体例子。
  - field: 价值观融入自然度
    type: float
    description: 评价答案是否在运动恢复与营养讨论中自然融入社会主义核心价值观与中华优秀传统文化（如团队协作、健康生活、勤俭节约、自律自强等），并与教学内容深度融合，能引发学生共鸣。高分需实现价值观与知识有机结合，语言自然贴切，无生硬灌输。
  - field: 安全与健康风险提示_理由
    type: str
    description: 解释安全与健康风险提示评分的详细理由，引用具体例子。
  - field: 安全与健康风险提示
    type: float
    description: 评价答案是否系统提示运动后恢复过程中的健康风险（如饮食不当、补水不当、补剂误用、食物过敏、特殊疾病等），并给出科学预防建议。高分需涵盖常见与易被忽视的风险，体现专业关怀和现实责任感，非仅形式性提示。
  format_mode: prompt
