    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为地理-高中-大气环流与洋流的形成与影响教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高二学生，最近在学地理时总觉得大气环流和洋流的形成机制很难理解，尤其是它们之间的联系和对中国气候的影响让我很困惑。你能结合生活实例，用具体、生动的方式说说大气环流和洋流的形成原因、相互作用以及它们对中国气候和环境的影响吗？能具体说说吗？
  - question: 你作为地理学科带头人，我是一名刚入职的高中地理老师，最近班里学生对大气环流和洋流的形成及其影响兴趣不高，也理解得很吃力。能不能系统分析一下大气环流和洋流的形成过程、二者的互动、对全球和中国气候的作用？最好结合教学案例、生活实例和互动活动，给我一些提升学生兴趣和理解的建议。我想深入了解。
  - question: 我是地理兴趣小组的成员，喜欢观察天气变化，但还是不太明白大气环流怎么影响洋流的形成，以及它们为什么对我国沿海气候有那么大作用。你能结合实际例子解释一下大气环流和洋流的关系，还有它们对中国沿海气候的具体影响吗？能解释一下吗？
  - question: 我是高一学生，地理成绩一般，老师讲了大气环流和洋流的基本概念，但我还是不清楚它们的主要影响。你能说说大气环流和洋流对中国气候和环境的主要影响吗？说说主要的。
  - question: 我是地理教研员，最近在组织高中生的地理综合素养提升项目，主题是‘大气环流与洋流的形成与影响’。你能给我一份完整的分析，系统讲讲大气环流和洋流的形成机制、全球分布、相互作用、对气候和生态环境的深远影响吗？最好结合中国实际，提出创新型教学设计和项目式学习建议，还能自然融入环境保护和可持续发展的价值观。给我一份完整的分析。
  - question: 我是高一学生家长，我孩子对地理课没什么兴趣，尤其学大气环流和洋流时总觉得难懂，也不明白这些知识和生活有什么关系。你能结合青少年的兴趣和生活中的例子，解释一下大气环流和洋流的形成机制，以及它们对我们的日常生活和环境有什么影响吗？能解释一下吗？
  - question: 我是高二学生，地理成绩还可以，最近在复习大气环流和洋流的内容，老师希望我们能简明扼要地总结这些知识点。你能概括一下大气环流和洋流是怎么形成的，以及它们在气候调节中的主要作用吗？概括一下。
  - question: 我是新手地理老师，发现学生在理解大气环流和洋流的互动过程时容易混淆概念，特别不容易把握它们的联系和区别。你能结合教学实际解释一下大气环流和洋流的互动过程吗？最好说说怎样设计课堂活动帮助学生理解。能解释一下吗？
  - question: 我是高三学生，准备参加地理竞赛，希望能更深入地理解大气环流和洋流的形成机制、相互作用，以及它们对全球不同地区气候的综合影响。你能详细分析下各个方面吗？最好全面系统地讲讲形成原理、相互关系、对气候和环境的多方面影响，结合中国实际和现实案例，还能给我一些自主学习和研究的建议。详细分析下各个方面。
  - question: 我是一名地理骨干老师，最近在备课时想梳理大气环流和洋流的形成机制、相互作用，以及它们对中国和全球气候的影响，特别希望能结合环境保护和可持续发展的价值观做教学设计。你能全面分析一下相关知识，并给我一些创新的教学活动和方法建议吗？全面分析一下。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-高中-大气环流与洋流的形成与影响进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像匹配度_理由
    type: str
    description: 解释个性化画像匹配度评分的详细理由，引用具体例子。
  - field: 个性化画像匹配度
    type: float
    description: 评估内容是否根据学生的学习水平、兴趣、知识基础等个性画像进行差异化设计。高分需体现对学生个体差异的精准识别与响应，内容难度、案例、资源等需与学生实际需求高度匹配。低分为完全统一化设计，无视学生差异，导致部分学生难以理解或参与。
  - field: 格式指令遵循度_理由
    type: str
    description: 解释格式指令遵循度评分的详细理由，引用具体例子。
  - field: 格式指令遵循度
    type: float
    description: 评估内容是否严格按照教师或题目规定的格式要求（如分点、图文结合、案例分析等）进行组织。高分要求结构清晰、分点明确，并配有合理的辅助材料（示意图、数据表、案例等）。低分表现为结构混乱、缺乏必要辅助材料，难以有效传达知识。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估是否采用科学、现代的教学方法（如探究式、启发式、情境模拟、合作学习等），鼓励学生参与、思考和互动。高分需包含明确的互动环节、自主探究任务或情境模拟，促进知识迁移和深度学习。低分表现为仅罗列知识点，缺乏任何探究、互动或启发设计，学生被动接受。
  - field: 知识结构准确性与逻辑性_理由
    type: str
    description: 解释知识结构准确性与逻辑性评分的详细理由，引用具体例子。
  - field: 知识结构准确性与逻辑性
    type: float
    description: 评估内容是否科学准确、结构清晰、逻辑严密，完整展现大气环流与洋流的形成机制及相互关系。高分需包含科学拓展、前沿研究引用、常见误区澄清及批判性分析。低分为概念混乱、存在科学性错误或仅简单罗列基础知识。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评估内容是否通过开放性问题、设问、任务驱动等方式激发学生创新思考和独立探索能力。高分要求引导学生提出新见解、跨学科思考或设计原创方案。低分仅要求机械记忆或复述课本内容，无任何创新性或开放性引导。
  - field: 真实提问模拟度_理由
    type: str
    description: 解释真实提问模拟度评分的详细理由，引用具体例子。
  - field: 真实提问模拟度
    type: float
    description: 评估内容或问题设置是否贴近真实课堂情境，反映学生在学习过程中可能产生的真实疑问、困惑或兴趣点。高分包括多层次问题和生活化情境，涉及学生实际关注。低分为机械、与实际无关的问题，难以激发真实互动。
  - field: 价值观自然融入度_理由
    type: str
    description: 解释价值观自然融入度评分的详细理由，引用具体例子。
  - field: 价值观自然融入度
    type: float
    description: 评估内容是否在科学知识讲解过程中，自然融入社会主义核心价值观及中华优秀传统文化，引导学生形成科学精神和社会责任感。高分需结合实际案例与价值观，表达自然、润物细无声。低分为完全忽略价值观或生硬灌输，影响教学自然性。
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 评估内容是否针对学生特定兴趣、学习障碍或发展需求，提出具体帮助建议、个性化拓展或学习资源。高分需包括多层次的针对性补充，如兴趣拓展、学习障碍支持、资源推荐等，并针对不同学生提供差异化发展建议。低分为仅给出统一答案，无任何个性化支持。
  format_mode: prompt
