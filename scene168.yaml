- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我叫夏政，今年17岁，是高二男生，喜欢数字绘画、摄影和视频剪辑，也爱玩数独。性格内向敏感，艺术创作是我主要的社交方式。做英语完形填空和短文改错时总是容易分心，也容易因为焦虑做题不专心。我的学习方式偏理性，但有时候会模仿别人的解题思路。你能针对我这种情况，系统讲讲初中英语完形填空和短文改错的高效解题技巧吗？最好能结合我容易分心、焦虑和喜欢数字、艺术这些特点，给出具体建议和实际案例，怎么在学习中减少焦虑、提升专注力，还能找到成就感和乐趣？能深入讲解一下吗
  - question: 我是初中英语老师，最近在备课时发现学生做完形填空和短文改错时，理解能力、语法水平、细节把握和时间分配都很不一样。有学霸，也有基础弱、缺乏自信的学生，还有对英语没兴趣的。我想让你帮我系统全面分析一下初中完形填空和短文改错的教学策略、分层辅导方法、学科交叉的创新做法，以及针对不同类型学生怎么因材施教，整体提升学习效果。最好结合实际教学案例、最新教育理念和工具，从课堂设计、课后练习、心理激励、家校协同等多个角度提建议。详细分析下各个方面
  - question: 我叫罗劲，五年级男生，喜欢模型制作、下围棋和武术。做英语短文改错时，我总是只看自己觉得重要的地方，容易忽略整体结构和细节。你能结合我的兴趣和性格，具体讲讲初中英语短文改错题应该怎么做吗？有什么实用技巧能让我更好发现和纠正错误，提高分数？能解释一下吗
  - question: 我是初中英语教研员，想为校内教师团队准备一份关于完形填空和短文改错教学的深度分析报告。能帮我基于当前初中生英语学习的实际，深入剖析下这两种题型的特征、学生常见失误、认知特点、教学难点与突破口、有效策略和创新方法吗？还想知道怎么设计分层、个性化的教学流程。最好结合国内外经验、案例和数据，系统梳理这两个题型对提升学生综合语言能力和思维品质的作用。给我一份完整的分析
  - question: 我是初中生，最近做完形填空和短文改错总觉得抓不住重点，容易丢分。你能用几句话说说做这两种题有什么核心技巧和注意事项吗？
  - question: 我叫邵沛钰，32岁，是初中英语老师，平时喜欢自然观察、弹钢琴和美妆，也经常组织跨学科教研活动。我的教学风格比较开放，喜欢接纳各种反馈，但有时会理想化课堂效果。最近我发现学生在完形填空和短文改错中经常理解不到位，语法和逻辑分析能力提升不快。你能结合我的跨学科兴趣和教学风格，分析下怎么用多元和创新的方式提升学生在这两类题型上的理解和分析能力吗？帮我理解一下
  - question: 我是初中英语老师，班里的学生做完形填空和短文改错时老是卡在同一个地方，反复出错。你能详细讲讲，针对这类思维定势明显、总犯同样错误的学生，有哪些有效的训练方法和具体指导策略吗？希望有实际操作步骤和案例，讲讲看
  - question: 我是初一女生的家长，女儿英语基础一般，做完形填空和短文改错总是丢分，有点怕做错，也不太敢问老师。你能简短回答下，家长在这方面怎么帮孩子提升能力？
  - question: 我是初二学生，英语成绩还行，但做完形填空和短文改错有时候会碰到生词、长句或者容易混淆的语法点，经常因此丢分。你能说说你的看法吗？遇到这些难点时，有没有实用的技巧和思路能帮我快速找到问题并做出正确选择？最好能结合具体例子详细讲讲
  - question: 我是一名刚转岗到初中英语的老师，之前教小学语文，对英语教学还不太熟。目前班里有几个注意力不集中的学生，做完形填空和短文改错时常常跳读、漏题、专注力不够。你能结合我的情况，深入说说针对注意力不集中的初中生，课堂和课后都该怎么设计活动和练习，帮助他们提升做题专注度和准确率吗？最好能结合小学语文教学的经验，举些具体案例
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-初中-完形填空与短文改错技巧进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评价内容是否深入分析并针对学生的学习基础、兴趣、常见错误和成长目标，体现高度因材施教。需有具体、针对性的策略调整和案例，避免表面化或模板化建议。
  - field: 格式与指令遵循度_理由
    type: str
    description: 解释格式与指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与指令遵循度
    type: float
    description: 评价内容是否严格按照教师或题目指定的格式、步骤表达，且每一环节内容完整、逻辑严谨。仅形式分条但内容遗漏或顺序混乱不得高分，需确保结构与实质内容双重匹配。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评价教学方法是否科学系统，符合教育学原理。需包含目标导入、分层讲解、互动引导、例题演练、即时反馈、总结提升等环节，并根据学生实际认知水平灵活调整。仅机械流程或灌输不得高分。
  - field: 问题模拟真实度_理由
    type: str
    description: 解释问题模拟真实度评分的详细理由，引用具体例子。
  - field: 问题模拟真实度
    type: float
    description: 评价所设问题或情境是否高度贴合初中生在完形填空与短文改错中的实际困惑，包括典型易错点、思维误区及场景复杂度，能真实反映学习难点。表面泛化或脱离实际场景不得高分。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评价内容是否通过开放性引导、鼓励自主探索、创设多元解题思路，激发学生创新思考。需有具体创新任务、对比分析或鼓励学生自创方法，避免机械模仿。
  - field: 反馈与自我提升建议_理由
    type: str
    description: 解释反馈与自我提升建议评分的详细理由，引用具体例子。
  - field: 反馈与自我提升建议
    type: float
    description: 评价内容是否为学生提供针对性、可操作的检测、反思和提升建议，包括错因深度剖析、分类型学习规划及个性化练习推荐，帮助学生持续自主进步。泛泛建议或无错因剖析不得高分。
  - field: 价值观自然融入度_理由
    type: str
    description: 解释价值观自然融入度评分的详细理由，引用具体例子。
  - field: 价值观自然融入度
    type: float
    description: 评价内容是否自然而然将社会主义核心价值观或中华优秀传统文化（如诚信、勤奋、团结协作等）融入学习过程，与实际学习行为紧密结合。应以场景化、生活化方式引导，避免生硬植入或空洞口号。
  - field: 表达清晰易懂度_理由
    type: str
    description: 解释表达清晰易懂度评分的详细理由，引用具体例子。
  - field: 表达清晰易懂度
    type: float
    description: 评价内容语言是否简明、结构清晰，善用生活化例子或类比，便于初中生理解和接受。应避免学术化、复杂句式和生僻表达，确保内容亲切、易于吸收。
  format_mode: prompt
