agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为历史-高中-不同史学观点的对比与评析教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高二文科生，平时挺喜欢看纪录片，但老师上课讲不同史学观点时我总是搞不清它们之间的联系和区别，也不太知道怎么用这些观点去分析历史事件。家里人很支持我学历史，经常一起聊社会热点。你作为历史学导师，能详细讲讲高中阶段常见的史学观点有哪些，它们怎么分析同一个历史事件？最好能结合具体案例说说，也帮我设计点适合我这种喜欢纪录片和家庭讨论的学习建议和互动方法，让我能学会批判性分析和表达自己观点，同时能自然体会到社会主义核心价值观和中华传统文化。详细讲讲吧。
  - question: 我是高三理科班的学生，对历史兴趣一般，平时喜欢打篮球，课余时间和同学主要聊体育新闻。最近老师讲到‘社会史’和‘政治史’的不同观点时我有点迷糊，不太明白这两种史学视角到底差在哪，现实中怎么用。你作为我的学习助手，能解释一下社会史和政治史的主要区别吗？最好能结合体育或社会新闻举例说明，顺便给我点学习建议，让我在有限时间内提高理解力，也能顺带思考下历史和现实、价值观和个人成长的联系。能解释一下吗？
  - question: 我是一名高一女生，喜欢写日记和参加辩论社，但历史成绩总是不理想，尤其分析历史事件时总是只会从一个角度看。家长希望我能学会多角度思考，提高表达和思辨能力。你作为历史教育专家，能具体说说高中历史课上常见的‘唯物史观’和‘英雄史观’到底怎么分析同一个历史事件吗？最好举个例子说明，并结合我喜欢写日记和辩论的兴趣，帮我设计点学习策略和互动活动，让我能练习批判性分析和表达自己的见解，同时也能自然体会到中华传统文化和社会主义核心价值观的现实意义。能具体说说吗？
  - question: 我是孙依依，42岁，女，高中历史老师，最近有点教学倦怠，平时喜欢绘画和打羽毛球，也跟团队里追求职称的同事关系紧密。你作为历史教研员，能说说高中历史教学中常见的史学观点分类和主要对比点吗？最好和教学实际结合一下，也顺便给我点教学激励或自我调适的建议，能自然融入社会主义核心价值观和中华传统文化就更好了。说说主要的。
  - question: 我是高二男生，家里做点小生意，平时喜欢打游戏和看历史小说，但考历史时总是分不清各种史学观点，容易混淆。父母希望我能学会独立思考，不只是死记硬背。你作为历史学导师，能系统地讲解一下高中历史中主要的史学观点吗？最好说说它们的理论基础、发展过程、代表人物、优缺点和现实应用，结合具体案例详细说明。也希望你能针对我喜欢游戏和历史小说的兴趣，帮我设计点互动活动和学习策略，让我能更好地分辨和批判这些观点，同时自然体会到社会主义核心价值观和中华传统文化的意义。系统地讲解一下吧。
  - question: 我是高三女生，性格比较细腻，对历史课有点压力，喜欢和同学一起做手工，家里人对我的学习很宽容。老师最近让我们用不同史学观点评价‘辛亥革命’，我有点不知道怎么写。你作为历史学习助手，能说说‘辛亥革命’在不同史学观点下会怎么被分析吗？最好举个例子说明，也顺便给我点适合我的学习建议和互动方法，让我可以表达自己的看法，并结合社会主义核心价值观和中华传统文化理解历史。说说你的看法吧。
  - question: 我是高一男生，性格开朗但有时做事拖沓，家长希望我能学会系统梳理知识点。平时喜欢看军事纪录片，对历史事件的不同解读很感兴趣。你作为历史学导师，能彻底说清楚高中主要史学观点的逻辑体系、代表事件、分析方法和优缺点吗？最好结合军事纪录片内容举例说明，也帮我设计点促进主动参与的小组讨论和批判性思考活动，让我能自然体会到中华传统文化和社会主义核心价值观的现实意义。彻底说清楚吧。
  - question: 我是高二女生，喜欢文学和摄影，性格温和但思维跳跃，家里人常和我讨论历史和现实的联系。老师最近讲了‘经济史观’，我有点困惑，不太明白它跟‘政治史观’、‘文化史观’到底有什么不同。你作为历史教育专家，能讲清楚点经济史观和其他史学观点的主要区别吗？最好结合文学或摄影的视角举个例子，也给我点适合我的学习建议和互动活动，让我能多角度分析历史事件，同时自然体会到中华传统文化和社会主义核心价值观的现实联系。讲清楚点吧。
  - question: 我是段璎珞，19岁，女，人力资源专员，刚入职公司，喜欢读心理学书、组织团队活动，也在研究人才测评工具。我的职业规划很明确，但筛选信息有点困难，沟通表达比较精准。你作为历史学导师，能详细展开说说在人才管理和团队发展中，能不能借鉴不同史学观点的对比分析方法？最好结合具体案例说明史学方法怎么帮我理解团队历史、成员角色变化和组织文化，也请帮我设计点促进批判性思考和团队互动的活动，同时自然融入社会主义核心价值观和中华传统文化。详细展开说说吧。
  - question: 我是高三男生，喜欢踢足球，性格比较外向，历史成绩一般，家长希望我能学会归纳总结。老师最近让我们用不同史学观点分析‘新中国成立’的意义，我有点没头绪。你作为历史学习助手，能简短回答下‘新中国成立’在不同史学观点下有哪些主要分析方法吗？顺便给我点学习建议和互动方法，自然融入社会主义核心价值观和中华传统文化。简短回答下吧。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 历史-高中-不同史学观点的对比与评析进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 教学内容与活动需基于对学生知识基础、兴趣、认知风格等多维画像的精准识别，实施分层指导和个性化任务，并通过动态反馈支持学生持续成长。评估需关注画像获取方式、分层实施效果及个性化产出质量。
  - field: 格式与结构规范性_理由
    type: str
    description: 解释格式与结构规范性评分的详细理由，引用具体例子。
  - field: 格式与结构规范性
    type: float
    description: 教学答复与活动设计需严格遵循明确结构，层次分明，板块标题、编号、重点突出，便于学生梳理逻辑与查阅内容。评估需关注结构合理性、层次清晰度及视觉规范性。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 教学设计需融合启发式提问、案例分析、小组合作、辩论、角色扮演等多种科学方法，促进学生主动思考与深度参与。评估需关注方法多样性、科学性及实施效果。
  - field: 观点对比与批判性分析深度_理由
    type: str
    description: 解释观点对比与批判性分析深度评分的详细理由，引用具体例子。
  - field: 观点对比与批判性分析深度
    type: float
    description: 需对不同史学观点进行多维度对比（理论基础、方法论、史料运用、现实价值），并引导学生进行批判性分析和独立见解，评价需关注论据丰富性、分析层次和学生产出质量。
  - field: 创新思维激发与开放性引导_理由
    type: str
    description: 解释创新思维激发与开放性引导评分的详细理由，引用具体例子。
  - field: 创新思维激发与开放性引导
    type: float
    description: 通过情境设定、开放性问题、跨学科融合等方式，激发学生创新思考与独立见解，鼓励多元表达和探究。评估需关注任务创新性、学生产出新颖性及开放性讨论深度。
  - field: 真实提问与场景贴合度_理由
    type: str
    description: 解释真实提问与场景贴合度评分的详细理由，引用具体例子。
  - field: 真实提问与场景贴合度
    type: float
    description: 教学内容与答复需紧密结合高中历史课堂实际问题、学生常见疑惑、兴趣点或社会热点，体现真实教学情境。评估关注与学生关切的贴合度及场景真实性。
  - field: 社会主义核心价值观与中华传统文化融入度_理由
    type: str
    description: 解释社会主义核心价值观与中华传统文化融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华传统文化融入度
    type: float
    description: 在史学观点讨论中，需自然、具体地融合社会主义核心价值观与中华优秀传统文化，结合历史内容或情境，帮助学生树立正确价值观。评估关注融合方式的自然性与内容的具体性。
  - field: 知识准确性、权威性与更新性_理由
    type: str
    description: 解释知识准确性、权威性与更新性评分的详细理由，引用具体例子。
  - field: 知识准确性、权威性与更新性
    type: float
    description: 教学内容需准确无误，引用权威教材和学术资料，关注史学研究最新动态，避免陈旧或片面。评估关注核心事实、理论依据及前沿进展。
  - field: 学生参与度与主动性设计_理由
    type: str
    description: 解释学生参与度与主动性设计评分的详细理由，引用具体例子。
  - field: 学生参与度与主动性设计
    type: float
    description: 教学活动需促进学生积极参与（如小组合作、角色扮演、辩论、探究等），关注实际参与度与产出质量，避免学生被动学习。评估需结合学生实际表现与成果。
  - field: 持续改进与反馈机制_理由
    type: str
    description: 解释持续改进与反馈机制评分的详细理由，引用具体例子。
  - field: 持续改进与反馈机制
    type: float
    description: 教学设计需设有系统反馈与持续改进机制，教师能根据学生学习表现和评估结果及时调整内容与方法，支持学生持续进步。评估关注反馈渠道、改进措施及实际效果。
  format_mode: prompt
