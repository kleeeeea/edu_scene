agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为化学-小学-物质形态变化解释教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是四年级的小学生，最近在科学课上学到了物质有三种形态：固体、液体和气体。老师让我们用生活中的例子，比如冰箱里的冰融化成水、水烧开变蒸汽，来解释这些物质形态是怎么互相转变的。我平时喜欢画画和做小实验，性格比较活泼好奇，上课喜欢举手问问题，但有时候老师讲得太抽象我理解不了。你作为小学化学学习助手，能不能从各个角度详细说说物质形态变化的原理、过程、生活中的现象，以及我可以怎么用画画和实验的方法更好地理解？从各个角度详细说说
  - question: 我是一名五年级的学生，最近在家里看到妈妈煮粥的时候，锅盖上有水珠，我很好奇水为什么会变成蒸汽，然后又变成水珠。我的性格比较安静，喜欢观察身边的小变化，对科学很感兴趣但不太敢主动问问题。你作为小学化学教育专家，能具体说说水的形态变化是怎么发生的吗？能具体说说吗
  - question: 我是一名三年级的小学生，最近老师讲了冰块会融化成水，还说水可以变成气体。我喜欢动手做实验，也喜欢问“为什么”，但有时候觉得这些变化很神奇、有点难懂。你是我的科学小助手，我想深入了解冰、水和水蒸气之间是怎么变化的，为什么它们会互相转变？能不能详细讲讲这些过程，还能举一些生活里的例子让我更容易明白？我想深入了解
  - question: 我是六年级的学生，对科学特别感兴趣，喜欢在家做小实验。最近学习了物质的三态变化（固体、液体、气体），但我还是有点疑惑，为什么有的东西加热会变成气体，有的却不会？而且老师说有些物质的变化是可逆的，有些是不可逆的。我性格比较认真，也喜欢整理笔记。你作为小学化学教学顾问，能不能从各个角度详细说说物质三态变化的科学原理、实际例子、哪些变化是可逆的、哪些不是，以及我可以做哪些安全的家庭实验？从各个角度详细说说
  - question: 我是四年级学生的妈妈，我女儿最近学到冰和水的变化，但她觉得很抽象，常常搞不懂为什么冰能变成水，水还能变成蒸汽。她喜欢画画、性格开朗，做作业时容易分心。我希望你作为小学化学学习助手，能具体说说物质形态变化的原理和生活中的例子，还能给出一些适合孩子的理解方法吗？能具体说说吗
  - question: 我是小学科学老师丁月，今年55岁，喜欢太极拳和钢琴，性格有些边界模糊，常常过度投入到学生和家长的家庭事务中，周末也会牺牲个人时间来指导学生学习。我的同事们很欣赏我务实的教学风格，但觉得我工作和生活界限不太清楚。最近我发现学生们在学物质形态变化时容易混淆气体、液体和固体的区别，尤其在冬天结冰、冰箱结霜等实际现象上理解不够透彻。你作为小学化学教育专家，能不能帮我概括一下，怎么用生活实际和简单实验让学生更好理解物质形态变化？概括一下
  - question: 我是一名五年级的小学生，喜欢看科普书和做小实验。最近老师讲了水的三种状态，但我还是不太理解为什么水能变成冰，也能变成水蒸气。我性格有点害羞，喜欢自己动手做实验。你作为小学科学学习助手，能不能详细说说水的三态变化是怎么发生的，还能举一些简单的小实验让我自己试试吗？详细说说
  - question: 我是三年级的小学生，平时喜欢画画和观察天气变化。最近下雨时妈妈说空气里有很多水蒸气，所以才会下雨。我觉得很神奇，水怎么会跑到天上又变成雨水？你作为小学科学老师，能不能讲讲看水在大自然中是怎么变化的，用简单的例子帮我理解水的形态变化吗？讲讲看
  - question: 我是六年级学生，对科学很有兴趣，喜欢用身边的现象来思考问题。最近学习物质形态变化时，老师提到冰箱结霜、冬天结冰、夏天喝冷饮杯子上有水珠，但我还是不太明白这些现象和物质形态变化有什么关系。我性格比较善于提问，也喜欢小组合作讨论。你作为小学化学教育专家，能不能概括一下这些生活现象和物质形态变化之间的联系？概括一下
  - question: 我是小学五年级的学生，喜欢问“为什么”，也爱做小组活动。最近老师讲了物质的三种状态，还让我们观察冰箱、厨房、浴室等地方的物态变化。我觉得有些现象很有趣，比如热水变蒸汽，冷饮杯子上出现水珠，但还不太清楚这些变化背后的科学道理。你作为小学科学学习助手，我想深入了解物质形态变化的原理、过程和生活中的应用，还希望你能推荐一些小组合作实验或活动帮助我们理解。我想深入了解
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 化学-小学-物质形态变化解释进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 评估教师是否深入了解并动态把握每位学生的兴趣、能力、学习风格等个体差异，能持续性地调整教学策略、资源和互动方式，促进每个学生最大程度的发展，而非仅偶尔或表面化体现个性化。
  - field: 指令遵循完整度_理由
    type: str
    description: 解释指令遵循完整度评分的详细理由，引用具体例子。
  - field: 指令遵循完整度
    type: float
    description: 评估教学内容是否系统、细致地落实所有教学指令和任务要求，结构清晰、环节完整，并能根据指令变化进行合理、灵活的调整，体现高度执行力和教学条理性。
  - field: 教学方法科学性与多样性_理由
    type: str
    description: 解释教学方法科学性与多样性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与多样性
    type: float
    description: 评估是否采用多元、科学且适宜的教学方法，如实验探究、情境创设、合作学习、启发式提问等，促进学生主动参与、深度思考和知识迁移，而非仅形式多样、缺乏实质。需关注方法与目标的匹配度和实施深度。
  - field: 知识表达准确性与适龄性_理由
    type: str
    description: 解释知识表达准确性与适龄性评分的详细理由，引用具体例子。
  - field: 知识表达准确性与适龄性
    type: float
    description: 评估化学知识表达是否科学、准确，语言和内容严格贴合小学阶段认知水平，避免术语堆砌、过度抽象或成人化表达，且无科学性错误。需关注知识表达的清晰度和易理解性。
  - field: 激发创新思维能力_理由
    type: str
    description: 解释激发创新思维能力评分的详细理由，引用具体例子。
  - field: 激发创新思维能力
    type: float
    description: 评估教师是否通过开放性提问、鼓励假设、引导学生自主设计实验、反思和表达多样化想法，促进学生主动探索和创造性表达，关注学生的思维过程与创新成果，而非仅停留在表面。
  - field: 生活化与实际关联深度_理由
    type: str
    description: 解释生活化与实际关联深度评分的详细理由，引用具体例子。
  - field: 生活化与实际关联深度
    type: float
    description: 评估化学知识与学生真实生活现象的结合是否深入、具体，能引发学生主动观察和思考生活中的科学问题，推动知识迁移与实际应用，而非仅表面举例或泛泛关联。
  - field: 价值观自然融入与科学精神培养_理由
    type: str
    description: 解释价值观自然融入与科学精神培养评分的详细理由，引用具体例子。
  - field: 价值观自然融入与科学精神培养
    type: float
    description: 评估社会主义核心价值观、中华优秀传统文化和科学精神是否自然融入教学内容与活动，通过具体案例和讨论潜移默化引导学生形成正确价值观和科学态度，关注实际行动和持续影响，而非机械灌输。
  - field: 真实提问场景贴合度_理由
    type: str
    description: 解释真实提问场景贴合度评分的详细理由，引用具体例子。
  - field: 真实提问场景贴合度
    type: float
    description: 评估教师提出的问题和互动是否高度贴合真实小学化学课堂情境，语言自然、易懂，能激发学生好奇心和探究欲望，且具备基础科学性。关注问题设计的层次性和学生参与度。
  format_mode: prompt
