    type: float
    description: 教学中主动设计开放性、跨界性任务，激发学生提出原创性见解、假设并尝试论证。高分需产出具有深度或独特性的学生作品、方案或研究成果，体现创新能力。
  - field: 跨学科融合与实际应用_理由
