  - field: 跨学科融合与实际应用
    type: float
    description: 有效整合物理、生物、化学等多学科知识，促进对地球圈层物质循环与能量交换的整体理解。高分需引导学生将知识应用于分析和解决现实问题，呈现跨学科综合视角和创新应用场景。
  - field: 社会主义核心价值观与中华文化自然融入_理由
    type: str
    description: 解释社会主义核心价值观与中华文化自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华文化自然融入
    type: float
    description: 知识讲解过程中自然融入社会主义核心价值观和中华优秀传统文化，做到润物细无声。高分需将价值观与学科内容深度融合，促进学生形成科学与人文相结合的世界观。
  - field: 真实互动与个别化回应_理由
    type: str
    description: 解释真实互动与个别化回应评分的详细理由，引用具体例子。
  - field: 真实互动与个别化回应
    type: float
    description: 真实还原高中地理课堂师生互动，包括学生主动提问、教师针对性解答、个性化引导。高分需体现多轮互动，教师能针对不同学生提出有针对性的追问、讲解或支持，促进思维深入发展。
  - field: 针对性反馈与持续改进建议_理由
    type: str
    description: 解释针对性反馈与持续改进建议评分的详细理由，引用具体例子。
  - field: 针对性反馈与持续改进建议
    type: float
    description: 能基于学生学习过程中的具体表现，给予个性化、具体、可操作的反馈和提升建议。高分需体现跟踪性反馈，帮助学生制定并落实自我提升计划，支持其形成自我调节能力。
  format_mode: prompt
