tasks:
  mode: iter
  content:
  - question: 我是高一学生，最近地理课讲了地球圈层间的物质循环和能量交换，但我觉得挺抽象的，圈层之间到底怎么相互影响？生活中又有哪些体现？你作为我的地理学习顾问，能具体说说吗？
  - question: Hi, I'm GreenJack, a 15-year-old in 9th grade who loves 3D modeling,
      stargazing, and table tennis. I value teamwork that respects boundaries and
      prefer hands-on, practical learning. You are an Earth science education expert—could
      you systemically explain the material cycles and energy exchanges among Earth's
      spheres, maybe bringing in cross-disciplinary and real-world examples, and suggest
      some collaborative or modeling activities that would fit my interests? System地讲解一下吧。
  - question: 我叫常卫利，今年45岁，做采购专员，平时喜欢户外运动、烹饪和比价，适应力不算强。最近看到孩子的地理课本里讲地球圈层间的物质循环和能量交换，觉得挺有意思，但具体怎么回事不是很懂，跟我们的日常生活和工作有没有关系？你作为地理教育专家，能深入讲解一下吗？最好结合生活实际帮我理解。
  - question: 我是杜云学，48岁老师，平时喜欢打太极拳和登山，教学上比较粗放但愿意听学生反馈。你作为地理教育专家，能说说主要的地球圈层间物质循环和能量交换是哪些吗？我想把握一下课堂重点。
  - question: 你作为地理教研员，正在编写教案，想全面梳理地球圈层间的物质循环与能量交换，包括科学原理、过程、圈层相互作用、跨学科联系、现实意义和教学建议。能详细分析下各个方面吗？我需要系统、全面的内容用于备课。
  - question: 我是高一学生，最近学地球圈层间的物质循环和能量交换，老是把圈层间的物质流动和能量传递搞混，比如水循环和碳循环有什么不同、太阳能量怎么在圈层流动。你作为地理学习助手，能讲得详细点吗？最好举些例子帮我理清思路。
  - question: 我是初三学生，学地球圈层间的物质循环和能量交换，老师说很重要，但我还是有点难理解。你作为地理教育专家，能用几句话说说这个知识点的核心内容吗？
  - question: 我是高二女生，对自然科学挺感兴趣，但地球圈层间的物质循环和能量交换总觉得不好理解，圈层具体怎么相互影响呢？你作为我的地理学习助手，帮我理解一下吧，讲详细点，最好举些例子。
  - question: 我是高一学生，最近复习地球圈层间的物质循环和能量交换，不太清楚这些知识在现实生活中的应用，也想知道它对环境保护和可持续发展有什么意义。你作为地理专家，说说你的看法吧。
  - question: 你作为高中地理教师助理，我是一名基础比较薄弱的高一学生，总是分不清地球圈层间的物质循环和能量交换。能不能帮我讲清楚点？最好举些例子，帮我建立清晰的理解。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 地理-高中-地球圈层间的物质循环与能量交换进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 用户画像精准识别与回应_理由
    type: str
    description: 解释用户画像精准识别与回应评分的详细理由，引用具体例子。
  - field: 用户画像精准识别与回应
    type: float
    description: 能够基于学生的学习基础、兴趣、认知特点等进行差异化教学。高分要求对学生多样化需求有深入洞察，并能动态调整教学策略，提供具体、个性化的学习支持和资源。
  - field: 指令遵循规范性与结构创新_理由
    type: str
    description: 解释指令遵循规范性与结构创新评分的详细理由，引用具体例子。
  - field: 指令遵循规范性与结构创新
    type: float
    description: 严格按照任务指令的结构、格式和要求作答。高分不仅条理清晰、内容完整，还能根据复杂指令灵活创新结构、优化表达，充分展现对指令意图的深刻理解。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 采用多样、科学、契合地理学科和学生认知规律的教学方法。高分需灵活应用探究式、互动式等方法，并能结合理论说明方法选择的科学依据，促进学生深度学习。
  - field: 知识内容准确性与系统性_理由
    type: str
    description: 解释知识内容准确性与系统性评分的详细理由，引用具体例子。
  - field: 知识内容准确性与系统性
    type: float
    description: 内容科学、准确、无知识性错误，系统全面覆盖地球圈层间主要物质循环与能量交换，体现圈层间的复杂联系与动态变化。高分需结合最新学科进展，展现知识整合与深化。
  - field: 创新性思维激发与成果产出_理由
    type: str
    description: 解释创新性思维激发与成果产出评分的详细理由，引用具体例子。
