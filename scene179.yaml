    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为英语-高中-文学翻译的信达雅探讨教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是高二文科班的英语课代表，最近在学文学翻译时老师总说“信达雅”，但我们翻译莎士比亚《哈姆雷特》片段时对‘雅’理解不一样。有同学觉得忠实原文就行，有的追求美的表达。你作为英语翻译顾问，能详细说说‘信达雅’在高中文学翻译里的具体意思和实际应用吗？最好结合我们的作业举个例子，也谈谈怎么平衡这三点，详细说说。
  - question: 我是一名高三学生，喜欢英语文学，但翻译诗歌时总纠结‘信达雅’怎么取舍。最近翻译叶芝的《当你老了》，老师说不能只看字面，要考虑情感和美感。你能解释一下‘信达雅’各是什么意思，在文学翻译里该怎么理解和用吗？能解释一下吗？
  - question: 你作为老师，平时喜欢登山、3D建模和滑板，教学风格比较随意。你在教高中生文学翻译时发现大家对‘信达雅’的标准把握不清，尤其不太懂怎么体现‘雅’的美感。能结合你的兴趣和管理风格，大概讲讲‘信达雅’在英语文学翻译里的主要作用吗？最好举个你喜欢的英文诗歌或文学片段，讲讲怎么用任务驱动或小组合作帮助学生理解这三点，大概讲讲。
  - question: 我是一名高中英语教研员，最近组织文学翻译比赛时发现学生总偏重‘信’，不太重视‘达’和‘雅’。你作为资深翻译专家，能详细展开说说‘信达雅’在文学翻译里的理论逻辑、历史发展和对高中英语教学的意义吗？最好结合朱生豪版《哈姆雷特》、林译《呼啸山庄》这些经典译本分析不同译者如何取舍三点，再给出针对高中阶段如何科学引导学生理解和实践‘信达雅’的详细建议和教学设计方案，详细展开说说。
  - question: 你是一名英语老师，喜欢研究方言、做花艺和做志愿服务，社交方式比较随意、善于倾听。最近在高一文学翻译课上让大家翻译狄金森诗歌，发现学生对‘信达雅’理解比较片面，有的只看字面意思，忽略了美和流畅。你能说说主要的‘信达雅’在高中英语文学翻译教学里的核心作用吗？最好结合你的方言研究或志愿服务经验给个建议，说说主要的。
  - question: 我是高二学生，喜欢读英文小说，但翻译课上总分不清‘信达雅’各自侧重点。比如翻译《了不起的盖茨比》时，有些同学只顾词句准确，忽略原文意境和美感。你能讲讲看‘信达雅’在小说翻译教学里的具体作用和实现方法吗？最好结合课堂活动或资源举例说明，讲讲看。
  - question: 我是一名高一学生，英语基础一般，但很喜欢文学课的翻译环节。最近要翻译《小王子》片段，发现自己总是直译，表达不太美。你作为我的学习助手，能帮我理解一下‘信达雅’各是什么意思吗？翻译《小王子》这种童话文学时怎么才能三点都顾到？帮我理解一下。
  - question: 我是高三班主任，最近带学生做中外文学翻译比较，发现大家对‘信达雅’理解太表面了，不是机械翻译就是华丽但不准确。你作为教育专家，能讲得详细点吗？请分析‘信达雅’在文学翻译中的多维价值，结合实际高中教学案例，详细说说怎么用启发式教学、分组任务、同伴互评等方法提高学生对‘信达雅’的深度理解和应用能力，能讲得详细点吗？
  - question: 我是一名高二英语老师，最近备课时遇到文学翻译的难题，特别是在讲‘信达雅’时，不同学生理解和偏好都不一样。你作为翻译教学专家，能给我一份完整的分析吗？请系统梳理‘信达雅’理论的学术渊源、各自特点和在文学翻译中的现实挑战，结合中外经典译本举例，并说说如何设计分层教学活动帮不同层次的学生更好把握‘信达雅’原则，给我一份完整的分析吧。
  - question: 你作为AI教育专家，面对中文老师崔桐月（46岁，女），她喜欢骑行和健身，性格偏单向输出型、防卫心重，和同事关系表面友好但不常参加集体活动，骑行俱乐部成员对她表达方式有些微词。崔老师最近在高二英语文学翻译课上组织‘信达雅’专题活动，发现学生翻译《简·爱》片段时总偏向某一方面，不能平衡‘信达雅’。你能全方位地讲解一下‘信达雅’在高中英语文学翻译教学里的理论基础、实际运用、常见误区和教学策略吗？结合崔老师个人特点，详细说说怎么借助多元资源、同伴互评、启发式活动和价值观引导，帮助学生提升翻译水平和人文素养，全方位地讲解一下。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-高中-文学翻译的信达雅探讨进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像适配度_理由
    type: str
    description: 解释个性化画像适配度评分的详细理由，引用具体例子。
  - field: 个性化画像适配度
    type: float
    description: 评估教学内容和活动是否根据学生的英语水平、文学兴趣、认知风格等多维画像精准调整。高分要求教师能主动收集、分析并响应学生差异，提供分层任务、个性化示例和多样表达方式，低分则表现为一刀切或忽视差异。
  - field: 格式与指令遵循度_理由
    type: str
    description: 解释格式与指令遵循度评分的详细理由，引用具体例子。
  - field: 格式与指令遵循度
    type: float
    description: 评估内容是否严格按照教学设计或提问要求的结构、流程和格式作答，并能在复杂指令下保持条理清晰、逻辑严密。高分要求创新结构且无遗漏，低分为结构混乱或指令执行不到位。
  - field: 教学方法科学性_理由
    type: str
    description: 解释教学方法科学性评分的详细理由，引用具体例子。
  - field: 教学方法科学性
    type: float
    description: 评估教学方法是否融合差异化教学、探究式学习、同伴互助等教育理论，并针对目标灵活组合多元策略。高分要求方法创新、理论支撑与学生参与度高，低分为单一灌输或无理论基础。
  - field: 理论与实践结合度_理由
    type: str
    description: 解释理论与实践结合度评分的详细理由，引用具体例子。
  - field: 理论与实践结合度
    type: float
    description: 评估‘信达雅’理论讲解与实际翻译操作是否有机融合。高分要求理论阐释与多样实践活动（案例分析、模拟翻译、对比讨论等）深度结合，促进迁移和创新应用，低分为理论与实践脱节或仅停留表面。
  - field: 多样化教学资源利用_理由
    type: str
    description: 解释多样化教学资源利用评分的详细理由，引用具体例子。
  - field: 多样化教学资源利用
    type: float
    description: 评估教学过程中是否整合多种资源（文本、音频、视频、网络、AI工具等），并与教学目标高度契合。高分要求资源创新、跨媒介融合、资源驱动活动设计，低分为资源单一或与目标弱相关。
  - field: 创新思维激发度_理由
    type: str
    description: 解释创新思维激发度评分的详细理由，引用具体例子。
  - field: 创新思维激发度
    type: float
    description: 评估教学是否鼓励学生开放性思考、创新表达，如对比分析、创新翻译、批判性讨论等。高分要求学生能提出新颖观点或作品，课堂氛围鼓励质疑和创意，低分为只追求标准答案或抑制创新。
  - field: 学生主体性体现_理由
    type: str
    description: 解释学生主体性体现评分的详细理由，引用具体例子。
  - field: 学生主体性体现
    type: float
    description: 评估教学活动是否突出学生自主思考、表达和评价。高分要求设计自评、互评、学生主导讨论，学生能主动影响学习内容和节奏，低分为教师主导、学生被动接受。
  - field: 社会主义核心价值观融入度_理由
    type: str
    description: 解释社会主义核心价值观融入度评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观融入度
    type: float
    description: 评估教学是否自然、深入地融合社会主义核心价值观与中华优秀传统文化，促进价值观内化和文化自信。高分要求通过具体案例或任务引导学生思考诚信、创新、责任等价值观与翻译实践的关系，并能激发学生主动探讨相关议题，低分为机械插入口号或完全忽视价值观教育。
  format_mode: prompt
