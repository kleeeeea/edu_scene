agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为政治-小学-认识我们的国旗和国徽教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是五年级的孙依依，十岁，喜欢跳绳、弹尤克里里和练书法，做事有点依赖妈妈的监督。我们班最近要做‘认识我们的国旗和国徽’主题活动，但我对它们的历史和意义不是特别清楚，也想知道怎么结合我的兴趣来参与得更好。你作为我的学习小帮手，能详细讲讲国旗和国徽的由来、它们代表什么，还有适合我这样喜欢书法、弹尤克里里和跳绳的同学的有趣活动或者创意方法吗？详细讲讲吧。
  - question: 我是六年级的梁丘怡，十二岁，男生，平时喜欢武术、跆拳道和VR游戏，自主学习能力比较强，但有时候在理想和现实中摇摆。平常会去武馆训练，和教练、同学关系都不错，就是和爸妈因为玩游戏和学习的事常有矛盾。现在学校要做‘认识我们的国旗和国徽’专题，我想彻底弄明白国旗和国徽的历史、象征意义和背后的故事，还想知道怎么结合武术和VR游戏这样的兴趣让大家更有参与感。你作为学习专家，能帮我彻底说清楚这些内容吗？
  - question: 我是一名小学政治老师，叫夏清欢，四十岁，平时喜欢电影、种菜养花和骑行，教学风格比较保守，但希望班里的‘认识我们的国旗和国徽’活动能更有体验和互动，不只是讲知识。你作为教育内容设计专家，能具体说说有哪些适合小学生的活动设计、课堂互动或者跨学科的方法，让孩子们在了解国旗和国徽的同时还能主动参与、表达和合作吗？能具体说说吗？
  - question: 我是三年级小学生，对国旗和国徽有点好奇，但还不是很懂它们的区别和意义。你能简短回答下，国旗和国徽分别代表什么，它们有什么不同吗？
  - question: 我是兴趣班辅导员，班里有不少低年级孩子，他们对国旗和国徽的故事挺感兴趣，但注意力容易分散。你作为教育专家，能详细说说有哪些适合小朋友的国旗和国徽主题小游戏或者讲故事的活动，让他们能边玩边学、主动表达吗？详细说说吧。
  - question: 我是四年级学生，性格比较内向，喜欢画画和做手工。最近老师让我们小组合作完成国旗和国徽主题的美术作品展示，我有点紧张，不知道怎么表达自己的想法，也担心和同学合作会有矛盾。你作为我的班级小伙伴，能深入讲解一下，有哪些方法可以帮像我这样内向、爱画画的同学更好地参与国旗国徽主题创作，还能学会跟同学沟通和分工吗？能深入讲解一下吗？
  - question: 我是二年级学生，性格很活泼，喜欢讲故事和唱歌。班主任老师说要搞国徽主题的小组活动，但我还不知道怎么参与。你作为我的知识小帮手，能具体说说有哪些适合我这样爱动爱表达的小朋友的国徽主题小组活动吗？能具体说说吗？
  - question: 我是高三的梁月月，性格比较现实，成绩还可以，参加环保活动也是为了升学加分，和家人关系一般，更喜欢跟学霸一起学习。最近政治课复习到国旗和国徽，我对它们的历史和象征意义兴趣不大，但知道可能会考。你作为学习助手，能帮我理解一下国旗和国徽的历史、设计元素和它们现在在社会中的实际作用吗？帮我理解一下。
  - question: 我是四年级学生，喜欢和同学一起玩，老师让我们课余时间说说国旗和国徽的意义。我还不太明白怎么说。你能用几句话说说国旗和国徽为什么重要吗？
  - question: 我是新入职的小学班主任，第一次带国旗和国徽主题的班会课。班上孩子性格和兴趣都不一样，有的爱画画，有的爱运动，还有喜欢表演的。我想让班会课有创意、有趣味，每个孩子都能主动参与，体会到国旗国徽的意义和自豪。你作为教育专家，能从各个角度详细说说怎么设计这样一堂班会课吗？从各个角度详细说说吧。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 政治-小学-认识我们的国旗和国徽进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与响应_理由
    type: str
    description: 解释个性化画像识别与响应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与响应
    type: float
    description: 评估教学是否根据班级内不同学生的年龄、认知水平、兴趣和学习能力，定制差异化支持方案，包括分层任务、个别关注、适应性材料等，并在课堂反馈环节体现对个体差异的真实响应。
  - field: 课堂流程完整性与格式执行_理由
    type: str
    description: 解释课堂流程完整性与格式执行评分的详细理由，引用具体例子。
  - field: 课堂流程完整性与格式执行
    type: float
    description: 评估教学流程是否严格按‘导入-讲解-互动-总结’四环节展开，每环节目标明确、活动具体，环节间过渡自然且无遗漏，能有效引导课堂进程。
  - field: 教学方法科学性与适宜性_理由
    type: str
    description: 解释教学方法科学性与适宜性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与适宜性
    type: float
    description: 评估教学方法是否符合小学生认知发展规律，注重启发式、体验式、参与式教学，能针对学科特点促进主动理解、兴趣激发，避免单一灌输或机械讲解。
  - field: 教学活动设计丰富度_理由
    type: str
    description: 解释教学活动设计丰富度评分的详细理由，引用具体例子。
  - field: 教学活动设计丰富度
    type: float
    description: 评估课堂活动是否涵盖动手操作、思考讨论、表达展示、合作交流等多种学习方式，活动层次递进，能照顾不同能力和兴趣的学生，实现多元参与。
  - field: 课堂互动与真实提问模拟度_理由
    type: str
    description: 解释课堂互动与真实提问模拟度评分的详细理由，引用具体例子。
  - field: 课堂互动与真实提问模拟度
    type: float
    description: 评估师生互动是否自然、频繁，提问内容贴近小学生生活实际，能激发学生自主思考与表达真实观点，避免机械化、标准答案式交流。
  - field: 创造力激发与表达潜力_理由
    type: str
    description: 解释创造力激发与表达潜力评分的详细理由，引用具体例子。
  - field: 创造力激发与表达潜力
    type: float
    description: 评估教学内容与活动是否主动引导学生创新思考，鼓励多样化表达（绘画、讲述、表演等），并通过成果展示让学生体验创造乐趣与成就感。
  - field: 价值观与文化自然融入度_理由
    type: str
    description: 解释价值观与文化自然融入度评分的详细理由，引用具体例子。
  - field: 价值观与文化自然融入度
    type: float
    description: 评估社会主义核心价值观和中华优秀传统文化是否通过真实案例、活动体验、讨论分享等方式自然融入课堂，学生能结合自身体验理解和践行相关价值观，而非机械背诵或口号化。
  - field: 学生参与度与主动性设计_理由
    type: str
    description: 解释学生参与度与主动性设计评分的详细理由，引用具体例子。
  - field: 学生参与度与主动性设计
    type: float
    description: 评估教学是否安排具体、可操作的学生参与环节，如小组讨论、互动游戏、成果展示等，大多数学生能主动参与、表达观点或展示作品，课堂氛围积极开放。
  format_mode: prompt
