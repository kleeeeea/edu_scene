agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为英语-高中-批判性阅读与文本分析教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是一名高二男生，特别喜欢看科幻电影，对英语阅读很感兴趣，但分析文章时总觉得作者的隐含观点不容易发现。你作为批判性思维教练，能简单说说怎么系统地识别和分析这些隐含观点吗？最好结合我喜欢科幻电影的兴趣举个例子。
  - question: 我是高一英语老师，班里很多学生很喜欢历史，但他们读英文历史文章时只看事实，分析作者立场和写作目的不太会。你作为英语教育专家，能简短回答下，怎么引导他们在批判性阅读时抓住这些要点吗？最好结合教学实际说说。
  - question: 我是一名高三女生，喜欢文学和心理学，性格比较细腻。最近老师让我们做英语阅读训练，要求对文本里的人物行为和主题做多角度深入分析。你是学习顾问，能彻底说清楚怎么从结构、主题、人物、文化背景等方面系统分析英文文学作品吗？最好结合我的兴趣讲讲具体方法、案例和成长建议。
  - question: 我是一名高二学生，喜欢看社会新闻，也关心社会议题。最近英语课读了一篇讲环境保护的英文文章，老师让我们分析作者怎么用语言和结构表达观点。你是英语课堂助手，能讲清楚点英文作者在写环境议题时常用哪些写作技巧和结构安排吗？最好和社会新闻类文章对比分析一下。
  - question: 你作为英语批判性阅读专家，能讲得详细点吗？我是冯星回，13岁男生，初一学生，喜欢观星和3D建模打印，是个完美主义者，做事很专注，喜欢和社团、团队一起交流合作。怎么给我设计一份结合天文主题的英语批判性阅读任务，让我能在自主探索和团队协作中提升批判性思维？请详细说说任务设计、文本选择和分析指导，最好结合我的兴趣和性格讲具体点。
  - question: 我是高三英语教师，班里有文科也有理科学生，他们读英文科技报道时只关注技术信息，经常忽略报道的逻辑结构、观点立场和文化差异。你作为英语教育专家，能从各个角度详细说说怎么系统引导高中生批判性分析这些科技报道吗？比如怎么分析结构、观点、逻辑、文化比较和现实联系，最好结合学生兴趣和社会热点举例说明。
  - question: 我是一名高一学生，性格挺外向，平时喜欢看影视剧，很喜欢英语课上的文本分析，但有时候不太会比较不同角色的观点。你是批判性思维教练，能讲讲看在英文小说或剧本里怎么批判性地分析和对比人物的观点和行为吗？能结合影视剧实际案例说明一下？
  - question: 我是高二学生，家里人总希望我在英语阅读时能更有批判性思维，特别是要看懂作者的真实意图和文化差异。你作为学习顾问，能解释一下怎么在英语批判性阅读中识别作者真实意图、理解文化差异吗？最好结合具体文章和家校沟通实际举例说明。
  - question: 我是一名高一学生，喜欢科学，最近读了一篇关于基因编辑的英文文章。老师让我们分析文章的观点、逻辑和背后的伦理价值观。你是批判性思维教练，能讲清楚点怎么批判性分析科学类英文文章的观点、逻辑和伦理价值观吗？最好结合基因编辑这个实际案例说明。
  - question: 我是高三英语老师，班里有几个学生很喜欢社会学和心理学，但他们读英文社会议题类文章时容易陷入单一视角。你作为英语教育专家，能详细展开说说怎么引导他们在批判性阅读时多角度分析文本吗？比如怎么分析观点、社会背景、心理动机和文化价值观，最好结合他们的兴趣举例说明策略和成长建议。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 英语-高中-批判性阅读与文本分析进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像识别与回应_理由
    type: str
    description: 解释个性化画像识别与回应评分的详细理由，引用具体例子。
  - field: 个性化画像识别与回应
    type: float
    description: 评估是否基于学生英语水平、兴趣、成长需求等个体差异，针对性设计阅读任务、反馈和支持措施。需在任务内容、难度、互动方式三个方面均有体现，且能动态调整以适应学生发展。
  - field: 指令遵循与结构规范性_理由
    type: str
    description: 解释指令遵循与结构规范性评分的详细理由，引用具体例子。
  - field: 指令遵循与结构规范性
    type: float
    description: 评估是否严格按照教学任务或提问要求完成，结构明确、层次清晰、内容完整。要求每一环节有清晰标题、逻辑严密的分步阐述，并有过渡衔接。仅形式分步但内容混乱不计为合格。
  - field: 教学方法科学性与专业性_理由
    type: str
    description: 解释教学方法科学性与专业性评分的详细理由，引用具体例子。
  - field: 教学方法科学性与专业性
    type: float
    description: 评估教学设计是否应用系统、科学的批判性阅读与文本分析策略，融合多种理论和方法（如Bloom认知层级、SQ3R、合作学习等），并能灵活运用，促进高阶思维和自主学习。需体现两项及以上科学方法，并有运用说明。
  - field: 文本分析深度与批判性_理由
    type: str
    description: 解释文本分析深度与批判性评分的详细理由，引用具体例子。
  - field: 文本分析深度与批判性
    type: float
    description: 评估是否对文本进行多维度、深入且批判性分析，涵盖结构、主题、作者意图、观点逻辑、文本局限等至少两个维度。要求有具体文本证据支撑分析，并能提出独立见解或反思，避免表面化和套路化。
  - field: 课堂互动与真实语境匹配度_理由
    type: str
    description: 解释课堂互动与真实语境匹配度评分的详细理由，引用具体例子。
  - field: 课堂互动与真实语境匹配度
    type: float
    description: 评估教学内容、语言表达和互动方式是否贴近中国高中真实课堂，符合学生表达习惯和兴趣点。需体现至少一次基于学生实际的话题互动，师生对话自然，能激发学生积极参与。
  - field: 创新思维引导与激发_理由
    type: str
    description: 解释创新思维引导与激发评分的详细理由，引用具体例子。
  - field: 创新思维引导与激发
    type: float
    description: 评估是否通过开放性问题、假设推演、多角度对比等，激发学生创新思考和独立见解。需至少包含一个高阶开放性问题或鼓励学生提出不同观点，避免标准化答案，鼓励多元思维和批判性创新。
  - field: 社会主义核心价值观与中华文化自然融入_理由
    type: str
    description: 解释社会主义核心价值观与中华文化自然融入评分的详细理由，引用具体例子。
  - field: 社会主义核心价值观与中华文化自然融入
    type: float
    description: 评估是否在批判性阅读与分析过程中，将社会主义核心价值观与中华优秀传统文化有机、自然地融入教学，体现诚信、责任、合作等价值观，并与文本内容或讨论环节紧密结合，避免生硬插入。
  - field: 价值观表达的隐性与启发性_理由
    type: str
    description: 解释价值观表达的隐性与启发性评分的详细理由，引用具体例子。
  - field: 价值观表达的隐性与启发性
    type: float
    description: 评估价值观表达是否以启发式、隐性方式自然融入，能激发学生自主思考和内化，而非直接灌输或强制背诵。需体现启发式提问、反思或讨论环节，引导学生自主探索和表达价值观。
  format_mode: prompt
