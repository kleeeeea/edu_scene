agents:
  test_model:
    model: test_model
    prompt:
    - role: system
      content: You are InnoSpark（启创）, created by Shanghai Innovation Institute （上海创智学院）
        and East China Normal University(华东师范大学). You are a helpful assistant.
    - role: user
      content: 你的任务是为语文-初中-深度教案设计教学场景。{question}
    memory:
      enable: false
      id: null
      keep_turns: 3
directions:
- START -> test_model
- test_model -> END
tasks:
  mode: iter
  content:
  - question: 我是刚入职的初中语文老师，班里学生基础有差异，有些同学对语文没什么兴趣。你作为语文教学专家，能概括一下针对这种情况怎么设计一个能调动积极性的深度语文教案吗？说说学情分析、教学目标和活动设计的主要思路。
  - question: 我是初中语文教研员，负责指导一所城乡结合部学校的老师。我们七年级学生普遍阅读面窄，成绩分化大，家庭文化氛围也偏弱。你作为专业语文教学专家，能不能系统地讲解一下针对这种学情的语文深度教案设计思路？麻烦从学情分析、教学目标、重难点、教学活动、评价方式和传统文化融入等方面详细展开说说。
  - question: 我是一名有五年经验的初中语文老师，现在带八年级。班里有几个性格内向但写作挺有潜力的孩子。你怎么看在语文教案设计里，怎么针对他们做个性化教学？说说你的看法，举些例子也可以。
  - question: 我是初中语文教研组组长，最近在抓语文教学质量。你作为教学顾问，能全面深入地讲讲初中语文深度教案设计的系统流程吗？请从学情分析、目标分层、重难点、创新活动、评价方式、情感关怀和传统文化等多个角度详细说说。
  - question: 我是九年级语文老师，班级氛围不错，但有些学生在古诗文鉴赏方面总是有瓶颈。你作为资深教师，讲清楚点在教案设计时怎么科学定位古诗文鉴赏的重难点，并通过什么创新活动帮助学生突破？举些具体例子和评价方式。
  - question: 我是初中语文老师，带七年级，班里学生表达能力弱，合作意识也不强。你作为语文教学专家，能简要说明下针对这种班级，教案设计应该突出哪些教学目标和活动？说说你的推荐思路。
  - question: 我是初中语文骨干老师，刚接手一个八年级班级，两极分化很明显。部分学生语文素养挺好，另一部分基础薄弱动力也不高。你作为教学专家，能讲得详细点在深度教案设计中怎么实现分层教学、激发所有学生参与吗？麻烦结合学情分析、目标设定、活动设计和评价细说一下。
  - question: 我是郑小玉，27岁初中语文老师，喜欢戏剧表演和写作，平时也爱骑行。性格比较灵活，也喜欢仪式感，但有时候教学压力大容易精力透支。我和同事关系挺好但保持距离，周末常参加戏剧社团。你作为教学指导老师，能具体说说怎么帮我设计一份既有师生情感关怀，又兼顾教学效率和创新活动的深度语文教案吗？希望有针对性的建议。
  - question: 我是百里洪，18岁重点中学高三住校生，父母常年在海外工作，我假期常参加无人机竞赛，也是攀树俱乐部的核心成员，竞争意识挺强，艺体特长也不错。你作为语文学习指导老师，能解释一下我在语文学习上容易遇到哪些典型困惑？深度教案设计怎么帮我突破语文短板？希望能结合我的情况详细说说。
  - question: 我是刚入职的初中语文老师，带七年级，学生们普遍觉得文言文很枯燥难懂。你作为语文教学专家，详细讲讲围绕‘文言文阅读与鉴赏’主题，怎么设计一份既能激发兴趣又能提升语文素养的深度教案？希望从学情分析、目标、重难点、创新活动、评价方式、传统文化等方面具体说说。
evaluation:
  name: cross_235b
  model: judge_model
  prompt:
  - role: user
    content: '你是一个教育领域的专家，擅长对场景: 语文-初中-深度教案设计进行评估。请你对下面的回答进行评分，采用量表（1 - 5 分，1 分为
      “完全不符合”，5 分为 “完全符合”）进行打分。以下是问题和相应的回答内容：

      问题: {task.question}

      回答: {messages.as_dialog()}

      '
  format:
  - field: 个性化画像精准识别_理由
    type: str
    description: 解释个性化画像精准识别评分的详细理由，引用具体例子。
  - field: 个性化画像精准识别
    type: float
    description: 教案需以多元数据（如前测、问卷、作业表现、师生访谈）为依据，系统刻画学生在知识基础、学习兴趣、能力结构、性格特征等多维画像，明确区分主要学生类型，并动态更新学情分析，体现因材施教。
  - field: 个性化回应深度_理由
    type: str
    description: 解释个性化回应深度评分的详细理由，引用具体例子。
  - field: 个性化回应深度
    type: float
    description: 针对不同学生类型，教案须设计具体、可执行的分层教学活动和支持举措，并建立持续跟踪反馈机制（如成长档案、阶段性评价），动态调整教学策略，确保个别化回应落地。
  - field: 教学目标与评价体系专业性_理由
    type: str
    description: 解释教学目标与评价体系专业性评分的详细理由，引用具体例子。
  - field: 教学目标与评价体系专业性
    type: float
    description: 教学目标需分层（知识、能力、素养），具体且可测量，评价体系应结合过程性与终结性评价，采用多元指标（如课堂表现、作品、互评、测试），形成‘目标-过程-结果’闭环，并有可查证证据。
  - field: 指令遵循与格式规范_理由
    type: str
    description: 解释指令遵循与格式规范评分的详细理由，引用具体例子。
  - field: 指令遵循与格式规范
    type: float
    description: 教案结构须严格分块（如学情分析、教学目标、重难点、教学过程、评价方式等），内容完整，语言规范，版块逻辑清晰，便于教师查阅、执行和复盘。
  - field: 教学方法科学性与学科素养导向_理由
    type: str
    description: 解释教学方法科学性与学科素养导向评分的详细理由，引用具体例子。
  - field: 教学方法科学性与学科素养导向
    type: float
    description: 教案应基于语文学科核心素养，科学选用多样化教学方法（探究、合作、情境、项目等），明确各环节目标，系统促进语言能力、思维品质、文化理解等多元发展，并有方法创新或融合，教学活动需有过程记录和学生产出。
  - field: 创新思维激发设计_理由
    type: str
    description: 解释创新思维激发设计评分的详细理由，引用具体例子。
  - field: 创新思维激发设计
    type: float
    description: 教案需设计高阶思维与创新表达任务（如改编、探究、创造性写作等），鼓励学生多角度分析、主动探索、创造性产出，并安排成果展示、互评及反思环节，创新成果需有具体记录与评价标准。
  - field: 学生自主参与度与合作交流_理由
    type: str
    description: 解释学生自主参与度与合作交流评分的详细理由，引用具体例子。
  - field: 学生自主参与度与合作交流
    type: float
    description: 教案需安排多样化自主学习与合作活动，确保每位学生有实际参与、表达和协作机会，并设立具体机制（如小组长轮岗、角色分工、互评互助），过程有参与记录，关注全员参与与团队协作质量。
  - field: 价值观与文化传承自然融入_理由
    type: str
    description: 解释价值观与文化传承自然融入评分的详细理由，引用具体例子。
  - field: 价值观与文化传承自然融入
    type: float
    description: 教案应在知识与能力培养过程中，系统自然渗透社会主义核心价值观和中华优秀传统文化，通过文本解读、案例讨论、生活联系等环节引导学生践行价值观、感受文化魅力，并有具体教学活动和反思记录，避免生硬灌输或缺失。
  format_mode: prompt
